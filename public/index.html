    }

    // ---- Màn Tồn kho thời gian thực (ThuKho + KeToan) ----
    async function renderInventory(el){
      el.innerHTML=`<div class="panel">${loadingText()}</div>`;
      try{
        state.stock=(await call('rpc_inventory_stock')).rows||[]; renderInventoryUI(el);
        // Quét cảnh báo dựa trên tồn vừa tải (nền, không chặn giao diện).
        call('rpc_alerts_scan').then(()=>refreshAlertBell()).catch(()=>{});
      }
      catch(err){ el.innerHTML=`<div class="panel"><span class="msg">${esc(err.message)}</span></div>`; }
    }
    function invFlag(r){
      if(Number(r.closing)<0) return '<span class="badge" style="background:var(--danger);color:#fff">Tồn âm</span>';
      if(r.capacity>0 && Number(r.closing)>Number(r.capacity)) return '<span class="badge" style="background:#B26B00;color:#fff">Vượt sức chứa</span>';
      if(r.leadTimeDays>0 && r.daysLeft!=null && Number(r.daysLeft)<=Number(r.leadTimeDays)) return '<span class="badge" style="background:var(--danger);color:#fff">Cần đặt hàng ngay</span>';
      if(r.reorderPoint>0 && Number(r.closing)<=Number(r.reorderPoint)) return '<span class="badge" style="background:#B26B00;color:#fff">Dưới điểm đặt hàng</span>';
      return '';
    }
    function pctBar(r){
      if(r.pctFull==null) return '<span class="muted">—</span>';
      const p=Math.max(0,Math.min(100,Number(r.pctFull)));
      const col = Number(r.closing)<0?'var(--danger)':(Number(r.pctFull)>100?'#B26B00':'var(--ok)');
      return `<div style="display:flex;align-items:center;gap:8px">
        <div style="flex:1;height:8px;background:var(--line);border-radius:999px;overflow:hidden">
          <div style="width:${p}%;height:100%;background:${col}"></div></div>
        <span style="min-width:48px;text-align:right">${fmtNum(r.pctFull)}%</span></div>`;
    }
    function renderInventoryUI(el){
      const rows=state.stock||[], canSet=can('adjust:manage');
      const table = rows.length
        ? `<table><thead><tr><th>Téc</th><th>Loại dầu</th><th>Tồn đầu</th><th>Nhập</th><th>Xuất</th>
            <th>Tồn cuối</th><th>Sức chứa</th><th style="min-width:140px">% đầy</th>
            <th>TH BQ/ngày (tuần)</th><th>TH BQ/ngày (tháng)</th><th>Ngày tồn còn lại</th>
            <th>Chờ NCC (ngày)</th><th>Tồn tối thiểu</th><th></th></tr></thead><tbody>
            ${rows.map(r=>`<tr>
              <td>${esc(r.tankName||'')}</td><td>${esc(r.oilTypeName||'')}</td>
              <td>${fmtNum(r.opening)}</td><td>${fmtNum(r.nhap)}</td><td>${fmtNum(r.xuat)}</td>
              <td style="font-weight:700${Number(r.closing)<0?';color:var(--danger)':''}">${fmtNum(r.closing)}</td>
              <td>${fmtNum(r.capacity)}</td><td>${pctBar(r)}</td>
              <td>${fmtNum(r.avgDailyWeek)}</td><td>${fmtNum(r.avgDailyMonth)}</td>
              <td>${r.daysLeft!=null?fmtNum(r.daysLeft):'<span class="muted">—</span>'}</td>
              <td>${fmtNum(r.leadTimeDays)}</td><td>${fmtNum(r.minStock)}</td>
              <td>${invFlag(r)}</td>
            </tr>`).join('')}</tbody></table>`
        : '<span class="muted">Chưa có téc nào (thêm ở Danh mục & Xe).</span>';
      el.innerHTML=`<div class="panel"><div class="row" style="align-items:center">
          <h2 style="flex:1;margin:0">Tồn kho thời gian thực</h2>
          <button class="ghost sm" id="invReload" style="flex:0">Tải lại</button></div>
        <p class="muted" style="margin-top:4px">Tồn cuối = Tồn đầu + Nhập − Xuất (chỉ phiếu đã duyệt). Bơm ngoài không trừ tồn téc.
          TH BQ/ngày = tiêu hao trung bình (xuất) 7 & 30 ngày gần nhất. Ngày tồn còn lại = Tồn cuối ÷ TH BQ tháng.
          Chờ NCC = lead-time đặt ở Danh mục. Tồn tối thiểu = TH BQ tháng × Chờ NCC.</p>
        <div style="margin-top:8px">${table}</div></div>
        ${canSet?`<div class="panel"><h2>Đặt tồn đầu gốc</h2>
          <p class="muted" style="margin-top:-6px">Chỉ Kế toán. Đặt một lần theo giá trị đo tay tại mốc khởi tạo.</p>
          <div class="row">
            <div><label>Téc <span class="rq">*</span></label><select id="opTank" class="req"><option value="">— chọn téc —</option>
              ${rows.map(r=>`<option value="${r.tankId}">${esc(r.tankName)}</option>`).join('')}</select>
              <div class="fnote">Chọn téc cần đặt tồn đầu. Chọn xong sẽ hiện giá trị hiện tại (nếu có).</div></div>
            <div><label>Tồn đầu (lít) <span class="rq">*</span></label><input id="opLit" class="req" inputmode="decimal">
              <div class="fnote">Số lít đo tay tại mốc khởi tạo. Không được âm.</div></div>
            <div><label>Mốc (ngày) <span class="rq">*</span></label><input id="opDate" class="req" type="date">
              <div class="fnote">Ngày ứng với số tồn đầu đo tay ở trên.</div></div>
          </div>
          <div style="margin-top:12px"><button id="opSave" style="flex:0">Lưu tồn đầu</button></div>
          <div id="opMsg" class="msg"></div></div>`:''}`;
      document.getElementById('invReload').onclick=()=>renderInventory(el);
      if(canSet){
        const tsel=document.getElementById('opTank');
        tsel.onchange=()=>{ const r=rows.find(x=>x.tankId===tsel.value);
          document.getElementById('opLit').value = r&&r.opening!=null?r.opening:'';
          document.getElementById('opDate').value = r&&r.openingAsOf?r.openingAsOf:''; };
        document.getElementById('opSave').onclick=()=>saveOpening(el);
      }
    }
    async function saveOpening(el){
      const msg=document.getElementById('opMsg'); msg.textContent='';
      const tank=val('opTank'); if(!tank){ msg.textContent='Chọn téc.'; return; }
      try{
        await call('rpc_tank_opening_set',{ p_tank_id:tank, p_liters:num(val('opLit')),
          p_as_of_date:val('opDate')||null, p_note:null });
        toast('Đã lưu tồn đầu.'); renderInventory(el);
      }catch(err){ msg.textContent=err.message; }
    }

    // ---- Màn Sửa phiếu (Admin): dashboard tất cả phiếu + sửa/xóa/lịch sử ----
    async function renderAdminLedger(el){
      el.innerHTML=`<div class="panel">${loadingText()}</div>`;
      try{
        await ensureActive();
        if(!state.adminFilter) state.adminFilter={ days:'60', type:'', q:'' };
        await loadAdminLedger();
        renderAdminLedgerUI(el);
      }catch(err){ el.innerHTML=`<div class="panel"><span class="msg">${esc(err.message)}</span></div>`; }
    }
    async function loadAdminLedger(){
      const f=state.adminFilter;
      state.adminRows=(await call('rpc_admin_ledger_list',{ p_days:Number(f.days)||60, p_entry_type:f.type||null, p_q:f.q||null })).rows||[];
    }
    function adminStatusBadge(r){
      if(r.legacy) return '<span class="badge" style="background:#64707E;color:#fff">Lịch sử</span>';
      const m={ Nhap:['Nháp','#B26B00'], ChoDoiChieu:['Chờ đối chiếu','#0E5AA7'], DaDuyet:['Đã duyệt','#1E8E5A'] };
      const s=m[r.status]||[r.status,'#64707E'];
      return `<span class="badge" style="background:${s[1]};color:#fff">${esc(s[0])}</span>`;
    }
    function renderAdminLedgerUI(el){
      const f=state.adminFilter, rows=state.adminRows||[];
      const table = rows.length ? `<table><thead><tr>
          <th>Ngày</th><th>Số phiếu</th><th>Loại</th><th>Xe/NCC</th><th>Téc</th><th>Loại dầu</th><th>Số lít</th>
          <th>Trạng thái</th><th>Sửa lần cuối</th><th></th></tr></thead><tbody>
        ${rows.map(r=>`<tr>
          <td>${esc(r.entryDate||'')}</td><td>${esc(r.code||'(nháp)')}</td>
          <td>${r.entryType==='nhap'?'Nhập':'Bơm'}</td>
          <td>${esc(r.entryType==='nhap'?(r.supplierName||''):(r.vehiclePlate||r.supplierName||''))}</td>
          <td>${esc(r.tankName||'')}</td><td>${esc(r.oilTypeName||'')}</td><td>${fmtNum(r.liters)}</td>
          <td>${adminStatusBadge(r)}</td>
          <td>${r.editedAt?esc(r.editedAt)+(r.editedByName?(' · '+esc(r.editedByName)):''):'<span class="muted">—</span>'}</td>
          <td style="white-space:nowrap">
            <button class="ghost sm" data-aedit="${r.id}">Sửa</button>
            <button class="ghost sm" data-ahist="${r.id}">Lịch sử</button>
            <button class="ghost sm" data-adel="${r.id}" style="color:var(--danger)">Xóa</button></td>
        </tr>`).join('')}</tbody></table>` : '<span class="muted">Không có phiếu nào trong khoảng đã chọn.</span>';
      el.innerHTML=`<div class="panel"><h2>Sửa phiếu (Admin)</h2>
        <p class="muted" style="margin-top:-6px">Sửa/xóa thẳng từng phiếu lịch sử. Mọi thay đổi được ghi lịch sử (audit) kèm thời điểm và cập nhật trực tiếp vào cơ sở dữ liệu.</p>
        <div class="row">
          <div><label>Khoảng ngày</label><select id="alDays">
            <option value="30">30 ngày</option><option value="60">60 ngày</option><option value="90">90 ngày</option></select></div>
          <div><label>Loại phiếu</label><select id="alType">
            <option value="">Tất cả</option><option value="bom">Bơm</option><option value="nhap">Nhập</option></select></div>
          <div style="flex:2"><label>Tìm (số phiếu, biển số, NCC, ghi chú)</label><input id="alQ" value="${esc(f.q||'')}"></div>
        </div>
        <div style="margin-top:10px"><button id="alApply" style="flex:0">Lọc</button></div>
        <div style="margin-top:12px">${table}</div></div>`;
      document.getElementById('alDays').value=String(f.days);
      document.getElementById('alType').value=f.type||'';
      document.getElementById('alApply').onclick=function(){ withBusy(this,'Đang lọc…',async()=>{
        state.adminFilter={ days:val('alDays'), type:val('alType'), q:val('alQ') };
        await loadAdminLedger(); renderAdminLedgerUI(el);
      }); };
      el.querySelectorAll('[data-aedit]').forEach(b=> b.onclick=()=>adminEditPhieu(b.dataset.aedit, el));
      el.querySelectorAll('[data-ahist]').forEach(b=> b.onclick=()=>adminAuditPhieu(b.dataset.ahist));
      el.querySelectorAll('[data-adel]').forEach(b=> b.onclick=()=>adminDeletePhieu(b.dataset.adel, el));
    }
    function adminEditPhieu(id, el){
      const r=(state.adminRows||[]).find(x=>x.id===id); if(!r) return;
      const a=state.active||{};
      const optSel=(arr,idKey,labKey,cur)=>`<option value="">—</option>`+(arr||[]).map(x=>`<option value="${x[idKey]}" ${x[idKey]===cur?'selected':''}>${esc(x[labKey])}</option>`).join('');
      let body;
      if(r.entryType==='nhap'){
        body=`<div class="row"><div><label>Ngày</label><input id="aeDate" type="date" value="${esc(r.entryDate||'')}"></div>
            <div><label>Nhà cung cấp</label><select id="aeSup">${optSel(a.suppliers,'id','name',r.supplierId)}</select></div></div>
          <div class="row"><div><label>Téc</label><select id="aeTank">${optSel(a.tanks,'id','name',r.tankId)}</select></div>
            <div><label>Loại dầu</label><select id="aeOil">${optSel(a.oilTypes,'id','name',r.oilTypeId)}</select></div></div>
          <div class="row"><div><label>Số lít</label><input id="aeLit" inputmode="decimal" value="${r.liters!=null?esc(r.liters):''}"></div>
            <div><label>Đơn giá</label><input id="aePrice" inputmode="decimal" value="${r.unitPrice!=null?esc(r.unitPrice):''}"></div>
            <div><label>Số HĐ NCC</label><input id="aeInv" value="${r.supplierInvoiceNo?esc(r.supplierInvoiceNo):''}"></div></div>
          <label>Ghi chú</label><input id="aeNote" value="${r.note?esc(r.note):''}">`;
      }else{
        body=`<div class="row"><div><label>Ngày</label><input id="aeDate" type="date" value="${esc(r.entryDate||'')}"></div>
            <div><label>Xe</label><select id="aeVeh">${optSel(a.vehicles,'id','plate',r.vehicleId)}</select></div></div>
          <div class="row"><div><label>Loại giao dịch</label><select id="aeTxn">${(a.txnTypes||[]).map(t=>`<option value="${t.id}" ${t.id===r.txnTypeId?'selected':''}>${esc(t.name)}</option>`).join('')}</select></div>
            <div><label>Téc</label><select id="aeTank">${optSel(a.tanks,'id','name',r.tankId)}</select></div></div>
          <div class="row"><div><label>Loại dầu</label><select id="aeOil">${optSel(a.oilTypes,'id','name',r.oilTypeId)}</select></div>
            <div><label>Số lít</label><input id="aeLit" inputmode="decimal" value="${r.liters!=null?esc(r.liters):''}"></div></div>
          <div class="row"><div><label>KM cũ</label><input id="aeKmOld" inputmode="decimal" value="${r.kmOld!=null?esc(r.kmOld):''}"></div>
            <div><label>KM mới</label><input id="aeKmNew" inputmode="decimal" value="${r.kmNew!=null?esc(r.kmNew):''}"></div>
            <div><label>NCC (bơm ngoài)</label><select id="aeSup">${optSel(a.suppliers,'id','name',r.supplierId)}</select></div></div>
          <label>Ghi chú</label><input id="aeNote" value="${r.note?esc(r.note):''}">`;
      }
      openModal(`Sửa phiếu ${r.code||'(nháp)'}`, body, function(btn){
        const params={ p_id:id, p_entry_date:val('aeDate')||null, p_liters:val('aeLit')?num(val('aeLit')):null, p_note:val('aeNote') };
        if(r.entryType==='nhap'){
          Object.assign(params,{ p_supplier_id:val('aeSup')||null, p_tank_id:val('aeTank')||null, p_oil_type_id:val('aeOil')||null,
            p_unit_price:val('aePrice')?num(val('aePrice')):null, p_supplier_invoice_no:val('aeInv') });
        }else{
          Object.assign(params,{ p_vehicle_id:val('aeVeh')||null, p_txn_type_id:val('aeTxn')||null, p_tank_id:val('aeTank')||null,
            p_oil_type_id:val('aeOil')||null, p_km_old:val('aeKmOld')?num(val('aeKmOld')):null, p_km_new:val('aeKmNew')?num(val('aeKmNew')):null,
            p_supplier_id:val('aeSup')||null });
        }
        withBusy(btn,'Đang lưu…', async()=>{
          try{ await call('rpc_admin_ledger_update', params); closeModal(); toast('Đã cập nhật phiếu.');
            await loadAdminLedger(); renderAdminLedgerUI(el);
          }catch(err){ modalErr(err.message); }
        });
      }, 'Lưu');
    }
    async function adminAuditPhieu(id){
      showModal('Lịch sử phiếu','<div class="muted">Đang tải…</div>');
      try{ const rows=(await call('rpc_admin_ledger_audit',{p_id:id})).rows||[];
        const html = rows.length ? rows.map(a=>`<div class="notif-item"><div class="nt-title">${esc(a.action)}</div>
          <div class="nt-body">${esc(a.actor||'')}${a.message?(' — '+esc(a.message)):''}</div>
          <div class="nt-time">${esc(a.time)}</div></div>`).join('') : '<div class="muted">Chưa có lịch sử.</div>';
        showModal('Lịch sử phiếu', html);
      }catch(err){ showModal('Lịch sử phiếu', `<span class="msg">${esc(err.message)}</span>`); }
    }
    async function adminDeletePhieu(id, el){
      if(!confirm('Xóa vĩnh viễn phiếu này khỏi cơ sở dữ liệu? Hành động được ghi lịch sử.')) return;
      try{ await call('rpc_admin_ledger_delete',{p_id:id}); toast('Đã xóa phiếu.');
        await loadAdminLedger(); renderAdminLedgerUI(el);
      }catch(err){ toast(err.message); }
    }

    // ---- Màn Tịnh téc / Kiểm kê (Kế toán) ----
    const PERIOD_KIND={ tinh_tec:'Tịnh téc', kiem_ke:'Kiểm kê' };
    async function renderAdjust(el){
      el.innerHTML=`<div class="panel">${loadingText()}</div>`;
      try{ await ensureActive(); state.periods=(await call('rpc_stock_period_list')).rows||[]; renderAdjustUI(el); }
      catch(err){ el.innerHTML=`<div class="panel"><span class="msg">${esc(err.message)}</span></div>`; }
    }
    function renderAdjustUI(el){
      const a=state.active, tanks=a.tanks||[], rows=state.periods||[];
      const opt=arr=>arr.map(x=>`<option value="${x.id}">${esc(x.name)}</option>`).join('');
      const today=new Date().toISOString().slice(0,10);
      el.innerHTML=`<div class="panel"><h2>Kỳ điều chỉnh tồn mới</h2>
        <p class="muted" style="margin-top:-6px">Tịnh téc (khi téc cạn) hoặc Kiểm kê (giữa chừng). Chốt kỳ để sinh tịnh âm/dương và phân bổ cho xe.</p>
        <div class="row">
          <div><label>Téc</label><select id="spTank"><option value="">— chọn téc —</option>${opt(tanks)}</select></div>
          <div><label>Loại kỳ</label><select id="spKind">
            <option value="tinh_tec">Tịnh téc (téc cạn)</option>
            <option value="kiem_ke">Kiểm kê (giữa chừng)</option></select></div>
        </div>
        <div class="row">
          <div><label>Ngày bắt đầu</label><input id="spStart" type="date" value="${today}"></div>
          <div><label>Ghi chú</label><input id="spNote"></div>
        </div>
        <div style="margin-top:12px"><button id="spCreate" style="flex:0">Tạo kỳ</button></div>
        <div id="spMsg" class="msg"></div>
      </div>
      <div class="panel"><h2>Các kỳ</h2><div id="spList" style="margin-top:8px"></div></div>`;
      document.getElementById('spCreate').onclick=()=>createPeriod(el);
      renderPeriodList(el);
    }
    function renderPeriodList(el){
      const box=document.getElementById('spList'); const rows=state.periods||[];
      if(!rows.length){ box.innerHTML='<span class="muted">Chưa có kỳ nào.</span>'; return; }
      box.innerHTML=`<table><thead><tr><th>Số kỳ</th><th>Téc</th><th>Loại</th><th>Bắt đầu</th><th>Chốt</th>
        <th>Thực tế</th><th>Tồn sổ</th><th>Tịnh âm</th><th>Tịnh dương</th><th>Trạng thái</th><th></th></tr></thead><tbody>
        ${rows.map(r=>`<tr>
          <td>${r.code?esc(r.code):'<span class="muted">(mở)</span>'}</td>
          <td>${esc(r.tankName||'')}</td><td>${esc(PERIOD_KIND[r.kind]||r.kind)}</td>
          <td>${esc(r.startDate||'')}</td><td>${esc(r.closeDate||'')}</td>
          <td>${fmtNum(r.actual)}</td><td>${fmtNum(r.book)}</td>
          <td${Number(r.tinhAm)>0?' style="color:var(--danger)"':''}>${fmtNum(r.tinhAm)}</td>
          <td${Number(r.tinhDuong)>0?' style="color:var(--ok)"':''}>${fmtNum(r.tinhDuong)}</td>
          <td><span class="badge">${r.status==='DaChot'?'Đã chốt':'Đang mở'}</span></td>
          <td style="white-space:nowrap">${r.status==='Mo'
            ? `<button class="sm" data-close="${r.id}" style="flex:0">Chốt</button><button class="ghost sm" data-pdel="${r.id}">Xóa</button>`
            : `<button class="ghost sm" data-palloc="${r.id}">Phân bổ</button>`}</td>
        </tr>`).join('')}</tbody></table>`;
      box.querySelectorAll('[data-close]').forEach(b=> b.onclick=()=>closePeriod(b.dataset.close, el));
      box.querySelectorAll('[data-pdel]').forEach(b=> b.onclick=()=>deletePeriod(b.dataset.pdel, el));
      box.querySelectorAll('[data-palloc]').forEach(b=> b.onclick=()=>viewAlloc(b.dataset.palloc));
    }
    async function createPeriod(el){
      const msg=document.getElementById('spMsg'); msg.textContent='';
      if(!val('spTank')){ msg.textContent='Chọn téc.'; return; }
      try{
        await call('rpc_stock_period_create',{ p_tank_id:val('spTank'), p_kind:val('spKind'),
          p_start_date:val('spStart')||null, p_note:val('spNote') });
        toast('Đã tạo kỳ.'); state.periods=(await call('rpc_stock_period_list')).rows||[]; renderAdjustUI(el);
      }catch(err){ msg.textContent=err.message; }
    }
    async function closePeriod(id, el){
      const s=prompt('Nhập Tồn thực tế đo tay (lít) để chốt kỳ:',''); if(s===null) return;
      const actual=num(s);
      if(!confirm(`Chốt kỳ với tồn thực tế ${fmtNum(actual)} lít? Không thể sửa sau khi chốt.`)) return;
      try{ const r=await call('rpc_stock_period_close',{ p_id:id, p_actual_liters:actual });
        toast(`Đã chốt. Tịnh âm ${fmtNum(r.tinhAm)}, tịnh dương ${fmtNum(r.tinhDuong)}.`);
        state.periods=(await call('rpc_stock_period_list')).rows||[]; renderAdjustUI(el);
      }catch(err){ toast(err.message); }
    }
    async function deletePeriod(id, el){
      if(!confirm('Xóa kỳ đang mở này?')) return;
      try{ await call('rpc_stock_period_delete',{p_id:id}); toast('Đã xóa.');
        state.periods=(await call('rpc_stock_period_list')).rows||[]; renderAdjustUI(el);
      }catch(err){ toast(err.message); }
    }
    async function viewAlloc(id){
      let rows=[];
      try{ rows=(await call('rpc_stock_period_detail',{p_id:id})).rows||[]; }
      catch(err){ toast(err.message); return; }
      const body = rows.length
        ? `<table><thead><tr><th>Xe</th><th>Lít trong kỳ</th><th>Tịnh âm PB</th><th>Tịnh dương PB</th></tr></thead><tbody>
            ${rows.map(r=>`<tr><td>${esc(r.plate||'')}</td><td>${fmtNum(r.litersInPeriod)}</td>
              <td>${fmtNum(r.tinhAm)}</td><td>${fmtNum(r.tinhDuong)}</td></tr>`).join('')}</tbody></table>`
        : '<span class="muted">Kỳ này không có xe bơm trong kỳ (không phân bổ).</span>';
      showModal('Phân bổ tịnh cho xe', body);
    }

    // ---- Báo cáo tiêu hao tháng (S8) ----
    function fmtL(v){ const n=Number(v||0); return n===0?'0':n.toLocaleString('vi-VN',{maximumFractionDigits:3}); }
    async function renderReport(el){
      const now=new Date();
      state.report=state.report||{ month:now.getMonth()+1, year:now.getFullYear() };
      el.innerHTML=`<div class="panel">${loadingText()}</div>`;
      try{
        const r=await call('rpc_report_monthly',{ p_month:state.report.month, p_year:state.report.year });
        state.reportData=r; renderReportUI(el);
      }catch(err){ el.innerHTML=`<div class="panel"><span class="msg">${esc(err.message)}</span></div>`; }
    }
    function renderReportUI(el){
      const d=state.reportData, tanks=d.tanks||[], oils=d.oils||[], rows=d.rows||[], t=d.totals||{};
      const mopts=Array.from({length:12},(_,i)=>`<option value="${i+1}" ${d.month===i+1?'selected':''}>Tháng ${i+1}</option>`).join('');
      const yrs=[]; for(let y=new Date().getFullYear()+1;y>=2024;y--) yrs.push(`<option value="${y}" ${d.year===y?'selected':''}>${y}</option>`);
      const head=`<tr><th>STT</th><th>Biển số xe</th>${tanks.map(k=>`<th>${esc(k.name)}</th>`).join('')}
        <th>Bơm ngoài</th><th>Tổng diesel</th>${oils.map(o=>`<th>${esc(o.name)}</th>`).join('')}
        <th>Tổng dầu khác</th><th>KM</th><th>Tịnh âm</th><th>Tiêu hao thực</th><th>L/100km</th><th>Tháng trước</th></tr>`;
      const cell=(obj,id)=>fmtL(obj&&obj[id]);
      const body=rows.length?rows.map((r,i)=>`<tr>
        <td>${i+1}</td><td>${esc(r.plate)}</td>
        ${tanks.map(k=>`<td>${cell(r.tanks,k.id)}</td>`).join('')}
        <td>${fmtL(r.bomNgoai)}</td><td style="font-weight:700">${fmtL(r.tongDiesel)}</td>
        ${oils.map(o=>`<td>${cell(r.otherOils,o.id)}</td>`).join('')}
        <td>${fmtL(r.tongOilKhac)}</td><td>${fmtL(r.km)}</td><td>${fmtL(r.tinhAm)}</td>
        <td style="font-weight:700">${fmtL(r.tieuHaoThuc)}</td>
        <td>${r.lPer100==null?'—':fmtL(r.lPer100)}</td>
        <td class="muted">${r.lPer100Prev==null?'—':fmtL(r.lPer100Prev)}</td></tr>`).join('')
        :`<tr><td colspan="${tanks.length+oils.length+8}" class="muted">Không có dữ liệu trong kỳ này.</td></tr>`;
      const totCols=tanks.length+ (oils.length) ;
      const foot=`<tr style="font-weight:800;background:var(--accent-soft)">
        <td colspan="2">TỔNG</td>${tanks.map(()=>'<td></td>').join('')}
        <td>${fmtL(t.bomNgoai)}</td><td>${fmtL(t.tongDiesel)}</td>${oils.map(()=>'<td></td>').join('')}
        <td>${fmtL(t.tongOilKhac)}</td><td>${fmtL(t.km)}</td><td>${fmtL(t.tinhAm)}</td>
        <td>${fmtL(t.tieuHaoThuc)}</td><td></td><td></td></tr>`;
      el.innerHTML=`<div class="panel"><div class="row" style="align-items:flex-end">
          <div style="flex:0;min-width:120px"><label>Tháng</label><select id="rpMonth">${mopts}</select></div>
          <div style="flex:0;min-width:110px"><label>Năm</label><select id="rpYear">${yrs.join('')}</select></div>
          <div style="flex:0"><button id="rpGo">Xem</button></div>
          <div style="flex:0"><button class="ghost" id="rpXlsx">Tải Excel</button></div>
        </div>
        <p class="muted" style="margin-top:8px">Tiêu hao thực = Tổng diesel + Tịnh âm − Tịnh dương. L/100km = Tiêu hao thực ÷ KM × 100. Chỉ phiếu đã duyệt/legacy.</p>
        <div style="overflow:auto"><table>${head}${body}${foot}</table></div></div>`;
      document.getElementById('rpGo').onclick=()=>{ state.report={ month:Number(val('rpMonth')), year:Number(val('rpYear')) }; renderReport(el); };
      document.getElementById('rpXlsx').onclick=()=>exportReportXlsx();
    }
    function exportReportXlsx(){
      const d=state.reportData; if(!d||!window.XLSX){ toast('Chưa có dữ liệu.'); return; }
      const tanks=d.tanks||[], oils=d.oils||[], rows=d.rows||[], t=d.totals||{};
      const header=['STT','Biển số xe',...tanks.map(k=>k.name),'Bơm ngoài','Tổng diesel',
        ...oils.map(o=>o.name),'Tổng dầu khác','KM','Tịnh âm','Tiêu hao thực','L/100km','L/100km tháng trước'];
      const aoa=[[`TỔNG HỢP TIÊU HAO — Tháng ${d.month}/${d.year}`],[],header];
      const N=v=>Number(v||0);
      rows.forEach((r,i)=>aoa.push([i+1,r.plate,
        ...tanks.map(k=>N(r.tanks&&r.tanks[k.id])),N(r.bomNgoai),N(r.tongDiesel),
        ...oils.map(o=>N(r.otherOils&&r.otherOils[o.id])),N(r.tongOilKhac),N(r.km),N(r.tinhAm),
        N(r.tieuHaoThuc),r.lPer100==null?'':N(r.lPer100),r.lPer100Prev==null?'':N(r.lPer100Prev)]));
      aoa.push(['','TỔNG',...tanks.map(()=>''),N(t.bomNgoai),N(t.tongDiesel),
        ...oils.map(()=>''),N(t.tongOilKhac),N(t.km),N(t.tinhAm),N(t.tieuHaoThuc),'','']);
      const ws=window.XLSX.utils.aoa_to_sheet(aoa);
      const wb=window.XLSX.utils.book_new();
      window.XLSX.utils.book_append_sheet(wb, ws, `Tieu hao ${d.month}-${d.year}`);
      window.XLSX.writeFile(wb, `tieu_hao_${d.year}_${String(d.month).padStart(2,'0')}.xlsx`);
    }

    // ---- Cảnh báo tồn + Web Push (S7) ----
    function alertColor(level){ return level==='danger'?'var(--danger)':'var(--orange)'; }

    async function refreshAlertBell(){
      const bell=document.getElementById('alertBell'), badge=document.getElementById('notifBadge');
      if(!bell || !can('alert:read')){ if(bell) bell.classList.add('hidden'); return; }
      bell.classList.remove('hidden');
      try{
        const res=await call('rpc_alerts_list',{ p_limit:1 });
        const n=Number(res.unread)||0;
        if(n>0){ badge.textContent = n>99?'99+':n; badge.classList.remove('hidden'); }
        else badge.classList.add('hidden');
      }catch(_e){}
    }

    async function renderAlerts(el){
      el.innerHTML=`<div class="panel">${loadingText()}</div>`;
      try{
        const res=await call('rpc_alerts_list',{ p_limit:100 });
        state.alerts=res.rows||[];
        renderAlertsUI(el, res.unread||0);
        refreshAlertBell();
      }catch(err){ el.innerHTML=`<div class="panel"><span class="msg">${esc(err.message)}</span></div>`; }
    }
    function renderAlertsUI(el, unread){
      const rows=state.alerts||[];
      const list = rows.length
        ? rows.map(r=>`<div class="panel" style="margin-bottom:10px;border-left:4px solid ${alertColor(r.level)};${r.read?'opacity:.6':''}">
            <div class="row" style="align-items:center">
              <div style="flex:1"><b>${esc(r.title)}</b>
                ${r.read?'':'<span class="badge" style="background:var(--danger);color:#fff">mới</span>'}
                <div class="muted" style="margin-top:2px">${esc(r.body)}</div>
                <div class="muted" style="font-size:12px;margin-top:4px">${esc(r.createdAt)}</div></div>
              ${r.read?'':`<button class="ghost sm" data-read="${r.id}" style="flex:0">Đã đọc</button>`}
            </div></div>`).join('')
        : '<div class="panel muted">Chưa có cảnh báo nào. Tồn kho đang trong ngưỡng an toàn.</div>';
      el.innerHTML=`<div class="panel"><div class="row" style="align-items:center">
          <h2 style="flex:1;margin:0">Cảnh báo tồn</h2>
          ${unread>0?'<button class="ghost sm" id="alRead" style="flex:0">Đánh dấu đã đọc hết</button>':''}
          <button class="ghost sm" id="alReload" style="flex:0">Tải lại</button></div>
        <p class="muted" style="margin-top:4px">Tồn âm · vượt sức chứa · dưới điểm đặt hàng. Tối đa 1 cảnh báo / loại / téc / ngày.</p>
        <div id="pushBox"></div></div>
        ${list}`;
      document.getElementById('alReload').onclick=()=>renderAlerts(el);
      const allBtn=document.getElementById('alRead');
      if(allBtn) allBtn.onclick=async()=>{ try{ await call('rpc_alerts_mark_read',{}); renderAlerts(el); }catch(err){ toast(err.message); } };
      el.querySelectorAll('[data-read]').forEach(b=> b.onclick=async()=>{
        try{ await call('rpc_alerts_mark_read',{ p_id:b.dataset.read }); renderAlerts(el); }catch(err){ toast(err.message); } });
      renderPushBox();
    }

    // --- Web Push ---
    function pushSupported(){ return 'serviceWorker' in navigator && 'PushManager' in window && 'Notification' in window; }
    function urlBase64ToUint8Array(base64){
      const pad='='.repeat((4-base64.length%4)%4);
      const b64=(base64+pad).replace(/-/g,'+').replace(/_/g,'/');
      const raw=atob(b64); const out=new Uint8Array(raw.length);
      for(let i=0;i<raw.length;i++) out[i]=raw.charCodeAt(i);
      return out;
    }
    async function currentPushSub(){
      if(!pushSupported()) return null;
      const reg=await navigator.serviceWorker.ready;
      return reg.pushManager.getSubscription();
    }
    async function renderPushBox(){
      const box=document.getElementById('pushBox'); if(!box) return;
      if(!APP.vapidPublicKey){ box.innerHTML='<p class="muted" style="font-size:13px">Web Push chưa cấu hình (thiếu VAPID). Cảnh báo vẫn hiện trong app.</p>'; return; }
      if(!pushSupported()){ box.innerHTML='<p class="muted" style="font-size:13px">Trình duyệt/thiết bị này không hỗ trợ push. iOS cần cài PWA vào màn hình chính.</p>'; return; }
      const sub=await currentPushSub();
      box.innerHTML = sub
        ? '<button class="ghost sm" id="pushOff" style="flex:0">Tắt thông báo đẩy trên thiết bị này</button>'
        : '<button class="sm" id="pushOn" style="flex:0">Bật thông báo đẩy trên thiết bị này</button>';
      const on=document.getElementById('pushOn'), off=document.getElementById('pushOff');
      if(on) on.onclick=enablePush;
      if(off) off.onclick=disablePush;
    }
    async function enablePush(){
      try{
        const perm=await Notification.requestPermission();
        if(perm!=='granted'){ toast('Bạn chưa cho phép thông báo.'); return; }
        const reg=await navigator.serviceWorker.ready;
        const sub=await reg.pushManager.subscribe({ userVisibleOnly:true,
          applicationServerKey:urlBase64ToUint8Array(APP.vapidPublicKey) });
        const j=sub.toJSON();
        await call('rpc_push_subscribe',{ p_endpoint:sub.endpoint,
          p_p256dh:j.keys&&j.keys.p256dh, p_auth:j.keys&&j.keys.auth, p_user_agent:navigator.userAgent });
        toast('Đã bật thông báo đẩy.'); renderPushBox();
      }catch(err){ toast('Không bật được push: '+(err.message||err)); }
    }
    async function disablePush(){
      try{
        const sub=await currentPushSub();
        if(sub){ await call('rpc_push_unsubscribe',{ p_endpoint:sub.endpoint }); await sub.unsubscribe(); }
        toast('Đã tắt thông báo đẩy.'); renderPushBox();
      }catch(err){ toast('Không tắt được push: '+(err.message||err)); }
    }

    document.getElementById('alertBell').onclick=toggleNotif;
    document.getElementById('loginBtn').onclick=function(){ withBusy(this,'Đang đăng nhập…',login); };
    document.getElementById('logoutBtn').onclick=logout;
    document.getElementById('loginPin').addEventListener('keydown',e=>{ if(e.key==='Enter') login(); });
    // Đóng panel thông báo khi bấm ra ngoài chuông.
    document.addEventListener('click',e=>{ if(!e.target.closest('.bell-wrap')) closeNotif(); });

    // FAB: Quay lại + Lên đầu trang.
    (function initFabs(){
      const back=document.createElement('button'); back.className='back-fab'; back.id='backFab'; back.innerHTML='← Quay lại';
      back.onclick=()=>history.back(); document.body.appendChild(back);
      const top=document.createElement('button'); top.className='to-top'; top.id='toTop'; top.textContent='↑'; top.title='Lên đầu trang';
      top.onclick=()=>window.scrollTo({top:0,behavior:'smooth'}); document.body.appendChild(top);
      window.addEventListener('scroll',()=>{ top.classList.toggle('show',(window.scrollY||document.documentElement.scrollTop||0)>400); },{passive:true});
    })();

    // Tự gắn nhãn cột cho mọi bảng render vào vùng nội dung (kể cả tải bất đồng bộ).
    (function initTableLabels(){
      const host=document.getElementById('screen'); if(!host) return;
      // Chỉ theo dõi childList (không theo dõi attribute) nên gắn data-label không tự kích hoạt lại.
      new MutationObserver(()=>labelTableCells(host)).observe(host,{childList:true,subtree:true});
    })();

    (async function init(){
      const { data } = await sb.auth.getSession();
      if(data && data.session){ state.session=data.session; bootstrap(); }
    })();
    sb.auth.onAuthStateChange((event)=>{ if(event==='SIGNED_OUT') location.reload(); });
  </script>
