<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Thiên Nhật — Tồn kho Xăng dầu</title>
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="icon" type="image/png" href="./logo.png">
  <link rel="apple-touch-icon" sizes="192x192" href="./icon-192.png">
  <meta name="theme-color" content="#E8620C">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="TN Xăng dầu">
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js').catch(() => {}));
    }
  </script>
  <style>
    :root{--bg:#F4F6FA;--panel:#fff;--ink:#1E2A38;--muted:#64707E;--line:#E4EAF1;
      --accent:#E8620C;--accent-dark:#B34D08;--accent-soft:#FCEEE3;--orange:#B26B00;
      --ok:#1E8E5A;--danger:#D14343;--input:#F5F8FC;
      --shadow:0 1px 2px rgba(16,40,70,.06),0 4px 16px rgba(16,40,70,.05);}
    *{box-sizing:border-box}
    body{margin:0;background:var(--bg);color:var(--ink);font-size:15px;-webkit-font-smoothing:antialiased;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif}
    /* ---- Header ---- */
    header{display:flex;align-items:center;justify-content:space-between;gap:12px;
      padding:11px 16px;border-bottom:1px solid var(--line);position:sticky;top:0;z-index:30;
      background:rgba(255,255,255,.85);backdrop-filter:saturate(180%) blur(12px);-webkit-backdrop-filter:saturate(180%) blur(12px)}
    .brand{display:flex;align-items:center;gap:10px;min-width:0}
    .brand-logo{height:34px;width:auto;display:block}
    h1{margin:0;font-size:16px;font-weight:800;letter-spacing:-.2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    h2{margin:0 0 12px;font-size:18px;font-weight:800;letter-spacing:-.2px}
    h3{margin:16px 0 8px;font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;font-weight:800}
    .header-right{display:flex;align-items:center;gap:8px}
    .menu-toggle{display:inline-flex;flex-direction:column;justify-content:center;gap:4px;width:42px;height:42px;
      padding:0 11px;background:#fff;border:1px solid var(--line);border-radius:10px;flex:0 0 auto}
    .menu-toggle span{display:block;height:2px;background:var(--ink);border-radius:2px}
    .menu-toggle:hover{background:#F1F5FA}
    button,input,select,textarea{font:inherit;border-radius:10px;border:1px solid var(--line);min-height:44px;
      transition:border-color .15s,box-shadow .15s,background .15s,transform .05s}
    input,select,textarea{width:100%;background:var(--input);padding:10px 12px;color:var(--ink)}
    input:focus,select:focus,textarea:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft);background:#fff}
    textarea{min-height:64px;resize:vertical}
    button{background:var(--accent);color:#fff;border:1px solid var(--accent);padding:10px 16px;font-weight:700;cursor:pointer;
      box-shadow:0 1px 2px rgba(14,90,167,.25)}
    button:hover{background:var(--accent-dark);border-color:var(--accent-dark)}
    button:active{transform:translateY(1px)}
    button:disabled{opacity:.55;cursor:not-allowed}
    button.ghost{background:#fff;color:var(--accent);border:1px solid var(--line);box-shadow:none}
    button.ghost:hover{background:#F1F5FA;color:var(--accent-dark)}
    button.sm{min-height:34px;padding:6px 12px;font-size:13px}
    .wrap{max-width:980px;margin:0 auto;padding:20px 16px 84px}
    .panel,.card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:18px;margin-bottom:14px;box-shadow:var(--shadow)}
    .muted{color:var(--muted)}
    .row{display:flex;gap:10px;flex-wrap:wrap}
    .row>*{flex:1;min-width:140px}
    label{display:block;font-size:13px;color:var(--muted);margin:10px 0 4px;font-weight:600}
    label .rq{color:var(--danger);font-weight:800;margin-left:2px}
    /* Trường bắt buộc: nền vàng nhạt + viền vàng cho tới khi focus. */
    input.req,select.req,textarea.req{background:#FFFBEB;border-color:#E6C200}
    input.req:focus,select.req:focus,textarea.req:focus{background:#fff;border-color:var(--accent)}
    /* Dòng hướng dẫn nhập dưới mỗi trường. */
    .fnote{font-size:12px;color:var(--muted);margin:4px 0 2px;line-height:1.35}
    /* Bảng báo cáo nhiều cột (lưới theo ngày): giữ dạng bảng cuộn ngang trên mobile,
       không tự xếp thành thẻ như quy tắc S11. */
    @media(max-width:760px){
      table.rpt-grid{display:table;width:auto}
      table.rpt-grid thead{display:table-header-group}
      table.rpt-grid tbody{display:table-row-group}
      table.rpt-grid tr{display:table-row}
      table.rpt-grid th,table.rpt-grid td{display:table-cell;white-space:nowrap}
      table.rpt-grid td::before{display:none}
    }
    /* Báo cáo nhiều cột: đóng băng cột STT + Biển số xe khi cuộn ngang. */
    table.rpt-grid th:nth-child(1),table.rpt-grid td:nth-child(1),
    table.rpt-grid th:nth-child(2),table.rpt-grid td:nth-child(2){
      position:sticky;background:var(--panel);z-index:2}
    table.rpt-grid th:nth-child(1),table.rpt-grid td:nth-child(1){left:0;min-width:42px;width:42px}
    table.rpt-grid th:nth-child(2),table.rpt-grid td:nth-child(2){left:42px;min-width:96px;box-shadow:2px 0 0 var(--line)}
    table.rpt-grid thead th:nth-child(1),table.rpt-grid thead th:nth-child(2){z-index:3}
    table.rpt-grid tbody tr:hover td:nth-child(1),table.rpt-grid tbody tr:hover td:nth-child(2){background:#FAFBFD}
    table.rpt-grid tr.rpt-foot td{background:var(--accent-soft)}
    .hidden{display:none!important}
    /* ---- Sub-tab nav (catalog) ---- */
    .nav{display:flex;gap:8px;overflow-x:auto;padding:10px 16px;background:#fff;border-bottom:1px solid var(--line);position:sticky;top:57px;z-index:10}
    .nav button{background:var(--accent-soft);color:var(--accent);white-space:nowrap;min-height:38px;padding:6px 14px;border-radius:999px;border-color:transparent;box-shadow:none}
    .nav button.active{background:var(--accent);color:#fff}
    /* ---- Workspace 2-col (form + result) ---- */
    .workspace{display:grid;grid-template-columns:minmax(320px,.82fr) minmax(360px,1.18fr);gap:18px;align-items:start}
    .workspace>*{margin-bottom:0;min-width:0}
    /* Cột form bên trái bám dính khi cuộn danh sách dài (chỉ desktop). */
    @media(min-width:921px){ .workspace .sticky-col{position:sticky;top:76px} }
    /* Panel danh sách trong workspace: đầu panel dính để tiêu đề luôn thấy. */
    .list-head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin:0 0 6px}
    .list-head h2{margin:0}
    .count-pill{background:var(--accent-soft);color:var(--accent);font-size:12px;font-weight:800;
      padding:3px 10px;border-radius:999px;flex:0 0 auto}
    /* ---- Drawer ---- */
    .drawer{position:fixed;top:0;left:0;height:100dvh;width:288px;max-width:84vw;background:var(--panel);
      border-right:1px solid var(--line);transform:translateX(-100%);transition:transform .24s ease;z-index:60;
      overflow-y:auto;padding:14px 12px 20px;box-shadow:0 20px 50px rgba(16,40,70,.18);display:flex;flex-direction:column}
    .drawer.open{transform:translateX(0)}
    .drawer-backdrop{position:fixed;inset:0;background:rgba(16,28,45,.4);z-index:55}
    .drawer-brand{display:flex;align-items:center;justify-content:space-between;padding:4px 8px 12px;border-bottom:1px solid var(--line);margin-bottom:8px}
    .drawer-brand img{height:32px}
    .drawer-x{width:34px;height:34px;padding:0;background:transparent;color:var(--muted);border:none;box-shadow:none;font-size:18px}
    .drawer-item{width:100%;text-align:left;background:transparent;color:var(--ink);border:none;box-shadow:none;font-weight:500;
      padding:10px 12px;border-radius:10px;margin-bottom:2px;font-size:14px;min-height:42px}
    .drawer-item:hover{background:#F1F5FA}
    .drawer-item.active{background:var(--accent-soft);color:var(--accent);font-weight:800}
    .drawer>.drawer-item{font-weight:700}
    .drawer-group{margin:8px 0;background:#F7F9FC;border:1px solid var(--line);border-radius:12px;padding:4px}
    .drawer-group-body .drawer-item{padding-left:16px}
    .drawer-group-h{width:100%;text-align:left;background:transparent;color:var(--accent);border:none;box-shadow:none;
      font-weight:800;font-size:12px;text-transform:uppercase;letter-spacing:.5px;padding:9px 12px 7px;
      display:flex;justify-content:space-between;align-items:center;cursor:pointer;min-height:auto}
    .drawer-group.collapsed .drawer-group-body{display:none}
    .drawer-group.collapsed .drawer-group-h span{transform:rotate(-90deg)}
    .drawer-group-h span{transition:transform .2s}
    .drawer-note{margin-top:auto;padding:14px 12px 4px;border-top:1px solid var(--line);color:var(--muted);font-size:12px}
    .drawer-note b{color:var(--accent)}
    /* ---- Bottom tab-bar (mobile) ---- */
    .tabbar{display:none}
    /* ---- Bell + notif panel ---- */
    .bell-wrap{position:relative}
    .bell-btn{position:relative;font-size:17px;padding:8px 12px;min-height:40px;flex:0 0 auto}
    .notif-badge{position:absolute;top:-6px;right:-6px;background:var(--danger);color:#fff;border-radius:999px;
      font-size:11px;font-weight:700;padding:1px 6px;min-width:18px;text-align:center}
    .notif-panel{position:absolute;right:0;top:48px;width:360px;max-height:460px;overflow:auto;background:var(--panel);
      border:1px solid var(--line);border-radius:12px;box-shadow:0 12px 34px rgba(0,0,0,.18);z-index:40;padding:8px}
    .notif-head{display:flex;justify-content:space-between;align-items:center;padding:6px 8px;font-weight:800}
    .notif-item{padding:10px;border-radius:8px;border-bottom:1px solid var(--line)}
    .notif-item:last-child{border-bottom:0}
    .notif-item.unread{background:#FFF7E7}
    .notif-item .nt-title{font-weight:700;font-size:13px}
    .notif-item .nt-body{font-size:12px;color:var(--muted);margin-top:2px}
    .notif-item .nt-time{font-size:11px;color:var(--muted);margin-top:3px}
    /* ---- Tables ---- */
    table{width:100%;border-collapse:collapse}
    th,td{text-align:left;padding:9px 8px;border-bottom:1px solid var(--line);font-size:14px}
    th{color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:.03em}
    tbody tr:hover td{background:#FAFBFD}
    /* ---- Pills / badges / metrics ---- */
    .badge{display:inline-block;padding:2px 10px;border-radius:999px;background:var(--accent-soft);color:var(--accent);font-size:12px;font-weight:700}
    .pill{display:inline-block;padding:3px 10px;border-radius:999px;background:#EEF1F5;color:#46586B;font-size:12px;font-weight:700}
    .pill.ok{background:#E4F3EA;color:#1E7A4C}
    .pill.warn{background:#FDF0D6;color:#7A5A11}
    .pill.err{background:#FBE0DD;color:#9A3730}
    .totals{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:14px}
    .metric{background:#fff;border:1px solid var(--line);border-radius:14px;padding:14px 16px;box-shadow:var(--shadow);min-width:0}
    .metric>span{font-size:12.5px;color:var(--muted);line-height:1.3}
    .metric strong{display:block;font-size:20px;margin-top:4px;color:var(--accent)}
    /* ---- Notice / feedback ---- */
    .notice{padding:11px 14px;border-radius:12px;margin-bottom:14px;background:#FFF7E8;border:1px solid #F0DEB0;color:#6B531B}
    .notice.ok{background:#ECF4FB;border-color:#CBE0F2;color:#0C4C86}
    .notice.err{background:#FDEEEC;border-color:#F2C9C2;color:#9A3730}
    .actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}
    .loading-line{display:flex;gap:8px;align-items:center;color:var(--muted)}
    .spin{width:16px;height:16px;border-radius:50%;border:2px solid var(--line);border-top-color:var(--accent);animation:spin .8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    /* Chuyển màn mượt hơn: nội dung hiện dần khi đổi màn (không chạy khi chỉ làm mới dữ liệu). */
    @keyframes screenIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
    #screen.nav-in{animation:screenIn .18s ease}
    @media(prefers-reduced-motion:reduce){ #screen.nav-in{animation:none} }
    /* Tồn kho: thẻ trực quan + biểu đồ mức đầy theo téc */
    .stat-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-top:10px}
    .stat{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:12px 14px}
    .stat .k{font-size:12px;color:var(--muted)}
    .stat .v{font-size:20px;font-weight:800;margin-top:2px}
    .inv-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:12px;margin-top:10px}
    .inv-card{border:1px solid var(--line);border-radius:14px;padding:14px;background:var(--panel)}
    .inv-card-head{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
    .inv-tank{font-weight:800;font-size:16px}
    .inv-oil{font-size:12px;margin-top:1px}
    .inv-pct{font-weight:800;font-size:18px;white-space:nowrap}
    .inv-track{height:14px;border-radius:999px;background:var(--line);overflow:hidden;margin:10px 0 8px}
    .inv-fill{height:100%;border-radius:999px;transition:width .4s ease}
    .inv-nums{font-size:14px}
    .inv-chips{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
    .inv-chips .chip{background:var(--bg,#f6f8fb);border:1px solid var(--line);border-radius:10px;padding:8px 10px;display:flex;flex-direction:column;gap:2px}
    .inv-chips .chip .muted{font-size:11px}
    .inv-chips .chip b{font-size:15px}
    @media(max-width:520px){ .inv-chips{grid-template-columns:1fr 1fr} }
    /* Nhóm téc dầu chuyên dụng: thu gọn, click mới xổ ra. */
    .inv-group{margin-top:12px;border:1px solid var(--line);border-radius:14px;background:var(--panel);overflow:hidden}
    .inv-group-h{width:100%;text-align:left;background:var(--accent-soft);color:var(--accent-dark);border:none;box-shadow:none;
      font-weight:800;font-size:13.5px;padding:12px 14px;display:flex;justify-content:space-between;align-items:center;
      gap:10px;cursor:pointer;min-height:auto}
    .inv-group-h .caret{transition:transform .2s;font-size:12px}
    .inv-group-body{padding:12px}
    .inv-group.collapsed .inv-group-body{display:none}
    .inv-group.collapsed .inv-group-h .caret{transform:rotate(-90deg)}
    .toast{position:fixed;left:50%;bottom:80px;transform:translateX(-50%) translateY(12px);background:#1E2A38;color:#fff;
      padding:12px 18px;border-radius:12px;opacity:0;transition:.18s ease;z-index:70;max-width:90%;font-weight:700;box-shadow:0 8px 24px rgba(0,0,0,.18)}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
    .toast.ok{background:var(--ok)}.toast.err{background:var(--danger)}
    .msg{color:var(--danger);font-size:13px;min-height:18px;margin-top:6px}
    .soon{padding:30px 10px;text-align:center;color:var(--muted)}
    .soon .big{font-size:40px}
    /* ---- Modal ---- */
    .modalOverlay{position:fixed;inset:0;background:rgba(20,30,45,.55);display:none;
      align-items:flex-start;justify-content:center;z-index:65;padding:6vh 16px;overflow:auto}
    .modalCard{background:#fff;border-radius:14px;padding:18px;max-width:720px;width:100%;box-shadow:0 20px 50px rgba(16,40,70,.25)}
    .thumb{width:100%;max-height:170px;object-fit:cover;border-radius:10px;border:1px solid var(--line)}
    /* ---- FABs ---- */
    .to-top,.back-fab{display:none;position:fixed;bottom:78px;z-index:50;border:none;cursor:pointer;
      box-shadow:0 4px 12px rgba(0,0,0,.25)}
    .to-top{right:14px;width:46px;height:46px;border-radius:50%;background:var(--accent);color:#fff;font-size:22px}
    .back-fab{left:12px;height:44px;padding:0 16px;border-radius:24px;background:var(--ink);color:#fff;font-size:14px;font-weight:600;align-items:center}
    .to-top.show{display:block}.back-fab.show{display:inline-flex}
    /* ---- Desktop: no bottom bar, pull FABs down ---- */
    @media(min-width:921px){.wrap{padding-bottom:24px}.to-top,.back-fab{bottom:18px}}
    /* ---- Mobile shell ---- */
    @media(max-width:920px){
      h1{font-size:15px}
      .brand-logo{height:30px}
      .workspace{grid-template-columns:1fr}
      .tabbar{display:flex;position:fixed;left:0;right:0;bottom:0;z-index:45;background:var(--panel);
        border-top:1px solid var(--line);box-shadow:0 -2px 10px rgba(0,0,0,.06);
        padding:4px 4px calc(4px + env(safe-area-inset-bottom,0px))}
      .tabbar .tab{flex:1 1 0;display:flex;align-items:center;justify-content:center;background:transparent;
        border:none;box-shadow:none;color:var(--muted);padding:8px 2px;min-height:48px;border-radius:10px;min-width:0}
      .tabbar .tab .tl{font-size:12px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}
      .tabbar .tab.active{color:var(--accent);background:var(--accent-soft)}
      .notif-panel{position:fixed;left:10px;right:10px;top:64px;width:auto}
    }
    /* ---- Mobile: xếp bảng thành thẻ dọc ---- */
    @media(max-width:760px){
      table:not(.line-table):not(.rpt-grid){display:block}
      table:not(.line-table):not(.rpt-grid) thead{display:none}
      table:not(.line-table):not(.rpt-grid) tbody{display:block}
      table:not(.line-table):not(.rpt-grid) tr{display:block;background:var(--panel);border:1px solid var(--line);
        border-radius:12px;box-shadow:var(--shadow);padding:6px 14px;margin-bottom:10px}
      table:not(.line-table):not(.rpt-grid) tbody tr:hover td{background:transparent}
      table:not(.line-table):not(.rpt-grid) td{display:flex;justify-content:space-between;align-items:center;gap:14px;
        padding:9px 0;border-bottom:1px solid var(--line);text-align:right;font-size:14px}
      table:not(.line-table):not(.rpt-grid) tr td:last-child{border-bottom:0}
      table:not(.line-table):not(.rpt-grid) td::before{content:attr(data-label);flex:0 0 auto;text-align:left;
        color:var(--muted);font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.03em}
      table:not(.line-table):not(.rpt-grid) td[data-label='']{justify-content:flex-end}
      table:not(.line-table):not(.rpt-grid) td[data-label='']::before{display:none}
      /* Bảng nhập liệu (nếu có): xếp dọc, nhãn phía trên, ô nhập full-width */
      .line-table,.line-table tbody,.line-table tr,.line-table td{display:block;width:100%}
      .line-table thead{display:none}
      .line-table tr{margin-bottom:6px}
      .line-table td{padding:2px 0;border:none}
      .line-table td::before{content:attr(data-label);display:block;font-size:13px;color:var(--muted);
        font-weight:600;margin:8px 0 4px}
      .line-table input,.line-table select,.line-table textarea{width:100%}
    }
  </style>
</head>
<body>
  <!-- ĐĂNG NHẬP -->
  <div id="loginView" class="wrap">
    <div class="panel" style="max-width:420px;margin:8vh auto 0">
      <h2>Đăng nhập</h2>
      <p class="muted" style="margin-top:-6px">Tồn kho Xăng dầu — Thiên Nhật</p>
      <label>Email</label>
      <input id="loginEmail" type="email" autocomplete="username" placeholder="ban@congty.com">
      <label>Mã PIN</label>
      <input id="loginPin" type="password" inputmode="numeric" autocomplete="current-password" placeholder="••••">
      <div style="margin-top:14px"><button id="loginBtn" style="width:100%">Đăng nhập</button></div>
      <div id="loginMsg" class="msg"></div>
    </div>
  </div>

  <!-- APP -->
  <div id="appView" class="hidden">
    <header>
      <div class="brand">
        <button class="menu-toggle" onclick="toggleDrawer()" aria-label="Menu"><span></span><span></span><span></span></button>
        <img class="brand-logo" src="./logo.png" onerror="this.onerror=null;this.src='./logo.svg'" alt="Thiên Nhật">
        <h1>Tồn kho Xăng dầu</h1>
      </div>
      <div class="header-right">
        <div class="bell-wrap">
          <button class="ghost bell-btn hidden" id="alertBell" title="Cảnh báo tồn" aria-label="Cảnh báo tồn"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg><span id="notifBadge" class="notif-badge hidden">0</span></button>
          <div id="notifPanel" class="notif-panel hidden"></div>
        </div>
        <span id="userBadge" class="badge"></span>
        <button class="ghost sm" id="logoutBtn">Đăng xuất</button>
      </div>
    </header>
    <div id="drawerBackdrop" class="drawer-backdrop hidden" onclick="closeDrawer()"></div>
    <aside id="drawer" class="drawer"></aside>
    <div class="wrap"><div id="screen"></div></div>
    <nav id="tabbar" class="tabbar"></nav>
  </div>

  <div id="toast" class="toast"></div>
  <div id="modal" class="modalOverlay"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="./config.js"></script>
  <script>
    const APP = window.APP_CONFIG || {};
    const sb = window.supabase.createClient(APP.supabaseUrl, APP.supabaseAnonKey, {
      auth: { persistSession: true, autoRefreshToken: true }
    });

    const state = { session:null, user:null, permissions:[], screen:'home' };

    // [id, nhãn, quyền cần có, slice] — server VẪN chốt quyền qua require_permission().
    const SCREENS = [
      ['home',      'Trang chủ',        null,             ''],
      ['guide',     'Hướng dẫn sử dụng',null,             ''],
      ['pump',      'Bơm dầu',          'pump:create',    'S2'],
      ['review',    'Đối chiếu phiếu',  'ledger:flag',    'S2'],
      ['nhap',      'Nhập dầu',         'pump:create',    'S4'],
      ['nhapReview','Đối chiếu nhập',   'pump:review',    'S4'],
      ['inventory', 'Tồn kho',          'inventory:read', 'S5'],
      ['adjust',    'Tịnh téc / Kiểm kê','adjust:manage',  'S6'],
      ['alerts',    'Cảnh báo',         'alert:read',     'S7'],
      ['report',    'Báo cáo tháng',    'report:read',    'S8'],
      ['adminLedger','Sửa phiếu (Admin)','ledger:admin',   'B6'],
      ['catalog',   'Danh mục & Xe',    'catalog:manage', 'S1'],
      ['users',     'Tài khoản',        'user:manage',    '']
    ];
    const ROLE_LABELS = { ThuKho:'Thủ kho', KeToan:'Kế toán tổng hợp', TruongBoPhan:'Trưởng bộ phận', Admin:'Admin' };
    // Thứ tự màn ưu tiên theo vai trò (drawer + tab-bar). Màn không liệt kê xếp sau.
    // Phân quyền theo mục: Thủ kho → 1 Bơm, 2 Nhập, 3 Tồn kho.
    // Trưởng bộ phận + Kế toán → 3 Tồn kho, 4 Tịnh téc, 5 Báo cáo, 6 Đối chiếu phiếu + Danh mục.
    // Admin → tất cả (gồm 7 Sửa phiếu).
    const ROLE_MENU_ORDER = {
      ThuKho:       ['home','pump','nhap','inventory'],
      TruongBoPhan: ['home','inventory','adjust','report','review','catalog'],
      KeToan:       ['home','inventory','adjust','report','review','catalog'],
      Admin:        ['home','pump','nhap','inventory','adjust','report','review','adminLedger','catalog','users']
    };
    // Màn vẫn truy cập được (qua chuông/deep-link) nhưng KHÔNG hiện trong menu drawer/tab.
    const MENU_HIDDEN = ['nhapReview','alerts','guide'];
    // Nhóm màn trong drawer: 'admin' = Quản trị, còn lại = Nghiệp vụ ('home' đứng riêng trên cùng).
    const ADMIN_SCREENS = ['catalog','users'];
    const TAB_LABEL = { home:'Trang chủ', guide:'Hướng dẫn', pump:'Bơm dầu', review:'Đối chiếu', nhap:'Nhập dầu', nhapReview:'Đối chiếu N', inventory:'Tồn kho', adjust:'Tịnh téc', alerts:'Cảnh báo', report:'Báo cáo', adminLedger:'Sửa phiếu', catalog:'Danh mục', users:'Tài khoản' };
    function orderScreensForRole(list){
      const pref = ROLE_MENU_ORDER[state.user && state.user.role] || [];
      return [...list].sort((a,b)=>{ const ia=pref.indexOf(a[0]), ib=pref.indexOf(b[0]); return (ia<0?999:ia)-(ib<0?999:ib); });
    }

    function can(p){ return !p || state.permissions.includes('*') || state.permissions.includes(p); }
    function visibleScreens(){ return SCREENS.filter(s => can(s[2])); }
    // Màn hiển thị trong menu = có quyền và không nằm trong MENU_HIDDEN.
    function menuScreens(){ return visibleScreens().filter(s => !MENU_HIDDEN.includes(s[0])); }
    function esc(v){ return String(v ?? '').replace(/[&<>"']/g, s => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[s])); }
    function val(id){ return (document.getElementById(id)?.value || '').trim(); }
    function toast(t, type='ok'){ const e=document.getElementById('toast'); e.textContent=t; e.className=`toast ${type} show`; clearTimeout(toast._t); toast._t=setTimeout(()=>e.classList.remove('show'),2800); }
    function loadingText(t='Đang tải…'){ return `<div class="loading-line"><span class="spin"></span><span>${esc(t)}</span></div>`; }
    // Gắn data-label (từ <thead th>) cho mỗi <td> → CSS xếp bảng thành thẻ trên điện thoại.
    function labelTableCells(root){
      (root||document).querySelectorAll('table:not(.line-table):not(.rpt-grid)').forEach(tb=>{
        const heads=[...tb.querySelectorAll('thead th')].map(th=>th.textContent.trim());
        if(!heads.length) return;
        tb.querySelectorAll('tbody tr').forEach(tr=>{
          [...tr.children].forEach((td,i)=>{
            if(td.hasAttribute('data-label')) return;
            td.setAttribute('data-label', heads[i]||'');
          });
        });
      });
    }
    // Khoá nút + hiện "Đang xử lý…" trong lúc chạy tác vụ; trả nút về trạng thái cũ khi xong.
    async function withBusy(btn, label, fn){
      const b = btn && btn.tagName ? btn : null; const old = b ? b.textContent : '';
      if(b){ b.disabled=true; b.textContent=label||'Đang xử lý…'; }
      try{ return await fn(); } finally{ if(b){ b.disabled=false; b.textContent=old; } }
    }

    function call(name, params){
      return new Promise((resolve,reject)=>{
        let done=false;
        const timer=setTimeout(()=>{ if(done)return; done=true; reject(new Error(`Tác vụ ${name} chạy quá lâu. Kiểm tra mạng.`)); },45000);
        sb.rpc(name, params||{}).then(({data,error})=>{
          if(done)return; done=true; clearTimeout(timer);
          if(error){ reject(new Error(error.message||String(error))); return; }
          if(data && data.ok===false){ reject(new Error((data.error&&data.error.message)||data.message||`Tác vụ ${name} lỗi.`)); return; }
          resolve(data);
        }).catch(err=>{ if(done)return; done=true; clearTimeout(timer); reject(err instanceof Error?err:new Error(String(err))); });
      });
    }

    async function login(){
      const msg=document.getElementById('loginMsg'); msg.textContent='Đang đăng nhập...';
      const email=val('loginEmail'), pin=val('loginPin');
      if(!email||!pin){ msg.textContent='Nhập email và mã PIN.'; return; }
      try{
        const {data,error}=await sb.auth.signInWithPassword({ email, password:'tn-pin::'+pin });
        if(error) throw error;
        state.session=data.session; msg.textContent=''; await bootstrap();
      }catch(err){ msg.textContent=mapAuthError(err); }
    }
    function mapAuthError(err){
      const m=String(err&&err.message||err||'');
      if(/invalid login credentials/i.test(m)) return 'Email hoặc mã PIN không đúng.';
      if(/email not confirmed/i.test(m)) return 'Tài khoản chưa kích hoạt. Liên hệ Admin.';
      return m || 'Đăng nhập thất bại.';
    }
    async function logout(){ await sb.auth.signOut(); location.reload(); }

    async function bootstrap(){
      try{
        const res=await call('rpc_bootstrap');
        state.user=res.user; state.permissions=res.permissions||[];
        document.getElementById('loginView').classList.add('hidden');
        document.getElementById('appView').classList.remove('hidden');
        document.getElementById('userBadge').textContent=`${state.user.name} · ${ROLE_LABELS[state.user.role]||state.user.role}`;
        const allowed=visibleScreens();
        const hashScreen=(location.hash||'').replace(/^#/,'');
        if(hashScreen && allowed.some(s=>s[0]===hashScreen)) state.screen=hashScreen;
        else if(!allowed.some(s=>s[0]===state.screen)) state.screen=allowed[0][0];
        renderNav(); renderScreen();
        state.histDepth=0;
        try{ history.replaceState({screen:state.screen},'','#'+state.screen); }catch(_){}
        updateBackFab();
        if(can('alert:read')){ call('rpc_alerts_scan').then(()=>refreshAlertBell()).catch(()=>refreshAlertBell()); }
      }catch(err){
        document.getElementById('loginView').classList.remove('hidden');
        document.getElementById('appView').classList.add('hidden');
        document.getElementById('loginMsg').textContent=err.message||'Không tải được dữ liệu.';
      }
    }

    // renderNav() giữ tên cũ (nhiều màn gọi) — nay đồng bộ cả drawer + thanh tab.
    function renderNav(){ renderDrawer(); renderTabBar(); }

    function renderDrawer(){
      const feats = orderScreensForRole(menuScreens());
      const ops = feats.filter(s => s[0]!=='home' && !ADMIN_SCREENS.includes(s[0]));
      const adm = feats.filter(s => ADMIN_SCREENS.includes(s[0]));
      const item = (id,label,idx)=>`<button class="drawer-item ${state.screen===id?'active':''}" onclick="navTo('${id}')">${idx!=null?idx+'. ':''}${esc(label)}</button>`;
      const group = (title,arr)=> arr.length ? `<div class="drawer-group">
          <button class="drawer-group-h" onclick="toggleGroup(this)">${title} <span>▾</span></button>
          <div class="drawer-group-body">${arr.map(([id,label],i)=>item(id,label,i+1)).join('')}</div>
        </div>` : '';
      document.getElementById('drawer').innerHTML = `
        <div class="drawer-brand"><img src="./logo.png" onerror="this.onerror=null;this.src='./logo.svg'" alt="Thiên Nhật"><button class="drawer-x" onclick="closeDrawer()">✕</button></div>
        ${item('home','Trang chủ')}
        ${group('Nghiệp vụ', ops)}
        ${group('Quản trị', adm)}
        <div class="drawer-note">Yêu cầu cụ thể liên hệ <b>ahuyle.work@gmail.com</b></div>`;
    }

    function renderTabBar(){
      const bar=document.getElementById('tabbar'); if(!bar) return;
      const picked = orderScreensForRole(menuScreens()).slice(0,4);
      const tab=(id,label)=>`<button class="tab ${id===state.screen?'active':''}" onclick="navTo('${id}')"><span class="tl">${esc(TAB_LABEL[id]||label)}</span></button>`;
      bar.innerHTML = picked.map(([id,label])=>tab(id,label)).join('') +
        `<button class="tab" onclick="toggleDrawer()"><span class="tl">Thêm</span></button>`;
    }

    function toggleDrawer(){
      const d=document.getElementById('drawer'), b=document.getElementById('drawerBackdrop');
      const open=!d.classList.contains('open');
      if(open) renderDrawer();
      d.classList.toggle('open',open); b.classList.toggle('hidden',!open);
    }
    function closeDrawer(){ document.getElementById('drawer').classList.remove('open'); document.getElementById('drawerBackdrop').classList.add('hidden'); }
    function toggleGroup(el){ el.closest('.drawer-group').classList.toggle('collapsed'); }

    // Chạy lại hiệu ứng hiện dần cho khung nội dung khi ĐỔI màn (giúp cảm giác mượt).
    function playScreenIn(){
      const el=document.getElementById('screen'); if(!el) return;
      el.classList.remove('nav-in'); void el.offsetWidth; el.classList.add('nav-in');
    }
    function navTo(id){
      closeDrawer(); closeNotif();
      if(id!==state.screen){ try{ history.pushState({screen:id},'','#'+id); }catch(_){} state.histDepth=(state.histDepth||0)+1; }
      state.screen=id; renderNav(); renderScreen(); playScreenIn(); updateBackFab();
    }
    window.addEventListener('popstate', e=>{
      const s=e.state&&e.state.screen; if(!s) return;
      state.histDepth=Math.max(0,(state.histDepth||0)-1);
      state.screen=s; renderNav(); renderScreen(); playScreenIn(); updateBackFab();
    });
    function updateBackFab(){ const b=document.getElementById('backFab'); if(b) b.classList.toggle('show',(state.histDepth||0)>0); }
    // Bấm push (S7) khi app đang mở → service worker báo chuyển màn Cảnh báo.
    if('serviceWorker' in navigator){
      navigator.serviceWorker.addEventListener('message', e=>{
        if(e.data && e.data.type==='open-screen' && e.data.screen && state.session) navTo(e.data.screen);
      });
    }

    // ---- Chuông thông báo (panel dùng lại RPC cảnh báo S7) ----
    function closeNotif(){ document.getElementById('notifPanel')?.classList.add('hidden'); }
    function toggleNotif(){
      const p=document.getElementById('notifPanel'); const willOpen=p.classList.contains('hidden');
      if(willOpen) loadNotifPanel();
      p.classList.toggle('hidden',!willOpen);
    }
    async function loadNotifPanel(){
      const p=document.getElementById('notifPanel'); p.innerHTML=`<div class="notif-item">${loadingText('Đang tải cảnh báo…')}</div>`;
      try{
        const res=await call('rpc_alerts_list',{ p_limit:15 }); const rows=res.rows||[];
        p.innerHTML = `<div class="notif-head"><span>Cảnh báo tồn</span>${(res.unread||0)>0?'<button class="ghost sm" id="notifAllRead" style="flex:0">Đọc hết</button>':''}</div>`
          + (rows.length ? rows.map(r=>`<div class="notif-item ${r.read?'':'unread'}">
              <div class="nt-title">${esc(r.title)}</div>
              <div class="nt-body">${esc(r.body)}</div><div class="nt-time">${esc(r.createdAt)}</div></div>`).join('')
              : '<div class="notif-item muted">Chưa có cảnh báo.</div>')
          + `<div style="padding:8px"><button class="ghost sm" style="width:100%" onclick="closeNotif();navTo('alerts')">Xem tất cả</button></div>`;
        const ar=document.getElementById('notifAllRead');
        if(ar) ar.onclick=async()=>{ try{ await call('rpc_alerts_mark_read',{}); loadNotifPanel(); refreshAlertBell(); }catch(e){ toast(e.message,'err'); } };
      }catch(err){ p.innerHTML=`<div class="notif-item"><span class="msg">${esc(err.message)}</span></div>`; }
    }

    function renderScreen(){
      const el=document.getElementById('screen');
      const scr=SCREENS.find(s=>s[0]===state.screen);
      if(state.screen==='home') return renderHome(el);
      if(state.screen==='guide') return renderGuide(el);
      if(state.screen==='users') return renderUsers(el);
      if(state.screen==='catalog') return renderCatalog(el);
      if(state.screen==='pump') return renderPump(el);
      if(state.screen==='review') return renderReview(el);
      if(state.screen==='nhap') return renderNhap(el);
      if(state.screen==='nhapReview') return renderNhapReview(el);
      if(state.screen==='inventory') return renderInventory(el);
      if(state.screen==='adjust') return renderAdjust(el);
      if(state.screen==='alerts') return renderAlerts(el);
      if(state.screen==='report') return renderReport(el);
      if(state.screen==='adminLedger') return renderAdminLedger(el);
      // Placeholder cho các slice chưa build
      el.innerHTML=`<div class="panel soon">
        <h2>${esc(scr[1])}</h2>
        <p class="muted">Màn hình này sẽ được xây ở lát <b>${scr[3]}</b> theo lộ trình (xem docs/issues).</p></div>`;
    }

    // Việc chính theo từng vai trò — dùng chung cho Trang chủ và trang Hướng dẫn sử dụng.
    const ROLE_GUIDE = {
      ThuKho: {
        intro:'Bạn phụ trách ghi nhận lượng dầu bơm ra cho xe và lượng dầu nhập về téc mỗi ngày, luôn kèm ảnh chứng từ để bộ phận sau đối chiếu.',
        tasks:[
          ['Bơm dầu','Ghi lại từng lần bơm dầu cho xe của công ty hoặc bơm bán ra ngoài. Chọn xe, chọn téc lấy dầu, nhập số lít và ngày, sau đó chụp ảnh đồng hồ bơm và ảnh công-tơ-mét của xe. Bấm Lưu phiếu để lưu phiếu kèm ảnh.'],
          ['Nhập dầu','Ghi lại từng lần nhận dầu từ nhà cung cấp về téc. Chọn nhà cung cấp, chọn téc, nhập số lít thực nhận và số hóa đơn, kèm ảnh biên bản giao nhận và ảnh phiếu nhập kho.'],
          ['Tồn kho','Xem nhanh lượng dầu còn lại trong từng téc so với sức chứa, mức tiêu hao trung bình mỗi ngày và số ngày tồn còn lại.'],
        ]
      },
      TruongBoPhan: {
        intro:'Bạn theo dõi tồn kho, đối chiếu các phiếu do thủ kho tạo, thực hiện tịnh téc và kiểm kê, và xem báo cáo tiêu hao hằng tháng.',
        tasks:[
          ['Tồn kho','Theo dõi mức tồn của từng téc theo thời gian thực và các cảnh báo cần đặt hàng.'],
          ['Tịnh téc và kiểm kê','Đặt lại tồn dầu gốc, ghi tịnh téc khi téc cạn, và ghi kiểm kê giữa chừng kèm biên bản xác nhận.'],
          ['Đối chiếu phiếu','Xem lại các phiếu bơm và phiếu nhập, đánh dấu lệch nếu có sai khác để người tạo sửa lại.'],
          ['Báo cáo tháng','Xem báo cáo tiêu hao tổng hợp và chi tiết theo từng xe, từng ngày.'],
        ]
      },
      KeToan: {
        intro:'Bạn phụ trách số liệu tồn kho, đối chiếu chứng từ, tịnh téc và kiểm kê, cùng các báo cáo tiêu hao phục vụ kế toán.',
        tasks:[
          ['Tồn kho','Theo dõi mức tồn, tiêu hao trung bình và các cảnh báo đặt hàng của từng téc.'],
          ['Tịnh téc và kiểm kê','Đặt lại tồn dầu gốc, ghi tịnh téc và ghi kiểm kê kèm biên bản xác nhận, có lưu người kiểm kê và thời điểm.'],
          ['Đối chiếu phiếu','Kiểm tra các phiếu bơm và phiếu nhập, đánh dấu lệch khi cần sửa lại.'],
          ['Báo cáo tháng','Xuất và xem báo cáo tiêu hao tổng hợp cùng bảng chi tiết theo định mức.'],
        ]
      },
      Admin: {
        intro:'Bạn có toàn quyền quản trị hệ thống: mọi nghiệp vụ, sửa hoặc xóa phiếu đã duyệt, quản lý danh mục và tài khoản người dùng.',
        tasks:[
          ['Toàn bộ nghiệp vụ','Truy cập tất cả chức năng của thủ kho, trưởng bộ phận và kế toán.'],
          ['Sửa phiếu','Sửa hoặc xóa trực tiếp phiếu đã duyệt khi cần chỉnh sai sót; mọi thay đổi đều được ghi lại vào lịch sử.'],
          ['Danh mục và Xe','Quản lý danh sách téc, loại dầu, xe, nhà cung cấp và các định mức.'],
          ['Tài khoản','Tạo tài khoản, đặt lại mã PIN và phân vai trò cho người dùng.'],
        ]
      }
    };
    function renderHome(el){
      const items=visibleScreens().filter(s=>s[0]!=='home'&&s[0]!=='guide');
      const g=ROLE_GUIDE[state.user.role];
      const guideBlock = g ? `<div class="panel">
        <h2 style="margin:0 0 4px">Việc chính của bạn</h2>
        <p class="muted" style="margin:0 0 10px">${esc(g.intro)}</p>
        ${g.tasks.map(t=>`<div style="padding:8px 0;border-top:1px solid var(--line)">
          <b>${esc(t[0])}</b><div class="muted" style="margin-top:2px">${esc(t[1])}</div></div>`).join('')}
        <div style="margin-top:12px"><button data-go="guide" style="flex:0">Xem hướng dẫn sử dụng đầy đủ</button></div>
      </div>` : '';
      el.innerHTML=`<div class="panel">
        <h2>Xin chào, ${esc(state.user.name)}</h2>
        <p class="muted">Vai trò: <b>${ROLE_LABELS[state.user.role]||state.user.role}</b>. Chọn chức năng bên dưới.</p>
        <div class="row" style="margin-top:8px">
          ${items.map(s=>`<button class="ghost" data-go="${s[0]}">${esc(s[1])}</button>`).join('')}
        </div>
      </div>
      ${guideBlock}`;
      el.querySelectorAll('[data-go]').forEach(b=> b.onclick=()=>navTo(b.dataset.go));
    }

    // ---- Trang Hướng dẫn sử dụng (mọi vai trò đều xem được) ----
    // Mô tả đầy đủ từng chức năng cùng các quy tắc bảo vệ và trường hợp ngoại lệ.
    const GUIDE_FEATURES = [
      ['Bơm dầu','Dùng để ghi lại mỗi lần bơm dầu ra khỏi téc: bơm cho xe của công ty hoặc bơm bán cho khách bên ngoài. Với mỗi phiếu, người tạo chọn loại giao dịch, chọn xe, chọn téc lấy dầu, nhập số lít và ngày thực hiện, rồi đính kèm ảnh đồng hồ bơm và ảnh công-tơ-mét. Phiếu bơm cho xe của công ty sẽ trừ vào tồn của téc; phiếu bơm bán ra ngoài không trừ tồn téc.'],
      ['Nhập dầu','Dùng để ghi lại mỗi lần nhận dầu từ nhà cung cấp về téc. Người tạo chọn nhà cung cấp, chọn téc chứa, nhập số lít thực nhận và số hóa đơn, đính kèm ảnh biên bản giao nhận và ảnh phiếu nhập kho. Sau khi duyệt, số lít này được cộng vào tồn của téc.'],
      ['Tồn kho','Hiển thị mức tồn của từng téc theo thời gian thực. Phần đầu là các con số tổng hợp của toàn kho. Tiếp theo là thẻ trực quan của từng téc với thanh màu thể hiện lượng dầu hiện có so với sức chứa, kèm tiêu hao trung bình mỗi ngày và số ngày tồn còn lại. Cuối cùng là bảng số liệu chi tiết đầy đủ.'],
      ['Tịnh téc và kiểm kê','Gồm ba việc. Đặt tồn dầu gốc là ghi một lần con số đo tay tại thời điểm bắt đầu theo dõi một téc. Tịnh téc dùng khi téc cạn, ghi lại tồn thực tế trong khoảng từ ngày bắt đầu đến ngày chốt để hệ thống tính chênh lệch và phân bổ cho các xe. Kiểm kê dùng khi kiểm tra giữa chừng, ghi lại tồn thực tế kèm người kiểm kê, thời điểm và ảnh biên bản xác nhận.'],
      ['Đối chiếu phiếu','Người có quyền đối chiếu xem lại các phiếu bơm và phiếu nhập, so sánh với ảnh chứng từ. Nếu phát hiện sai khác, đánh dấu phiếu là lệch kèm lý do để người tạo sửa lại; nếu đúng thì duyệt phiếu để đưa vào tồn kho.'],
      ['Báo cáo tháng','Tổng hợp lượng tiêu hao theo tháng: bảng tổng hợp toàn bộ, bảng diesel theo từng ngày và bảng chi tiết theo định mức của từng xe. Có thể xuất ra tệp bảng tính để lưu trữ.'],
      ['Danh mục và Xe','Quản lý các danh sách nền của hệ thống: téc chứa, loại dầu, xe, nhà cung cấp và các định mức như thời gian chờ nhà cung cấp. Đây là nơi khai báo dữ liệu trước khi bắt đầu ghi phiếu.'],
      ['Sửa phiếu','Chỉ dành cho Admin. Cho phép sửa hoặc xóa trực tiếp một phiếu kể cả khi đã duyệt, phục vụ việc chỉnh sửa sai sót. Mọi thao tác đều được ghi lại vào lịch sử để tra cứu về sau.'],
      ['Tài khoản','Chỉ dành cho Admin. Tạo tài khoản mới, phân vai trò, đặt lại mã PIN và khóa hoặc mở tài khoản người dùng.'],

    const GUIDE_RULES = [
      ['Phiếu phải được duyệt mới ảnh hưởng tồn kho','Một phiếu bơm hoặc phiếu nhập chỉ thực sự cộng hoặc trừ vào tồn của téc sau khi được duyệt. Phiếu còn ở trạng thái nháp hoặc chờ đối chiếu chưa làm thay đổi tồn kho.'],
      ['Bắt buộc có ảnh chứng từ','Phiếu bơm cần ảnh đồng hồ bơm và ảnh công-tơ-mét. Phiếu nhập cần ảnh biên bản giao nhận và ảnh phiếu nhập kho. Đây là căn cứ để đối chiếu và tránh sai sót.'],
      ['Kiểm kê bắt buộc có biên bản xác nhận','Mỗi lần ghi kiểm kê đều phải đính kèm ảnh biên bản xác nhận. Hệ thống lưu lại người kiểm kê và thời điểm kiểm kê để bảo đảm tính minh bạch.'],
      ['Bơm bán ra ngoài không trừ tồn téc','Chỉ phiếu bơm cho xe của công ty mới trừ vào tồn của téc. Phiếu bơm bán cho khách bên ngoài được ghi nhận riêng và không làm giảm tồn téc.'],
      ['Chênh lệch khi tịnh téc và kiểm kê','Khi tồn thực tế thấp hơn tồn trên sổ, phần thiếu được ghi là tịnh âm; khi cao hơn, phần dư được ghi là tịnh dương. Hệ thống phân bổ phần chênh lệch cho các xe đã bơm trong kỳ theo tỉ lệ số lít.'],
      ['Chỉ Admin được sửa hoặc xóa phiếu đã duyệt','Người dùng thường không thể thay đổi phiếu sau khi đã duyệt. Khi cần chỉnh sửa sai sót, hãy đề nghị Admin. Mọi thay đổi của Admin đều được lưu vào lịch sử.'],
    ];
    const GUIDE_EXCEPTIONS = [
      ['Lưu phiếu nhưng tải ảnh bị lỗi','Nếu phiếu đã lưu mà ảnh tải lên thất bại (thường do mạng yếu), hãy mở lại phiếu ở danh sách bên dưới và chọn ảnh để tải lại. Số liệu phiếu vẫn được giữ.'],
      ['Ghi kiểm kê bị lỗi sau khi đã chọn ảnh','Nếu quá trình ghi kiểm kê thất bại, ảnh biên bản vừa tải lên sẽ được hệ thống tự dọn để không để lại tệp thừa. Hãy kiểm tra lại thông tin và ghi lại.'],
      ['Nhập sai số liệu một phiếu đã duyệt','Không tự sửa bằng cách tạo phiếu bù. Hãy báo Admin để sửa hoặc xóa đúng phiếu đó, giữ cho số liệu tồn kho chính xác và có lịch sử rõ ràng.'],
      ['Tồn kho hiển thị số âm','Số âm nghĩa là lượng xuất ghi nhận đang nhiều hơn lượng nhập cộng tồn gốc. Thường do thiếu phiếu nhập chưa ghi, sai téc, hoặc chưa đặt tồn dầu gốc. Hãy rà soát lại các phiếu của téc đó.'],
      ['Quên mã PIN đăng nhập','Liên hệ Admin để được đặt lại mã PIN mới. Vì lý do an toàn, hệ thống không hiển thị lại mã PIN cũ.'],
    ];
    function renderGuide(el){
      const g=ROLE_GUIDE[state.user.role];
      const roleBlock = g ? `<div class="panel">
        <h2 style="margin:0 0 4px">Dành cho vai trò của bạn: ${esc(ROLE_LABELS[state.user.role]||state.user.role)}</h2>
        <p class="muted" style="margin:0 0 10px">${esc(g.intro)}</p>
        ${g.tasks.map(t=>`<div style="padding:8px 0;border-top:1px solid var(--line)">
          <b>${esc(t[0])}</b><div class="muted" style="margin-top:2px">${esc(t[1])}</div></div>`).join('')}
      </div>` : '';
      const section=(title,intro,items)=>`<div class="panel">
        <h2 style="margin:0 0 ${intro?'4':'8'}px">${esc(title)}</h2>
        ${intro?`<p class="muted" style="margin:0 0 8px">${esc(intro)}</p>`:''}
        ${items.map(t=>`<div style="padding:10px 0;border-top:1px solid var(--line)">
          <b>${esc(t[0])}</b><div class="muted" style="margin-top:3px;line-height:1.5">${esc(t[1])}</div></div>`).join('')}
      </div>`;
      el.innerHTML=`<div class="panel">
        <h2 style="margin:0 0 4px">Hướng dẫn sử dụng</h2>
        <p class="muted" style="margin:0">Hệ thống quản lý tồn kho xăng dầu ghi nhận toàn bộ quá trình bơm dầu ra và nhập dầu về, theo dõi tồn kho theo thời gian thực, và phục vụ đối chiếu, kiểm kê cùng báo cáo. Mỗi người dùng đăng nhập bằng email và mã PIN, và chỉ thấy những chức năng thuộc vai trò của mình.</p>
      </div>
      ${roleBlock}
      ${section('Các chức năng của hệ thống','Mô tả đầy đủ từng chức năng, sắp xếp theo trình tự công việc.',GUIDE_FEATURES)}
      ${section('Quy tắc quan trọng cần tuân thủ','Những nguyên tắc bảo đảm số liệu chính xác và minh bạch.',GUIDE_RULES)}
      ${section('Các trường hợp ngoại lệ và cách xử lý','Hướng dẫn xử lý khi gặp tình huống bất thường.',GUIDE_EXCEPTIONS)}
      <div class="panel"><button class="ghost" data-go="home" style="flex:0">Quay về Trang chủ</button></div>`;
      el.querySelectorAll('[data-go]').forEach(b=> b.onclick=()=>navTo(b.dataset.go));
    }

    // ---- Màn Tài khoản (Admin) — chạy thật ----
    async function renderUsers(el){
      el.innerHTML=`<div class="workspace"><div class="panel sticky-col">
        <h2>Tạo tài khoản</h2>
        <p class="muted" style="margin:-4px 0 14px">Cấp quyền truy cập cho nhân sự theo vai trò.</p>
        <label>Email</label>
        <input id="uEmail" type="email" placeholder="nguoidung@congty.com">
        <label>Tên</label>
        <input id="uName" placeholder="Họ tên">
        <div class="row">
          <div><label>Vai trò</label><select id="uRole">
            <option value="ThuKho">Thủ kho</option>
            <option value="TruongBoPhan">Trưởng bộ phận</option>
            <option value="KeToan">Kế toán tổng hợp</option>
            <option value="Admin">Admin</option>
          </select></div>
          <div><label>Mã PIN (≥4 số)</label><input id="uPin" inputmode="numeric" placeholder="••••"></div>
        </div>
        <div style="margin-top:16px"><button id="uCreate" style="width:100%">Tạo tài khoản</button></div>
        <div id="uMsg" class="msg"></div>
      </div>
      <div class="panel"><div class="list-head"><h2>Danh sách tài khoản</h2><span id="uCount" class="count-pill hidden"></span></div><div id="uList" class="muted">${loadingText()}</div></div></div>`;
      document.getElementById('uCreate').onclick=createUser;
      loadUsers();
    }
    async function loadUsers(){
      const box=document.getElementById('uList');
      try{
        const res=await call('rpc_admin_list_users');
        const rows=res.rows||[];
        const cnt=document.getElementById('uCount');
        if(cnt){ cnt.textContent=rows.length; cnt.classList.toggle('hidden',!rows.length); }
        if(!rows.length){ box.innerHTML='<span class="muted">Chưa có tài khoản.</span>'; return; }
        box.innerHTML=`<table><thead><tr><th>Email</th><th>Tên</th><th>Vai trò</th><th>Trạng thái</th><th></th></tr></thead><tbody>
          ${rows.map(r=>`<tr>
            <td>${esc(r.email)}</td><td>${esc(r.name)}</td>
            <td>${ROLE_LABELS[r.role]||esc(r.role)}</td>
            <td>${r.status==='Hoạt động'?'<span class="badge">Hoạt động</span>':esc(r.status)}</td>
            <td style="white-space:nowrap">
              <button class="ghost sm" data-pin="${r.id}" data-email="${esc(r.email)}">Đổi PIN</button>
              <button class="ghost sm" data-toggle="${r.id}" data-status="${esc(r.status)}">${r.status==='Hoạt động'?'Ngừng':'Bật'}</button>
            </td></tr>`).join('')}
        </tbody></table>`;
        box.querySelectorAll('[data-pin]').forEach(b=> b.onclick=()=>resetPin(b.dataset.pin,b.dataset.email));
        box.querySelectorAll('[data-toggle]').forEach(b=> b.onclick=()=>toggleUser(b.dataset.toggle, b.dataset.status));
      }catch(err){ box.innerHTML=`<span class="msg">${esc(err.message)}</span>`; }
    }
    async function createUser(){
      const msg=document.getElementById('uMsg'); msg.textContent='';
      try{
        await call('rpc_admin_create_user',{ p_email:val('uEmail'), p_name:val('uName'), p_role:val('uRole'), p_pin:val('uPin') });
        toast('Đã tạo tài khoản.'); ['uEmail','uName','uPin'].forEach(id=>document.getElementById(id).value=''); loadUsers();
      }catch(err){ msg.textContent=err.message; }
    }
    async function resetPin(id,email){
      const pin=(prompt(`Đặt lại PIN cho ${email} (≥4 số):`,'')||'').trim();
      if(!pin) return;
      try{ await call('rpc_admin_reset_pin',{ p_id:id, p_pin:pin }); toast('Đã đặt lại PIN.'); }
      catch(err){ toast(err.message); }
    }
    async function toggleUser(id,status){
      const next = status==='Hoạt động' ? 'Ngừng' : 'Hoạt động';
      try{ await call('rpc_admin_update_user',{ p_id:id, p_status:next }); toast('Đã cập nhật.'); loadUsers(); }
      catch(err){ toast(err.message); }
    }

    // ---- Màn Danh mục & Xe (Kế toán / Admin) ----
    const CAT_TABS = [
      ['tanks',    'Téc'],
      ['vehicles', 'Xe'],
      ['oilTypes', 'Loại dầu'],
      ['suppliers','Nhà cung cấp'],
      ['txnTypes', 'Loại giao dịch']
    ];
    function num(v){ const n=parseFloat(String(v).replace(',','.')); return isNaN(n)?0:n; }
    function fmtNum(v){ return (v==null||v==='')?'':Number(v).toLocaleString('vi-VN'); }

    async function renderCatalog(el){
      if(!state.catTab) state.catTab='tanks';
      el.innerHTML=`<div class="nav" style="position:static;padding:0 0 12px;border:none" id="catNav"></div>
        <div id="catBody" class="muted">Đang tải…</div>`;
      const nav=document.getElementById('catNav');
      nav.innerHTML=CAT_TABS.map(t=>`<button data-t="${t[0]}" class="${t[0]===state.catTab?'active':''}">${esc(t[1])}</button>`).join('');
      nav.querySelectorAll('button').forEach(b=> b.onclick=()=>{ state.catTab=b.dataset.t; state.catEdit=null; renderCatalog(el); });
      try{
        state.catalog=await call('rpc_catalog_list');
        renderCatTab();
      }catch(err){ document.getElementById('catBody').innerHTML=`<span class="msg">${esc(err.message)}</span>`; }
    }

    function renderCatTab(){
      const body=document.getElementById('catBody'); if(!body) return;
      const tab=state.catTab;
      if(tab==='tanks')     return renderTankTab(body);
      if(tab==='vehicles')  return renderVehicleTab(body);
      if(tab==='oilTypes')  return renderOilTypeTab(body);
      if(tab==='suppliers') return renderSupplierTab(body);
      if(tab==='txnTypes')  return renderTxnTypeTab(body);
    }

    function statusCell(active){ return active?'<span class="badge">Hoạt động</span>':'<span class="muted">Ngừng</span>'; }
    function rowActions(kind, r){
      return `<button class="ghost sm" data-edit="${r.id}">Sửa</button>
        <button class="ghost sm" data-toggle="${r.id}" data-active="${r.active?1:0}">${r.active?'Ngừng':'Bật'}</button>`
        + (kind!=='txnType' ? `<button class="ghost sm" data-catdel="${r.id}" style="color:var(--danger)">Xóa</button>` : '');
    }
    async function catDelete(kind, id){
      if(!confirm('Xóa vĩnh viễn mục này? Nếu đã có dữ liệu liên quan sẽ không xóa được — hãy dùng "Ngừng".')) return;
      try{ await call('rpc_catalog_delete',{ p_kind:kind, p_id:id }); toast('Đã xóa.');
        state.catalog=await call('rpc_catalog_list'); renderCatTab(); }
      catch(err){ toast(err.message); }
    }
    async function catToggle(kind, id, active){
      try{ await call('rpc_catalog_toggle',{ p_kind:kind, p_id:id, p_active:!active }); toast('Đã cập nhật.');
        state.catalog=await call('rpc_catalog_list'); renderCatTab(); }
      catch(err){ toast(err.message); }
    }
    async function catSave(rpc, params, msgId){
      const msg=document.getElementById(msgId); if(msg) msg.textContent='';
      try{ await call(rpc, params); toast('Đã lưu.'); state.catEdit=null;
        state.catalog=await call('rpc_catalog_list'); renderCatTab(); }
      catch(err){ if(msg) msg.textContent=err.message; else toast(err.message); }
    }

    // --- Téc ---
    function renderTankTab(body){
      const rows=state.catalog.tanks||[], oils=state.catalog.oilTypes||[];
      const e=(state.catEdit&&rows.find(r=>r.id===state.catEdit))||null;
      const oilOpts=`<option value="">— chọn loại dầu —</option>`+oils.map(o=>`<option value="${o.id}" ${e&&e.oilTypeId===o.id?'selected':''}>${esc(o.name)}</option>`).join('');
      body.innerHTML=`<div class="workspace"><div class="panel sticky-col"><h2>${e?'Sửa téc':'Thêm téc'}</h2>
        <div class="row">
          <div><label>Tên téc</label><input id="tName" value="${e?esc(e.name):''}" placeholder="Téc 1"></div>
          <div><label>Loại dầu</label><select id="tOil">${oilOpts}</select></div>
        </div>
        <div class="row">
          <div><label>Sức chứa (lít)</label><input id="tCap" inputmode="decimal" value="${e?esc(e.capacity):''}"></div>
          <div><label>Reorder point (lít)</label><input id="tReorder" inputmode="decimal" value="${e?esc(e.reorderPoint):''}"></div>
        </div>
        <div class="row">
          <div><label>Lead-time (ngày)</label><input id="tLead" inputmode="numeric" value="${e?esc(e.leadTimeDays):''}"></div>
          <div></div>
        </div>
        <div class="actions">
          <button id="tSave" style="flex:0">${e?'Lưu':'Thêm'}</button>
          ${e?'<button class="ghost" id="tCancel" style="flex:0">Hủy</button>':''}
        </div><div id="tMsg" class="msg"></div></div>
        <div class="panel"><div class="list-head"><h2>Danh sách téc</h2>${rows.length?`<span class="count-pill">${rows.length}</span>`:''}</div>${rows.length?`<table><thead><tr>
          <th>Tên</th><th>Loại dầu</th><th>Sức chứa</th><th>Reorder</th><th>Lead-time</th><th>Trạng thái</th><th></th></tr></thead><tbody>
          ${rows.map(r=>`<tr><td>${esc(r.name)}</td><td>${esc(r.oilTypeName||'')}</td>
            <td>${fmtNum(r.capacity)}</td><td>${fmtNum(r.reorderPoint)}</td><td>${esc(r.leadTimeDays)}</td>
            <td>${statusCell(r.active)}</td><td style="white-space:nowrap">${rowActions('tank',r)}</td></tr>`).join('')}
          </tbody></table>`:'<span class="muted">Chưa có téc.</span>'}</div></div>`;
      document.getElementById('tSave').onclick=()=>catSave('rpc_tank_upsert',{
        p_id:e?e.id:null, p_name:val('tName'), p_oil_type_id:val('tOil')||null,
        p_capacity:num(val('tCap')), p_reorder:num(val('tReorder')),
        p_lead_time_days:Math.round(num(val('tLead'))), p_active:e?e.active:true },'tMsg');
      wireEditToggle(body,'tank');
    }

    // --- Xe ---
    function renderVehicleTab(body){
      const rows=state.catalog.vehicles||[];
      const e=(state.catEdit&&rows.find(r=>r.id===state.catEdit))||null;
      body.innerHTML=`<div class="workspace"><div class="panel sticky-col"><h2>${e?'Sửa xe':'Thêm xe'}</h2>
        <div class="row">
          <div><label>Biển số</label><input id="vPlate" value="${e?esc(e.plate):''}" placeholder="51C-123.45"></div>
          <div><label>Định mức bơm</label><input id="vNorm" inputmode="decimal" value="${e?esc(e.pumpNorm):''}"></div>
        </div>
        <label>Đơn vị</label>
        <select id="vEntity">
          ${['Thiên Nhật','Lâm Hải'].map(x=>`<option value="${x}" ${((e&&e.entity)||'Thiên Nhật')===x?'selected':''}>${x}</option>`).join('')}
        </select>
        <label style="display:flex;align-items:center;gap:8px;margin-top:12px">
          <input type="checkbox" id="vOdo" style="width:auto;min-height:auto" ${(!e||e.hasOdometer)?'checked':''}> Có công-tơ-mét (đồng hồ KM)</label>
        <div class="actions">

    function wireEditToggle(body, kind){
      body.querySelectorAll('[data-edit]').forEach(b=> b.onclick=()=>{ state.catEdit=b.dataset.edit; renderCatTab(); });
      body.querySelectorAll('[data-toggle]').forEach(b=> b.onclick=()=>catToggle(kind, b.dataset.toggle, b.dataset.active==='1'));
      body.querySelectorAll('[data-catdel]').forEach(b=> b.onclick=()=>catDelete(kind, b.dataset.catdel));
      ['tCancel','vCancel','oCancel','sCancel','xCancel'].forEach(id=>{
        const c=document.getElementById(id); if(c) c.onclick=()=>{ state.catEdit=null; renderCatTab(); };
      });
    }

    // ---- Danh mục active dùng chung cho dropdown nhập liệu ----
    async function ensureActive(force){
      if(state.active && !force) return state.active;
      state.active=await call('rpc_catalog_active');
      return state.active;
    }

    // ---- Màn Nhập bơm (ThuKho) ----
    const STATUS_LABEL={ Nhap:'Nháp', ChoDoiChieu:'Chờ đối chiếu', DaDuyet:'Đã duyệt' };
    async function renderPump(el){
      el.innerHTML=`<div class="panel">${loadingText()}</div>`;
      try{ await ensureActive(); await loadPumpMine(); renderPumpUI(el); }
      catch(err){ el.innerHTML=`<div class="panel"><span class="msg">${esc(err.message)}</span></div>`; }
    }
    async function loadPumpMine(){ state.pumpMine=(await call('rpc_pump_list_mine')).rows||[]; }

    function renderPumpUI(el){
      const a=state.active, e=(state.pumpEdit&&state.pumpMine.find(r=>r.id===state.pumpEdit&&r.status==='Nhap'))||null;
      if(!state.pumpStage) state.pumpStage={};
      const txns=(a.txnTypes||[]).filter(t=>t.kind!=='nhap');
      const veh=a.vehicles||[], tanks=a.tanks||[], oils=a.oilTypes||[], sups=a.suppliers||[];
      const sel=(id,v)=>v&&v===id?'selected':'';
      const opt=(arr,idKey,labelKey,cur)=>arr.map(x=>`<option value="${x[idKey]}" ${sel(x[idKey],cur)}>${esc(x[labelKey])}</option>`).join('');
      const curKind = e ? e.txnKind : (txns[0]&&txns[0].kind);
      const today = new Date().toISOString().slice(0,10);
      const eDate = (e && e.entryDate) ? e.entryDate : today;
      el.innerHTML=`<div class="panel"><h2>${e?`Sửa phiếu ${e.code?esc(e.code):'nháp'}`:'Phiếu bơm mới'}</h2>
        <div class="row">
          <div><label>Ngày bơm <span class="rq">*</span></label><input id="pDate" class="req" type="date" value="${esc(eDate)}">
            <div class="fnote">Ngày thực tế bơm dầu. Mặc định hôm nay — chỉ đổi nếu nhập bù cho ngày khác.</div></div>
          <div><label>Xe <span class="rq">*</span></label><select id="pVeh" class="req"><option value="">— chọn xe —</option>${opt(veh,'id','plate',e&&e.vehicleId)}</select>
            <div class="fnote">Chọn xe được bơm. Hệ thống tự lấy KM cũ của xe này.</div></div>
        </div>
        <div class="row">
          <div><label>Loại giao dịch <span class="rq">*</span></label><select id="pTxn" class="req">${txns.map(t=>`<option value="${t.id}" data-kind="${t.kind}" ${sel(t.id,e&&e.txnTypeId)}>${esc(t.name)}</option>`).join('')}</select>
            <div class="fnote">Bơm cho xe (trừ tồn téc) hay Bơm ngoài (mua ngoài, không trừ tồn).</div></div>
        </div>
        <div class="row">
          <div id="pTankWrap"><label>Téc <span class="rq">*</span></label><select id="pTank" class="req"><option value="">— chọn téc —</option>${opt(tanks,'id','name',e&&e.tankId)}</select>
            <div class="fnote">Téc lấy dầu ra để bơm. Bỏ trống khi Bơm ngoài.</div></div>
          <div><label>Loại dầu <span class="rq">*</span></label><select id="pOil" class="req"><option value="">— chọn loại dầu —</option>${opt(oils,'id','name',e&&e.oilTypeId)}</select>
            <div class="fnote">Loại dầu bơm (thường trùng loại dầu của téc đã chọn).</div></div>
        </div>
        <div class="row">
          <div><label>Số lít <span class="rq">*</span></label><input id="pLit" class="req" inputmode="decimal" value="${e?esc(e.liters):''}">
            <div class="fnote">Số lít đã bơm theo đồng hồ bơm. Nhập số dương.</div></div>
          <div id="pKmWrap" class="row" style="flex:2;margin:0">
            <div><label>KM cũ (tự động)</label><input id="pKmOld" inputmode="decimal" readonly
              style="background:var(--bg);color:var(--muted)" value="${e&&e.kmOld!=null?esc(e.kmOld):''}">
              <div class="fnote">Chỉ số công-tơ-mét lần bơm trước — hệ thống tự điền.</div></div>
            <div><label>KM mới</label><input id="pKmNew" inputmode="decimal" value="${e&&e.kmNew!=null?esc(e.kmNew):''}">
              <div class="fnote">Chỉ số công-tơ-mét hiện tại. Bắt buộc khi xe có công-tơ-mét.</div></div>
          </div>
        </div>
        <div id="pKmHint" class="muted" style="font-size:13px;min-height:18px"></div>
        <div id="pSupWrap"><label>Nhà cung cấp (bơm ngoài) <span class="rq">*</span></label><select id="pSup" class="req"><option value="">—</option>${opt(sups,'id','name',e&&e.supplierId)}</select>
          <div class="fnote">Nơi mua dầu khi Bơm ngoài. Chỉ hiện khi chọn loại Bơm ngoài.</div></div>
        <label>Ghi chú</label><input id="pNote" value="${e&&e.note?esc(e.note):''}">
        <div class="fnote">Không bắt buộc. Ghi thêm thông tin bất thường của lần bơm.</div>
        <div id="photoWrap" style="margin-top:14px;border-top:1px solid var(--line);padding-top:12px">
          <label>Ảnh chứng từ <span class="rq">*</span></label>
          <div class="fnote">Ảnh đồng hồ bơm (bắt buộc) và ảnh công-tơ-mét (nếu xe có công-tơ-mét). Chọn ảnh rồi bấm <b>Lưu phiếu</b> — hệ thống lưu phiếu kèm ảnh vào danh sách bên dưới.</div>
          <div id="photoBox" style="margin-top:8px"></div>
        </div>
        <div class="row" style="margin-top:14px;flex:0">
          <button id="pSave" style="flex:0">${e?'Lưu':'Lưu phiếu'}</button>
          ${e?'<button class="ghost" id="pCancel" style="flex:0">Hủy</button>':''}
        </div><div id="pMsg" class="msg"></div>
      </div>
      <div class="panel"><div class="row" style="align-items:center"><h2 style="flex:1;margin:0">Phiếu đã lưu</h2>
        <button id="pSubmit" class="sm" style="flex:0">Submit ngày</button></div>
        <div class="fnote" style="margin-top:2px">Bấm vào một phiếu để xem chi tiết và ảnh. Submit ngày để duyệt cả lô vào tồn kho.</div>
        <div id="pList" style="margin-top:12px"></div></div>`;

      const setKindUI=()=>{
        const kOpt=document.getElementById('pTxn').selectedOptions[0];
        const kind=kOpt?kOpt.dataset.kind:curKind;
        document.getElementById('pTankWrap').style.display = kind==='bom_ngoai'?'none':'';
        document.getElementById('pSupWrap').style.display = kind==='bom_ngoai'?'':'none';
      };
      // Ẩn cả khu KM khi xe không có công-tơ-mét (không nhập KM).
      const setKmUI=()=>{
        const hasOdo = vehHasOdo(val('pVeh'));
        document.getElementById('pKmWrap').style.display = hasOdo?'':'none';
        if(!hasOdo){ document.getElementById('pKmNew').value=''; document.getElementById('pKmHint').textContent=''; }
      };
      const kmHint=()=>{
        const o=num(val('pKmOld')), n=num(val('pKmNew')), h=document.getElementById('pKmHint');
        if(!val('pKmOld')){ h.textContent=val('pKmNew')?'Chưa có KM cũ trong hệ thống — lần bơm đầu của xe này.':''; h.style.color='var(--muted)'; return; }
        if(!val('pKmNew')){ h.textContent=`KM cũ trong hệ thống: ${fmtNum(o)}. Nhập KM mới để hệ thống tự trừ.`; h.style.color='var(--muted)'; return; }
        const d=n-o; h.textContent = d<0?`Lưu ý: KM mới nhỏ hơn KM cũ (${fmtNum(d)}).`:`KM đi (tự trừ): ${fmtNum(d)}`;
        h.style.color = d<0?'var(--danger)':'var(--muted)';
      };
      document.getElementById('pTxn').onchange=setKindUI;
      document.getElementById('pKmNew').oninput=kmHint;
      document.getElementById('pVeh').onchange=async(ev)=>{
        setKmUI(); renderPumpPhotoBox(e);
        if(e) return; // sửa thì giữ nguyên KM cũ đã có
        const vid=ev.target.value; if(!vid){ document.getElementById('pKmOld').value=''; kmHint(); return; }
        try{ const r=await call('rpc_vehicle_last_km',{p_vehicle_id:vid});
          document.getElementById('pKmOld').value=r.kmOld!=null?r.kmOld:''; kmHint(); }catch(_){}
      };
      setKindUI(); setKmUI(); kmHint();
      document.getElementById('pSave').onclick=function(){ withBusy(this, e?'Đang lưu…':'Đang lưu phiếu…', ()=>savePump(e, el)); };
      document.getElementById('pSubmit').onclick=function(){ withBusy(this,'Đang submit…',()=>submitPumpDay(el)); };
      const c=document.getElementById('pCancel'); if(c) c.onclick=()=>{ state.pumpEdit=null; state.pumpStage={}; renderPumpUI(el); };
      renderPumpList();
      renderPumpPhotoBox(e);
    }

    function vehHasOdo(vehicleId){
      const v=((state.active&&state.active.vehicles)||[]).find(x=>x.id===vehicleId);
      return !v || v.hasOdometer;  // mặc định coi là có công-tơ-mét nếu không rõ
    }
    async function signedUrl(path){
      try{ const {data}=await sb.storage.from('chung-tu').createSignedUrl(path,300); return (data&&data.signedUrl)||''; }
      catch(_){ return ''; }
    }
    // Storage chia folder theo tháng: <YYYY-MM>/<ledgerId>/<kind>-<ts>.<ext>.
    function monthOf(dateStr){ return (dateStr && /^\d{4}-\d{2}/.test(dateStr) ? dateStr : new Date().toISOString()).slice(0,7); }
    function photoPath(ym, ledgerId, kind, file){
      const ext=((file.name||'').split('.').pop()||'jpg').toLowerCase().replace(/[^a-z0-9]/g,'')||'jpg';
      return `${ym}/${ledgerId}/${kind}-${Date.now()}.${ext}`;
    }
    const KIND_LABEL={ pump_meter:'Ảnh đồng hồ bơm', odometer:'Ảnh công-tơ-mét' };
    function pumpSlots(vehicleId){
      const slots=[['pump_meter',true]];
      if(vehHasOdo(vehicleId)) slots.push(['odometer',true]);
      return slots;
    }
    // Ô ảnh ngay trong thẻ phiếu: ảnh đang chọn (chờ lưu) / ảnh đã tải lên (khi sửa) / ô chọn ảnh.
    async function renderPumpPhotoBox(e){
      const box=document.getElementById('photoBox'); if(!box) return;
      const vehicleId = val('pVeh') || (e&&e.vehicleId) || null;
      const slots=pumpSlots(vehicleId);
      let uploaded=[];
      if(e){ try{ uploaded=(await call('rpc_pump_photo_list',{p_ledger_id:e.id})).rows||[]; }catch(_){} }
      const parts=[];
      for(const [kind,req] of slots){
        const staged=state.pumpStage[kind];
        const up=uploaded.find(x=>x.kind===kind);
        if(staged){
          const url=URL.createObjectURL(staged);
          parts.push(`<div style="flex:1;min-width:160px"><label>${KIND_LABEL[kind]}</label>
            <img class="thumb" src="${url}"><div style="margin-top:6px"><button class="ghost sm" data-unstage="${kind}">Bỏ ảnh</button></div></div>`);
        }else if(up){
          const url=await signedUrl(up.path);
          parts.push(`<div style="flex:1;min-width:160px"><label>${KIND_LABEL[kind]}</label>
            ${url?`<a href="${esc(url)}" target="_blank"><img class="thumb" src="${esc(url)}"></a>`:'<div class="muted">Đã có ảnh.</div>'}
            <div style="margin-top:6px"><button class="ghost sm" data-delphoto="${up.id}">Xóa ảnh</button></div></div>`);
        }else{
          parts.push(`<div style="flex:1;min-width:160px"><label>${KIND_LABEL[kind]} ${req?'<span class="rq">*</span>':''}</label>
            <input type="file" accept="image/*" capture="environment" data-stage="${kind}"></div>`);
        }
      }
      box.innerHTML=`<div class="row">${parts.join('')}</div><div id="photoMsg" class="msg"></div>`;
      box.querySelectorAll('input[type=file]').forEach(inp=> inp.onchange=()=>{ if(inp.files[0]){ state.pumpStage[inp.dataset.stage]=inp.files[0]; renderPumpPhotoBox(e); } });
      box.querySelectorAll('[data-unstage]').forEach(b=> b.onclick=()=>{ delete state.pumpStage[b.dataset.unstage]; renderPumpPhotoBox(e); });
      box.querySelectorAll('[data-delphoto]').forEach(b=> b.onclick=()=>deletePumpPhoto(e, b.dataset.delphoto));
    }
    // Tải các ảnh đang chờ (state.pumpStage) lên cho phiếu vừa lưu, rồi xóa khỏi hàng chờ.
    async function uploadStagedPumpPhotos(ledgerId, vehicleId, ym){
      for(const [kind] of pumpSlots(vehicleId)){
        const file=state.pumpStage[kind]; if(!file) continue;
        const path=photoPath(ym, ledgerId, kind, file);
        const {error}=await sb.storage.from('chung-tu').upload(path, file, {contentType:file.type||'image/jpeg', upsert:false});
        if(error) throw error;
        await call('rpc_pump_photo_add',{p_ledger_id:ledgerId, p_kind:kind, p_path:path});
      }
    }
    async function deletePumpPhoto(e, photoId){
      if(!confirm('Xóa ảnh này?')) return;
      try{
        const r=await call('rpc_pump_photo_delete',{p_id:photoId});
        if(r&&r.path){ try{ await sb.storage.from('chung-tu').remove([r.path]); }catch(_){} }
        toast('Đã xóa ảnh.'); renderPumpPhotoBox(e);
      }catch(err){ toast(err.message); }
    }

    function pumpParams(e){
      const kOpt=document.getElementById('pTxn').selectedOptions[0];
      const kind=kOpt?kOpt.dataset.kind:'';
      const p={ p_vehicle_id:val('pVeh')||null, p_txn_type_id:val('pTxn')||null, p_oil_type_id:val('pOil')||null,
        p_liters:num(val('pLit')), p_tank_id: kind==='bom_ngoai'?null:(val('pTank')||null),
        p_km_new:val('pKmNew')?num(val('pKmNew')):null, p_km_old:val('pKmOld')?num(val('pKmOld')):null,
        p_supplier_id: kind==='bom_ngoai'?(val('pSup')||null):null, p_entry_date:val('pDate')||null, p_note:val('pNote') };
      if(e) p.p_id=e.id;
      return p;
    }

    async function reviewDetail(r, el){

      ].map(([k,v])=>`<tr><td class="muted" style="padding:2px 12px 2px 0;white-space:nowrap">${esc(k)}</td><td>${esc(v)}</td></tr>`).join('');

    function showModal(title, html){
      const m=document.getElementById('modal');
      m.innerHTML=`<div class="modalCard"><div class="row" style="align-items:center;margin-bottom:8px">
        <h2 style="flex:1;margin:0">${esc(title)}</h2>
        <button class="ghost sm" id="modalClose" style="flex:0">Đóng</button></div>
        <div>${html}</div></div>`;
      m.style.display='flex';
      m.onclick=(ev)=>{ if(ev.target===m) closeModal(); };
      document.getElementById('modalClose').onclick=closeModal;
    }
    function closeModal(){ const m=document.getElementById('modal'); m.style.display='none'; m.innerHTML=''; }
    // Modal có nút hành động (Lưu/Xác nhận) + báo lỗi trong modal.
    function openModal(title, bodyHtml, onSave, saveLabel){
      const m=document.getElementById('modal');
      const footer = onSave
        ? `<div class="actions"><button id="modalSave" style="flex:0">${esc(saveLabel||'Lưu')}</button><button class="ghost" style="flex:0" onclick="closeModal()">Huỷ</button></div>`
        : `<div class="actions"><button class="ghost" style="flex:0" onclick="closeModal()">Đóng</button></div>`;
      m.innerHTML=`<div class="modalCard">
        <div class="row" style="align-items:center;margin-bottom:8px"><h2 style="flex:1;margin:0">${esc(title)}</h2>
          <button class="ghost sm" style="flex:0" onclick="closeModal()">✕</button></div>
        <div class="notice err js-modal-msg hidden"></div>${bodyHtml}${footer}</div>`;
      m.style.display='flex';
      m.onclick=ev=>{ if(ev.target===m) closeModal(); };
      if(onSave) document.getElementById('modalSave').onclick=function(){ onSave(this); };
    }
    function modalErr(t){ const el=document.querySelector('#modal .js-modal-msg'); if(el){ el.textContent=t||''; el.classList.toggle('hidden',!t); } }
    // Hộp nhập lý do (thay prompt() — thân thiện trên điện thoại).
    function promptReason(title, placeholder, onConfirm, confirmLabel){
      openModal(title, `<label>Lý do</label><textarea id="reasonInput" rows="3" placeholder="${esc(placeholder||'')}"></textarea>`,
        function(){
          const v=(document.getElementById('reasonInput')?.value||'').trim();
          if(!v){ modalErr('Vui lòng nhập lý do.'); return; }
          closeModal();
          Promise.resolve(onConfirm(v)).catch(err=>toast(err.message||String(err),'err'));
        }, confirmLabel||'Xác nhận');
      setTimeout(()=>document.getElementById('reasonInput')?.focus(),60);
    }

            <img class="thumb" src="${url}"><div style="margin-top:6px"><button class="ghost sm" data-unstage="${kind}">Bỏ ảnh</button></div></div>`);
        }else if(up){
          const url=await signedUrl(up.path);
          parts.push(`<div style="flex:1;min-width:160px"><label>${NHAP_KIND_LABEL[kind]}</label>
            ${url?`<a href="${esc(url)}" target="_blank"><img class="thumb" src="${esc(url)}"></a>`:'<div class="muted">Đã có ảnh.</div>'}
            <div style="margin-top:6px"><button class="ghost sm" data-delreceipt="${up.id}">Xóa ảnh</button></div></div>`);
        }else{
          parts.push(`<div style="flex:1;min-width:160px"><label>${NHAP_KIND_LABEL[kind]} <span class="rq">*</span></label>
            <input type="file" accept="image/*" capture="environment" data-stage="${kind}"></div>`);
        }
      }
      box.innerHTML=`<div class="row">${parts.join('')}</div><div id="nPhotoMsg" class="msg"></div>`;
      box.querySelectorAll('input[type=file]').forEach(inp=> inp.onchange=()=>{ if(inp.files[0]){ state.nhapStage[inp.dataset.stage]=inp.files[0]; renderNhapPhotoBox(e); } });
      box.querySelectorAll('[data-unstage]').forEach(b=> b.onclick=()=>{ delete state.nhapStage[b.dataset.unstage]; renderNhapPhotoBox(e); });
      box.querySelectorAll('[data-delreceipt]').forEach(b=> b.onclick=()=>deleteNhapPhoto(e, b.dataset.delreceipt));
    }
    async function uploadStagedNhapPhotos(ledgerId, ym){
      for(const kind of NHAP_SLOTS){
        const file=state.nhapStage[kind]; if(!file) continue;
        const path=photoPath(ym, ledgerId, kind, file);
        const {error}=await sb.storage.from('chung-tu').upload(path, file, {contentType:file.type||'image/jpeg', upsert:false});
        if(error) throw error;
        await call('rpc_nhap_photo_add',{p_ledger_id:ledgerId, p_kind:kind, p_path:path});
      }
    }
    async function deleteNhapPhoto(e, photoId){
      if(!confirm('Xóa ảnh này?')) return;
      try{
        const r=await call('rpc_nhap_photo_delete',{p_id:photoId});
        if(r&&r.path){ try{ await sb.storage.from('chung-tu').remove([r.path]); }catch(_){} }
        toast('Đã xóa ảnh.'); renderNhapPhotoBox(e);
      }catch(err){ toast(err.message); }
    }

    function nhapParams(e){
      const p={ p_supplier_id:val('nSup')||null, p_tank_id:val('nTank')||null, p_oil_type_id:val('nOil')||null,
        p_liters:num(val('nLit')), p_unit_price:num(val('nPrice')),
        p_supplier_invoice_no:val('nInv'), p_entry_date:val('nDate')||null, p_note:val('nNote') };
      if(e) p.p_id=e.id;
      return p;
    }
    async function saveNhap(e, el){
      const msg=document.getElementById('nMsg'); msg.textContent='';
      try{
        const res=await call(e?'rpc_nhap_update':'rpc_nhap_create', nhapParams(e));
        const id=(e&&e.id)||(res&&res.id);
        const ym=monthOf(val('nDate')||(e&&e.entryDate));
        if(id){ try{ await uploadStagedNhapPhotos(id, ym); }
          catch(upErr){ state.nhapEdit=id; state.nhapStage={}; await loadNhapMine(); renderNhapUI(el);
            document.getElementById('nMsg').textContent='Đã lưu phiếu nhưng tải ảnh lỗi: '+(upErr.message||upErr); window.scrollTo(0,0); return; } }
        toast(e?'Đã lưu phiếu.':'Đã lưu phiếu kèm ảnh.');
        state.nhapEdit=null; state.nhapStage={};   // quay về form mới cho phiếu kế tiếp
        await loadNhapMine(); renderNhapUI(el); window.scrollTo(0,0);
      }catch(err){ msg.textContent=err.message; }
    }
    async function submitNhapDay(el){
      if(!confirm('Submit toàn bộ phiếu nhập Nháp? Phiếu sẽ được duyệt thẳng và vào tồn kho ngay.')) return;
      try{ const r=await call('rpc_nhap_submit_day'); toast(`Đã nhập & duyệt ${r.count} phiếu vào tồn.`);

      catch(err){ toast(err.message); }

          <td>${esc(r.supplierName||'')}</td><td>${esc(r.tankName||'')}</td><td>${esc(r.oilTypeName||'')}</td>
          <td>${fmtNum(r.liters)}</td><td>${fmtNum(r.unitPrice)}</td><td>${fmtNum(r.amount)}</td>
          <td><span class="badge">${STATUS_LABEL[r.status]||esc(r.status)}</span></td>
          <td style="white-space:nowrap">
            <button class="ghost sm" data-ndetail="${r.id}">Chi tiết</button>
            ${r.status==='Nhap' ? `<button class="ghost sm" data-nedit="${r.id}">Sửa</button><button class="ghost sm" data-ndel="${r.id}">Xóa</button>`:''}</td>

      box.querySelectorAll('[data-ndel]').forEach(b=> b.onclick=()=>delNhap(b.dataset.ndel, el));

    async function nhapDetail(r){
      if(!r) return;
      const rowsHtml=[
        ['Số phiếu', r.code||'(nháp)'], ['Ngày', r.entryDate||''], ['Nhà cung cấp', r.supplierName||''],
        ['Téc nhận', r.tankName||''], ['Loại dầu', r.oilTypeName||''], ['Số lít', fmtNum(r.liters)],
        ['Đơn giá', r.unitPrice!=null?fmtNum(r.unitPrice):''], ['Thành tiền', r.amount!=null?fmtNum(r.amount):''],
        ['Số HĐ NCC', r.supplierInvoiceNo||''], ['Trạng thái', STATUS_LABEL[r.status]||r.status], ['Ghi chú', r.note||'']
      ].map(([k,v])=>`<tr><td class="muted" style="padding:2px 12px 2px 0;white-space:nowrap">${esc(k)}</td><td>${esc(v)}</td></tr>`).join('');
      showModal('Phiếu '+(r.code||'(nháp)'), `<table class="line-table">${rowsHtml}</table><div id="ndPhotos" class="muted" style="margin-top:10px">Đang tải ảnh…</div>`);
      let photos=[];
      try{ photos=(await call('rpc_nhap_photo_list',{p_ledger_id:r.id})).rows||[]; }catch(_){}
      const pbox=document.getElementById('ndPhotos'); if(!pbox) return;
      if(!photos.length){ pbox.innerHTML='<span class="muted">Chưa có ảnh.</span>'; return; }
      const parts=[];
      for(const p of photos){ const url=await signedUrl(p.path);
        parts.push(`<div style="flex:1;min-width:200px"><label>${NHAP_KIND_LABEL[p.kind]||esc(p.kind)}</label>
          ${url?`<a href="${esc(url)}" target="_blank"><img class="thumb" style="max-height:none" src="${esc(url)}"></a>`:'<span class="muted">Không tải được ảnh.</span>'}</div>`); }
      pbox.innerHTML=`<div class="row">${parts.join('')}</div>`;
    }
    async function delNhap(id, el){
      if(!confirm('Xóa phiếu nháp này?')) return;
      try{ await call('rpc_nhap_delete',{p_id:id}); toast('Đã xóa.'); await loadNhapMine(); renderNhapUI(el); }
      catch(err){ toast(err.message); }
    }
    async function withdrawNhap(id, el){
      try{ await call('rpc_nhap_withdraw',{p_id:id}); toast('Đã rút lại về nháp.'); await loadNhapMine(); renderNhapUI(el); }
      catch(err){ toast(err.message); }
    }

    // ---- Màn Đối chiếu nhập (ThuKho khác người tạo) ----

            <th>Loại dầu</th><th>Lít</th><th>Đơn giá</th><th>Thành tiền</th><th></th></tr></thead><tbody>
            ${rows.map(r=>`<tr><td>${esc(r.code||'')}${r.supplierInvoiceNo?`<div class="muted" style="font-size:12px">HĐ: ${esc(r.supplierInvoiceNo)}</div>`:''}</td>
              <td>${esc(r.createdBy||'')}</td><td>${esc(r.supplierName||'')}</td><td>${esc(r.tankName||'')}</td>
              <td>${esc(r.oilTypeName||'')}</td><td>${fmtNum(r.liters)}</td><td>${fmtNum(r.unitPrice)}</td><td>${fmtNum(r.amount)}</td>

                <button class="ghost sm" data-nphotos="${r.id}">Ảnh</button>
                <button class="sm" data-nok="${r.id}" style="background:var(--ok)">Khớp</button>

            </tbody></table>`:'<span class="muted">Không có phiếu chờ đối chiếu.</span>'}</div>`;
