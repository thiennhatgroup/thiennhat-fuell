<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Thiên Nhật — Tồn kho Xăng dầu</title>
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="icon" type="image/png" href="./logo.png">
  <link rel="apple-touch-icon" sizes="192x192" href="./icon-192.png">
  <meta name="theme-color" content="#0E5AA7">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="TN Xăng dầu">
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js').catch(() => {}));
    }
  </script>
  <style>
    :root{--bg:#F4F6FA;--panel:#fff;--ink:#1E2A38;--muted:#64707E;--line:#E4EAF1;
      --accent:#0E5AA7;--accent-dark:#093F73;--accent-soft:#E7F0FA;--orange:#B26B00;
      --ok:#1E8E5A;--danger:#D14343;--input:#F5F8FC;
      --shadow:0 1px 2px rgba(16,40,70,.06),0 4px 16px rgba(16,40,70,.05);}
    *{box-sizing:border-box}
    body{margin:0;background:var(--bg);color:var(--ink);font-size:15px;-webkit-font-smoothing:antialiased;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif}
    /* ---- Header ---- */
    header{display:flex;align-items:center;justify-content:space-between;gap:12px;
      padding:11px 16px;border-bottom:1px solid var(--line);position:sticky;top:0;z-index:30;
      background:rgba(255,255,255,.85);backdrop-filter:saturate(180%) blur(12px);-webkit-backdrop-filter:saturate(180%) blur(12px)}
    .brand{display:flex;align-items:center;gap:10px;min-width:0}
    .brand-logo{height:34px;width:auto;display:block}
    h1{margin:0;font-size:16px;font-weight:800;letter-spacing:-.2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    h2{margin:0 0 12px;font-size:18px;font-weight:800;letter-spacing:-.2px}
    h3{margin:16px 0 8px;font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;font-weight:800}
    .header-right{display:flex;align-items:center;gap:8px}
    .menu-toggle{display:inline-flex;flex-direction:column;justify-content:center;gap:4px;width:42px;height:42px;
      padding:0 11px;background:#fff;border:1px solid var(--line);border-radius:10px;flex:0 0 auto}
    .menu-toggle span{display:block;height:2px;background:var(--ink);border-radius:2px}
    .menu-toggle:hover{background:#F1F5FA}
    button,input,select,textarea{font:inherit;border-radius:10px;border:1px solid var(--line);min-height:44px;
      transition:border-color .15s,box-shadow .15s,background .15s,transform .05s}
    input,select,textarea{width:100%;background:var(--input);padding:10px 12px;color:var(--ink)}
    input:focus,select:focus,textarea:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft);background:#fff}
    textarea{min-height:64px;resize:vertical}
    button{background:var(--accent);color:#fff;border:1px solid var(--accent);padding:10px 16px;font-weight:700;cursor:pointer;
      box-shadow:0 1px 2px rgba(14,90,167,.25)}
    button:hover{background:var(--accent-dark);border-color:var(--accent-dark)}
    button:active{transform:translateY(1px)}
    button:disabled{opacity:.55;cursor:not-allowed}
    button.ghost{background:#fff;color:var(--accent);border:1px solid var(--line);box-shadow:none}
    button.ghost:hover{background:#F1F5FA;color:var(--accent-dark)}
    button.sm{min-height:34px;padding:6px 12px;font-size:13px}
    .wrap{max-width:980px;margin:0 auto;padding:20px 16px 84px}
    .panel,.card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:18px;margin-bottom:14px;box-shadow:var(--shadow)}
    .muted{color:var(--muted)}
    .row{display:flex;gap:10px;flex-wrap:wrap}
    .row>*{flex:1;min-width:140px}
    label{display:block;font-size:13px;color:var(--muted);margin:10px 0 4px;font-weight:600}
    label .rq{color:var(--danger);font-weight:800;margin-left:2px}
    /* Trường bắt buộc: nền vàng nhạt + viền vàng cho tới khi focus. */
    input.req,select.req,textarea.req{background:#FFFBEB;border-color:#E6C200}
    input.req:focus,select.req:focus,textarea.req:focus{background:#fff;border-color:var(--accent)}
    /* Dòng hướng dẫn nhập dưới mỗi trường. */
    .fnote{font-size:12px;color:var(--muted);margin:4px 0 2px;line-height:1.35}
    .hidden{display:none!important}
    /* ---- Sub-tab nav (catalog) ---- */
    .nav{display:flex;gap:8px;overflow-x:auto;padding:10px 16px;background:#fff;border-bottom:1px solid var(--line);position:sticky;top:57px;z-index:10}
    .nav button{background:var(--accent-soft);color:var(--accent);white-space:nowrap;min-height:38px;padding:6px 14px;border-radius:999px;border-color:transparent;box-shadow:none}
    .nav button.active{background:var(--accent);color:#fff}
    /* ---- Workspace 2-col (form + result) ---- */
    .workspace{display:grid;grid-template-columns:minmax(300px,.85fr) minmax(340px,1.15fr);gap:16px;align-items:start}
    .workspace>*{margin-bottom:0}
    /* ---- Drawer ---- */
    .drawer{position:fixed;top:0;left:0;height:100dvh;width:288px;max-width:84vw;background:var(--panel);
      border-right:1px solid var(--line);transform:translateX(-100%);transition:transform .24s ease;z-index:60;
      overflow-y:auto;padding:14px 12px 20px;box-shadow:0 20px 50px rgba(16,40,70,.18);display:flex;flex-direction:column}
    .drawer.open{transform:translateX(0)}
    .drawer-backdrop{position:fixed;inset:0;background:rgba(16,28,45,.4);z-index:55}
    .drawer-brand{display:flex;align-items:center;justify-content:space-between;padding:4px 8px 12px;border-bottom:1px solid var(--line);margin-bottom:8px}
    .drawer-brand img{height:32px}
    .drawer-x{width:34px;height:34px;padding:0;background:transparent;color:var(--muted);border:none;box-shadow:none;font-size:18px}
    .drawer-item{width:100%;text-align:left;background:transparent;color:var(--ink);border:none;box-shadow:none;font-weight:500;
      padding:10px 12px;border-radius:10px;margin-bottom:2px;font-size:14px;min-height:42px}
    .drawer-item:hover{background:#F1F5FA}
    .drawer-item.active{background:var(--accent-soft);color:var(--accent);font-weight:800}
    .drawer>.drawer-item{font-weight:700}
    .drawer-group{margin:8px 0;background:#F7F9FC;border:1px solid var(--line);border-radius:12px;padding:4px}
    .drawer-group-body .drawer-item{padding-left:16px}
    .drawer-group-h{width:100%;text-align:left;background:transparent;color:var(--accent);border:none;box-shadow:none;
      font-weight:800;font-size:12px;text-transform:uppercase;letter-spacing:.5px;padding:9px 12px 7px;
      display:flex;justify-content:space-between;align-items:center;cursor:pointer;min-height:auto}
    .drawer-group.collapsed .drawer-group-body{display:none}
    .drawer-group.collapsed .drawer-group-h span{transform:rotate(-90deg)}
    .drawer-group-h span{transition:transform .2s}
    .drawer-note{margin-top:auto;padding:14px 12px 4px;border-top:1px solid var(--line);color:var(--muted);font-size:12px}
    .drawer-note b{color:var(--accent)}
    /* ---- Bottom tab-bar (mobile) ---- */
    .tabbar{display:none}
    /* ---- Bell + notif panel ---- */
    .bell-wrap{position:relative}
    .bell-btn{position:relative;font-size:17px;padding:8px 12px;min-height:40px;flex:0 0 auto}
    .notif-badge{position:absolute;top:-6px;right:-6px;background:var(--danger);color:#fff;border-radius:999px;
      font-size:11px;font-weight:700;padding:1px 6px;min-width:18px;text-align:center}
    .notif-panel{position:absolute;right:0;top:48px;width:360px;max-height:460px;overflow:auto;background:var(--panel);
      border:1px solid var(--line);border-radius:12px;box-shadow:0 12px 34px rgba(0,0,0,.18);z-index:40;padding:8px}
    .notif-head{display:flex;justify-content:space-between;align-items:center;padding:6px 8px;font-weight:800}
    .notif-item{padding:10px;border-radius:8px;border-bottom:1px solid var(--line)}
    .notif-item:last-child{border-bottom:0}
    .notif-item.unread{background:#FFF7E7}
    .notif-item .nt-title{font-weight:700;font-size:13px}
    .notif-item .nt-body{font-size:12px;color:var(--muted);margin-top:2px}
    .notif-item .nt-time{font-size:11px;color:var(--muted);margin-top:3px}
    /* ---- Tables ---- */
    table{width:100%;border-collapse:collapse}
    th,td{text-align:left;padding:9px 8px;border-bottom:1px solid var(--line);font-size:14px}
    th{color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:.03em}
    tbody tr:hover td{background:#FAFBFD}
    /* ---- Pills / badges / metrics ---- */
    .badge{display:inline-block;padding:2px 10px;border-radius:999px;background:var(--accent-soft);color:var(--accent);font-size:12px;font-weight:700}
    .pill{display:inline-block;padding:3px 10px;border-radius:999px;background:#EEF1F5;color:#46586B;font-size:12px;font-weight:700}
    .pill.ok{background:#E4F3EA;color:#1E7A4C}
    .pill.warn{background:#FDF0D6;color:#7A5A11}
    .pill.err{background:#FBE0DD;color:#9A3730}
    .totals{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:14px}
    .metric{background:#fff;border:1px solid var(--line);border-radius:14px;padding:14px 16px;box-shadow:var(--shadow);min-width:0}
    .metric>span{font-size:12.5px;color:var(--muted);line-height:1.3}
    .metric strong{display:block;font-size:20px;margin-top:4px;color:var(--accent)}
    /* ---- Notice / feedback ---- */
    .notice{padding:11px 14px;border-radius:12px;margin-bottom:14px;background:#FFF7E8;border:1px solid #F0DEB0;color:#6B531B}
    .notice.ok{background:#ECF4FB;border-color:#CBE0F2;color:#0C4C86}
    .notice.err{background:#FDEEEC;border-color:#F2C9C2;color:#9A3730}
    .actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}
    .loading-line{display:flex;gap:8px;align-items:center;color:var(--muted)}
    .spin{width:16px;height:16px;border-radius:50%;border:2px solid var(--line);border-top-color:var(--accent);animation:spin .8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .toast{position:fixed;left:50%;bottom:80px;transform:translateX(-50%) translateY(12px);background:#1E2A38;color:#fff;
      padding:12px 18px;border-radius:12px;opacity:0;transition:.18s ease;z-index:70;max-width:90%;font-weight:700;box-shadow:0 8px 24px rgba(0,0,0,.18)}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
    .toast.ok{background:var(--ok)}.toast.err{background:var(--danger)}
    .msg{color:var(--danger);font-size:13px;min-height:18px;margin-top:6px}
    .soon{padding:30px 10px;text-align:center;color:var(--muted)}
    .soon .big{font-size:40px}
    /* ---- Modal ---- */
    .modalOverlay{position:fixed;inset:0;background:rgba(20,30,45,.55);display:none;
      align-items:flex-start;justify-content:center;z-index:65;padding:6vh 16px;overflow:auto}
    .modalCard{background:#fff;border-radius:14px;padding:18px;max-width:720px;width:100%;box-shadow:0 20px 50px rgba(16,40,70,.25)}
    .thumb{width:100%;max-height:170px;object-fit:cover;border-radius:10px;border:1px solid var(--line)}
    /* ---- FABs ---- */
    .to-top,.back-fab{display:none;position:fixed;bottom:78px;z-index:50;border:none;cursor:pointer;
      box-shadow:0 4px 12px rgba(0,0,0,.25)}
    .to-top{right:14px;width:46px;height:46px;border-radius:50%;background:var(--accent);color:#fff;font-size:22px}
    .back-fab{left:12px;height:44px;padding:0 16px;border-radius:24px;background:var(--ink);color:#fff;font-size:14px;font-weight:600;align-items:center}
    .to-top.show{display:block}.back-fab.show{display:inline-flex}
    /* ---- Desktop: no bottom bar, pull FABs down ---- */
    @media(min-width:921px){.wrap{padding-bottom:24px}.to-top,.back-fab{bottom:18px}}
    /* ---- Mobile shell ---- */
    @media(max-width:920px){
      h1{font-size:15px}
      .brand-logo{height:30px}
      .workspace{grid-template-columns:1fr}
      .tabbar{display:flex;position:fixed;left:0;right:0;bottom:0;z-index:45;background:var(--panel);
        border-top:1px solid var(--line);box-shadow:0 -2px 10px rgba(0,0,0,.06);
        padding:4px 4px calc(4px + env(safe-area-inset-bottom,0px))}
      .tabbar .tab{flex:1 1 0;display:flex;align-items:center;justify-content:center;background:transparent;
        border:none;box-shadow:none;color:var(--muted);padding:8px 2px;min-height:48px;border-radius:10px;min-width:0}
      .tabbar .tab .tl{font-size:12px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}
      .tabbar .tab.active{color:var(--accent);background:var(--accent-soft)}
      .notif-panel{position:fixed;left:10px;right:10px;top:64px;width:auto}
    }
    /* ---- Mobile: xếp bảng thành thẻ dọc ---- */
    @media(max-width:760px){
      table:not(.line-table){display:block}
      table:not(.line-table) thead{display:none}
      table:not(.line-table) tbody{display:block}
      table:not(.line-table) tr{display:block;background:var(--panel);border:1px solid var(--line);
        border-radius:12px;box-shadow:var(--shadow);padding:6px 14px;margin-bottom:10px}
      table:not(.line-table) tbody tr:hover td{background:transparent}
      table:not(.line-table) td{display:flex;justify-content:space-between;align-items:center;gap:14px;
        padding:9px 0;border-bottom:1px solid var(--line);text-align:right;font-size:14px}
      table:not(.line-table) tr td:last-child{border-bottom:0}
      table:not(.line-table) td::before{content:attr(data-label);flex:0 0 auto;text-align:left;
        color:var(--muted);font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.03em}
      table:not(.line-table) td[data-label='']{justify-content:flex-end}
      table:not(.line-table) td[data-label='']::before{display:none}
      /* Bảng nhập liệu (nếu có): xếp dọc, nhãn phía trên, ô nhập full-width */
      .line-table,.line-table tbody,.line-table tr,.line-table td{display:block;width:100%}
      .line-table thead{display:none}
      .line-table tr{margin-bottom:6px}
      .line-table td{padding:2px 0;border:none}
      .line-table td::before{content:attr(data-label);display:block;font-size:13px;color:var(--muted);
        font-weight:600;margin:8px 0 4px}
      .line-table input,.line-table select,.line-table textarea{width:100%}
    }
  </style>
</head>
<body>
  <!-- ĐĂNG NHẬP -->
  <div id="loginView" class="wrap">
    <div class="panel" style="max-width:420px;margin:8vh auto 0">
      <h2>Đăng nhập</h2>
      <p class="muted" style="margin-top:-6px">Tồn kho Xăng dầu — Thiên Nhật</p>
      <label>Email</label>
      <input id="loginEmail" type="email" autocomplete="username" placeholder="ban@congty.com">
      <label>Mã PIN</label>
      <input id="loginPin" type="password" inputmode="numeric" autocomplete="current-password" placeholder="••••">
      <div style="margin-top:14px"><button id="loginBtn" style="width:100%">Đăng nhập</button></div>
      <div id="loginMsg" class="msg"></div>
    </div>
  </div>

  <!-- APP -->
  <div id="appView" class="hidden">
    <header>
      <div class="brand">
        <button class="menu-toggle" onclick="toggleDrawer()" aria-label="Menu"><span></span><span></span><span></span></button>
        <img class="brand-logo" src="./logo.png" onerror="this.onerror=null;this.src='./logo.svg'" alt="Thiên Nhật">
        <h1>Tồn kho Xăng dầu</h1>
      </div>
      <div class="header-right">
        <div class="bell-wrap">
          <button class="ghost bell-btn hidden" id="alertBell" title="Cảnh báo tồn" aria-label="Cảnh báo tồn"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg><span id="notifBadge" class="notif-badge hidden">0</span></button>
          <div id="notifPanel" class="notif-panel hidden"></div>
        </div>
        <span id="userBadge" class="badge"></span>
        <button class="ghost sm" id="logoutBtn">Đăng xuất</button>
      </div>
    </header>
    <div id="drawerBackdrop" class="drawer-backdrop hidden" onclick="closeDrawer()"></div>
    <aside id="drawer" class="drawer"></aside>
    <div class="wrap"><div id="screen"></div></div>
    <nav id="tabbar" class="tabbar"></nav>
  </div>

  <div id="toast" class="toast"></div>
  <div id="modal" class="modalOverlay"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="./config.js"></script>
  <script>
    const APP = window.APP_CONFIG || {};
    const sb = window.supabase.createClient(APP.supabaseUrl, APP.supabaseAnonKey, {
      auth: { persistSession: true, autoRefreshToken: true }
    });

    const state = { session:null, user:null, permissions:[], screen:'home' };

    // [id, nhãn, quyền cần có, slice] — server VẪN chốt quyền qua require_permission().
    const SCREENS = [
      ['home',      'Trang chủ',        null,             ''],
      ['pump',      'Nhập bơm',         'pump:create',    'S2'],
      ['review',    'Đối chiếu bơm',    'pump:review',    'S2'],
      ['nhap',      'Phiếu nhập',       'pump:create',    'S4'],
      ['nhapReview','Đối chiếu nhập',   'pump:review',    'S4'],
      ['inventory', 'Tồn kho',          'inventory:read', 'S5'],
      ['adjust',    'Tịnh téc / Kiểm kê','adjust:manage',  'S6'],
      ['alerts',    'Cảnh báo',         'alert:read',     'S7'],
      ['report',    'Báo cáo tháng',    'report:read',    'S8'],
      ['adminLedger','Sửa phiếu (Admin)','ledger:admin',   'B6'],
      ['catalog',   'Danh mục & Xe',    'catalog:manage', 'S1'],
      ['users',     'Tài khoản',        'user:manage',    '']
    ];
    const ROLE_LABELS = { ThuKho:'Thủ kho', KeToan:'Kế toán', Admin:'Admin' };
    // Thứ tự màn ưu tiên theo vai trò (drawer + tab-bar). Màn không liệt kê xếp sau.
    // Ưu tiên nghiệp vụ: Bơm → Nhập → Tồn kho → Tịnh téc → Báo cáo → Đối chiếu bơm.
    const ROLE_MENU_ORDER = {
      ThuKho: ['home','pump','nhap','inventory','adjust','report','review'],
      KeToan: ['home','pump','nhap','inventory','adjust','report','review','catalog'],
      Admin:  ['home','pump','nhap','inventory','adjust','report','review','adminLedger','catalog','users']
    };
    // Màn vẫn truy cập được (qua chuông/deep-link) nhưng KHÔNG hiện trong menu drawer/tab.
    const MENU_HIDDEN = ['nhapReview','alerts'];
    // Nhóm màn trong drawer: 'admin' = Quản trị, còn lại = Nghiệp vụ ('home' đứng riêng trên cùng).
    const ADMIN_SCREENS = ['catalog','users'];
    const TAB_LABEL = { home:'Trang chủ', pump:'Nhập bơm', review:'Đối chiếu', nhap:'Phiếu nhập', nhapReview:'Đối chiếu N', inventory:'Tồn kho', adjust:'Tịnh téc', alerts:'Cảnh báo', report:'Báo cáo', adminLedger:'Sửa phiếu', catalog:'Danh mục', users:'Tài khoản' };
    function orderScreensForRole(list){
      const pref = ROLE_MENU_ORDER[state.user && state.user.role] || [];
      return [...list].sort((a,b)=>{ const ia=pref.indexOf(a[0]), ib=pref.indexOf(b[0]); return (ia<0?999:ia)-(ib<0?999:ib); });
    }

    function can(p){ return !p || state.permissions.includes('*') || state.permissions.includes(p); }
    function visibleScreens(){ return SCREENS.filter(s => can(s[2])); }
    // Màn hiển thị trong menu = có quyền và không nằm trong MENU_HIDDEN.
    function menuScreens(){ return visibleScreens().filter(s => !MENU_HIDDEN.includes(s[0])); }
    function esc(v){ return String(v ?? '').replace(/[&<>"']/g, s => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[s])); }
    function val(id){ return (document.getElementById(id)?.value || '').trim(); }
    function toast(t, type='ok'){ const e=document.getElementById('toast'); e.textContent=t; e.className=`toast ${type} show`; clearTimeout(toast._t); toast._t=setTimeout(()=>e.classList.remove('show'),2800); }
    function loadingText(t='Đang tải…'){ return `<div class="loading-line"><span class="spin"></span><span>${esc(t)}</span></div>`; }
    // Gắn data-label (từ <thead th>) cho mỗi <td> → CSS xếp bảng thành thẻ trên điện thoại.
    function labelTableCells(root){
      (root||document).querySelectorAll('table:not(.line-table)').forEach(tb=>{
        const heads=[...tb.querySelectorAll('thead th')].map(th=>th.textContent.trim());
        if(!heads.length) return;
        tb.querySelectorAll('tbody tr').forEach(tr=>{
          [...tr.children].forEach((td,i)=>{
            if(td.hasAttribute('data-label')) return;
            td.setAttribute('data-label', heads[i]||'');
          });
        });
      });
    }
    // Khoá nút + hiện "Đang xử lý…" trong lúc chạy tác vụ; trả nút về trạng thái cũ khi xong.
    async function withBusy(btn, label, fn){
      const b = btn && btn.tagName ? btn : null; const old = b ? b.textContent : '';
      if(b){ b.disabled=true; b.textContent=label||'Đang xử lý…'; }
      try{ return await fn(); } finally{ if(b){ b.disabled=false; b.textContent=old; } }
    }

    function call(name, params){
      return new Promise((resolve,reject)=>{
        let done=false;
        const timer=setTimeout(()=>{ if(done)return; done=true; reject(new Error(`Tác vụ ${name} chạy quá lâu. Kiểm tra mạng.`)); },45000);
        sb.rpc(name, params||{}).then(({data,error})=>{
          if(done)return; done=true; clearTimeout(timer);
          if(error){ reject(new Error(error.message||String(error))); return; }
          if(data && data.ok===false){ reject(new Error((data.error&&data.error.message)||data.message||`Tác vụ ${name} lỗi.`)); return; }
          resolve(data);
        }).catch(err=>{ if(done)return; done=true; clearTimeout(timer); reject(err instanceof Error?err:new Error(String(err))); });
      });
    }

    async function login(){
      const msg=document.getElementById('loginMsg'); msg.textContent='Đang đăng nhập...';
      const email=val('loginEmail'), pin=val('loginPin');
      if(!email||!pin){ msg.textContent='Nhập email và mã PIN.'; return; }
      try{
        const {data,error}=await sb.auth.signInWithPassword({ email, password:'tn-pin::'+pin });
        if(error) throw error;
        state.session=data.session; msg.textContent=''; await bootstrap();
      }catch(err){ msg.textContent=mapAuthError(err); }
    }
    function mapAuthError(err){
      const m=String(err&&err.message||err||'');
      if(/invalid login credentials/i.test(m)) return 'Email hoặc mã PIN không đúng.';
      if(/email not confirmed/i.test(m)) return 'Tài khoản chưa kích hoạt. Liên hệ Admin.';
      return m || 'Đăng nhập thất bại.';
    }
    async function logout(){ await sb.auth.signOut(); location.reload(); }

    async function bootstrap(){
      try{
        const res=await call('rpc_bootstrap');
        state.user=res.user; state.permissions=res.permissions||[];
        document.getElementById('loginView').classList.add('hidden');
        document.getElementById('appView').classList.remove('hidden');
        document.getElementById('userBadge').textContent=`${state.user.name} · ${ROLE_LABELS[state.user.role]||state.user.role}`;
        const allowed=visibleScreens();
        const hashScreen=(location.hash||'').replace(/^#/,'');
        if(hashScreen && allowed.some(s=>s[0]===hashScreen)) state.screen=hashScreen;
        else if(!allowed.some(s=>s[0]===state.screen)) state.screen=allowed[0][0];
        renderNav(); renderScreen();
        state.histDepth=0;
        try{ history.replaceState({screen:state.screen},'','#'+state.screen); }catch(_){}
        updateBackFab();
        if(can('alert:read')){ call('rpc_alerts_scan').then(()=>refreshAlertBell()).catch(()=>refreshAlertBell()); }
      }catch(err){
        document.getElementById('loginView').classList.remove('hidden');
        document.getElementById('appView').classList.add('hidden');
        document.getElementById('loginMsg').textContent=err.message||'Không tải được dữ liệu.';
      }
    }

    function renderNav(){ renderDrawer(); renderTabBar(); }

    function renderDrawer(){
      const feats = orderScreensForRole(menuScreens());
      const ops = feats.filter(s => s[0]!=='home' && !ADMIN_SCREENS.includes(s[0]));
      const adm = feats.filter(s => ADMIN_SCREENS.includes(s[0]));
      const item = (id,label,idx)=>`<button class="drawer-item ${state.screen===id?'active':''}" onclick="navTo('${id}')">${idx!=null?idx+'. ':''}${esc(label)}</button>`;
      const group = (title,arr)=> arr.length ? `<div class="drawer-group">
          <button class="drawer-group-h" onclick="toggleGroup(this)">${title} <span>▾</span></button>
          <div class="drawer-group-body">${arr.map(([id,label],i)=>item(id,label,i+1)).join('')}</div>
        </div>` : '';
      document.getElementById('drawer').innerHTML = `
        <div class="drawer-brand"><img src="./logo.png" onerror="this.onerror=null;this.src='./logo.svg'" alt="Thiên Nhật"><button class="drawer-x" onclick="closeDrawer()">✕</button></div>

    function renderTabBar(){
      const bar=document.getElementById('tabbar'); if(!bar) return;
      const picked = orderScreensForRole(menuScreens()).slice(0,4);
      const tab=(id,label)=>`<button class="tab ${id===state.screen?'active':''}" onclick="navTo('${id}')"><span class="tl">${esc(TAB_LABEL[id]||label)}</span></button>`;
      bar.innerHTML = picked.map(([id,label])=>tab(id,label)).join('') +
        `<button class="tab" onclick="toggleDrawer()"><span class="tl">Thêm</span></button>`;
    }

    function toggleDrawer(){
      const d=document.getElementById('drawer'), b=document.getElementById('drawerBackdrop');
      const open=!d.classList.contains('open');
      if(open) renderDrawer();
      d.classList.toggle('open',open); b.classList.toggle('hidden',!open);
    }
    function closeDrawer(){ document.getElementById('drawer').classList.remove('open'); document.getElementById('drawerBackdrop').classList.add('hidden'); }
    function toggleGroup(el){ el.closest('.drawer-group').classList.toggle('collapsed'); }

    function navTo(id){
      closeDrawer(); closeNotif();
      if(id!==state.screen){ try{ history.pushState({screen:id},'','#'+id); }catch(_){} state.histDepth=(state.histDepth||0)+1; }
      state.screen=id; renderNav(); renderScreen(); updateBackFab();
    }
    window.addEventListener('popstate', e=>{
      const s=e.state&&e.state.screen; if(!s) return;
      state.histDepth=Math.max(0,(state.histDepth||0)-1);
      state.screen=s; renderNav(); renderScreen(); updateBackFab();
    });
    function updateBackFab(){ const b=document.getElementById('backFab'); if(b) b.classList.toggle('show',(state.histDepth||0)>0); }
    // Bấm push (S7) khi app đang mở → service worker báo chuyển màn Cảnh báo.
    if('serviceWorker' in navigator){
      navigator.serviceWorker.addEventListener('message', e=>{
        if(e.data && e.data.type==='open-screen' && e.data.screen && state.session) navTo(e.data.screen);
      });
    }

    // ---- Chuông thông báo (panel dùng lại RPC cảnh báo S7) ----

    async function loadNotifPanel(){
      const p=document.getElementById('notifPanel'); p.innerHTML=`<div class="notif-item">${loadingText('Đang tải cảnh báo…')}</div>`;
      try{
        const res=await call('rpc_alerts_list',{ p_limit:15 }); const rows=res.rows||[];
        p.innerHTML = `<div class="notif-head"><span>Cảnh báo tồn</span>${(res.unread||0)>0?'<button class="ghost sm" id="notifAllRead" style="flex:0">Đọc hết</button>':''}</div>`
          + (rows.length ? rows.map(r=>`<div class="notif-item ${r.read?'':'unread'}">
              <div class="nt-title">${esc(r.title)}</div>
              <div class="nt-body">${esc(r.body)}</div><div class="nt-time">${esc(r.createdAt)}</div></div>`).join('')
              : '<div class="notif-item muted">Chưa có cảnh báo.</div>')
          + `<div style="padding:8px"><button class="ghost sm" style="width:100%" onclick="closeNotif();navTo('alerts')">Xem tất cả</button></div>`;
        const ar=document.getElementById('notifAllRead');
        if(ar) ar.onclick=async()=>{ try{ await call('rpc_alerts_mark_read',{}); loadNotifPanel(); refreshAlertBell(); }catch(e){ toast(e.message,'err'); } };

      const rows=state.catalog.oilTypes||[];
      const e=(state.catEdit&&rows.find(r=>r.id===state.catEdit))||null;
      body.innerHTML=`<div class="panel"><h2>${e?'Sửa loại dầu':'Thêm loại dầu'}</h2>
        <div class="row"><div><label>Tên loại dầu</label><input id="oName" value="${e?esc(e.name):''}" placeholder="DO 0.05S"></div></div>
        <div class="row" style="margin-top:12px;flex:0">
          <button id="oSave" style="flex:0">${e?'Lưu':'Thêm'}</button>
          ${e?'<button class="ghost" id="oCancel" style="flex:0">Hủy</button>':''}
        </div><div id="oMsg" class="msg"></div></div>
        <div class="panel"><h2>Danh sách loại dầu</h2>${rows.length?`<table><thead><tr>
          <th>Tên</th><th>Trạng thái</th><th></th></tr></thead><tbody>
          ${rows.map(r=>`<tr><td>${esc(r.name)}</td><td>${statusCell(r.active)}</td>
            <td style="white-space:nowrap">${rowActions('oilType',r)}</td></tr>`).join('')}
          </tbody></table>`:'<span class="muted">Chưa có loại dầu.</span>'}</div>`;
      document.getElementById('oSave').onclick=()=>catSave('rpc_oil_type_upsert',{
        p_id:e?e.id:null, p_name:val('oName'), p_active:e?e.active:true },'oMsg');
      wireEditToggle(body,'oilType');
    }

    // --- Nhà cung cấp ---
    function renderSupplierTab(body){
      const rows=state.catalog.suppliers||[];
      const e=(state.catEdit&&rows.find(r=>r.id===state.catEdit))||null;
      body.innerHTML=`<div class="panel"><h2>${e?'Sửa nhà cung cấp':'Thêm nhà cung cấp'}</h2>
        <div class="row">
          <div><label>Tên NCC</label><input id="sName" value="${e?esc(e.name):''}" placeholder="Cửa hàng xăng dầu…"></div>
          <div><label>Điện thoại</label><input id="sPhone" value="${e&&e.phone?esc(e.phone):''}"></div>
        </div>
        <label>Ghi chú</label><input id="sNote" value="${e&&e.note?esc(e.note):''}">
        <div class="row" style="margin-top:12px;flex:0">
          <button id="sSave" style="flex:0">${e?'Lưu':'Thêm'}</button>
          ${e?'<button class="ghost" id="sCancel" style="flex:0">Hủy</button>':''}
        </div><div id="sMsg" class="msg"></div></div>
        <div class="panel"><h2>Danh sách nhà cung cấp</h2>${rows.length?`<table><thead><tr>
          <th>Tên</th><th>Điện thoại</th><th>Ghi chú</th><th>Trạng thái</th><th></th></tr></thead><tbody>
          ${rows.map(r=>`<tr><td>${esc(r.name)}</td><td>${esc(r.phone||'')}</td><td>${esc(r.note||'')}</td>
            <td>${statusCell(r.active)}</td><td style="white-space:nowrap">${rowActions('supplier',r)}</td></tr>`).join('')}
          </tbody></table>`:'<span class="muted">Chưa có nhà cung cấp.</span>'}</div>`;
      document.getElementById('sSave').onclick=()=>catSave('rpc_supplier_upsert',{
        p_id:e?e.id:null, p_name:val('sName'), p_phone:val('sPhone'), p_note:val('sNote'), p_active:e?e.active:true },'sMsg');
      wireEditToggle(body,'supplier');
    }

    // --- Loại giao dịch (cố định: chỉ đổi tên / ngừng) ---
    function renderTxnTypeTab(body){
      const rows=state.catalog.txnTypes||[];
      const e=(state.catEdit&&rows.find(r=>r.id===state.catEdit))||null;
      body.innerHTML=`${e?`<div class="panel"><h2>Sửa loại giao dịch</h2>
        <div class="row"><div><label>Tên hiển thị</label><input id="xName" value="${esc(e.name)}"></div></div>
        <p class="muted">Mã: <b>${esc(e.code)}</b> · Bản chất: <b>${esc(e.kind)}</b> (cố định).</p>
        <div class="row" style="margin-top:12px;flex:0">
          <button id="xSave" style="flex:0">Lưu</button>
          <button class="ghost" id="xCancel" style="flex:0">Hủy</button>
        </div><div id="xMsg" class="msg"></div></div>`:''}
        <div class="panel"><h2>Loại giao dịch</h2>
        <p class="muted">Danh mục cố định (không thêm mới). Đổi tên hiển thị hoặc ngừng dùng.</p>
        ${rows.length?`<table><thead><tr><th>Tên</th><th>Mã</th><th>Bản chất</th><th>Trạng thái</th><th></th></tr></thead><tbody>
          ${rows.map(r=>`<tr><td>${esc(r.name)}</td><td>${esc(r.code)}</td><td>${esc(r.kind)}</td>
            <td>${statusCell(r.active)}</td><td style="white-space:nowrap">${rowActions('txnType',r)}</td></tr>`).join('')}
          </tbody></table>`:'<span class="muted">Chưa có.</span>'}</div>`;
      if(e) document.getElementById('xSave').onclick=()=>catSave('rpc_txn_type_upsert',{
        p_id:e.id, p_name:val('xName'), p_active:e.active },'xMsg');
      wireEditToggle(body,'txnType');
    }

    function wireEditToggle(body, kind){
      body.querySelectorAll('[data-edit]').forEach(b=> b.onclick=()=>{ state.catEdit=b.dataset.edit; renderCatTab(); });
      body.querySelectorAll('[data-toggle]').forEach(b=> b.onclick=()=>catToggle(kind, b.dataset.toggle, b.dataset.active==='1'));
      body.querySelectorAll('[data-catdel]').forEach(b=> b.onclick=()=>catDelete(kind, b.dataset.catdel));
      ['tCancel','vCancel','oCancel','sCancel','xCancel'].forEach(id=>{
        const c=document.getElementById(id); if(c) c.onclick=()=>{ state.catEdit=null; renderCatTab(); };
      });
    }

    // ---- Danh mục active dùng chung cho dropdown nhập liệu ----
    async function ensureActive(force){
      if(state.active && !force) return state.active;
      state.active=await call('rpc_catalog_active');
      return state.active;
    }

    // ---- Màn Nhập bơm (ThuKho) ----
    const STATUS_LABEL={ Nhap:'Nháp', ChoDoiChieu:'Chờ đối chiếu', DaDuyet:'Đã duyệt' };
    async function renderPump(el){
      el.innerHTML=`<div class="panel">${loadingText()}</div>`;
      try{ await ensureActive(); await loadPumpMine(); renderPumpUI(el); }
      catch(err){ el.innerHTML=`<div class="panel"><span class="msg">${esc(err.message)}</span></div>`; }
    }
    async function loadPumpMine(){ state.pumpMine=(await call('rpc_pump_list_mine')).rows||[]; }

    function renderPumpUI(el){
      const a=state.active, e=(state.pumpEdit&&state.pumpMine.find(r=>r.id===state.pumpEdit&&r.status==='Nhap'))||null;
      const txns=(a.txnTypes||[]).filter(t=>t.kind!=='nhap');
      const veh=a.vehicles||[], tanks=a.tanks||[], oils=a.oilTypes||[], sups=a.suppliers||[];
      const sel=(id,v)=>v&&v===id?'selected':'';
      const opt=(arr,idKey,labelKey,cur)=>arr.map(x=>`<option value="${x[idKey]}" ${sel(x[idKey],cur)}>${esc(x[labelKey])}</option>`).join('');
      const curKind = e ? e.txnKind : (txns[0]&&txns[0].kind);
      const today = new Date().toISOString().slice(0,10);
      const eDate = (e && e.entryDate) ? e.entryDate : today;
      el.innerHTML=`<div class="panel"><h2>${e?`Sửa phiếu ${e.code?esc(e.code):'nháp'}`:'Phiếu bơm mới'}</h2>
        <div class="row">
          <div><label>Ngày bơm <span class="rq">*</span></label><input id="pDate" class="req" type="date" value="${esc(eDate)}">
            <div class="fnote">Ngày thực tế bơm dầu. Mặc định hôm nay — chỉ đổi nếu nhập bù cho ngày khác.</div></div>
          <div><label>Xe <span class="rq">*</span></label><select id="pVeh" class="req"><option value="">— chọn xe —</option>${opt(veh,'id','plate',e&&e.vehicleId)}</select>
            <div class="fnote">Chọn xe được bơm. Hệ thống tự lấy KM cũ của xe này.</div></div>
        </div>
        <div class="row">
          <div><label>Loại giao dịch <span class="rq">*</span></label><select id="pTxn" class="req">${txns.map(t=>`<option value="${t.id}" data-kind="${t.kind}" ${sel(t.id,e&&e.txnTypeId)}>${esc(t.name)}</option>`).join('')}</select>
            <div class="fnote">Bơm cho xe (trừ tồn téc) hay Bơm ngoài (mua ngoài, không trừ tồn).</div></div>
        </div>
        <div class="row">
          <div id="pTankWrap"><label>Téc <span class="rq">*</span></label><select id="pTank" class="req"><option value="">— chọn téc —</option>${opt(tanks,'id','name',e&&e.tankId)}</select>
            <div class="fnote">Téc lấy dầu ra để bơm. Bỏ trống khi Bơm ngoài.</div></div>
          <div><label>Loại dầu <span class="rq">*</span></label><select id="pOil" class="req"><option value="">— chọn loại dầu —</option>${opt(oils,'id','name',e&&e.oilTypeId)}</select>
            <div class="fnote">Loại dầu bơm (thường trùng loại dầu của téc đã chọn).</div></div>
        </div>
        <div class="row">
          <div><label>Số lít <span class="rq">*</span></label><input id="pLit" class="req" inputmode="decimal" value="${e?esc(e.liters):''}">
            <div class="fnote">Số lít đã bơm theo đồng hồ bơm. Nhập số dương.</div></div>
          <div id="pKmWrap" class="row" style="flex:2;margin:0">
            <div><label>KM cũ (tự động)</label><input id="pKmOld" inputmode="decimal" readonly
              style="background:var(--bg);color:var(--muted)" value="${e&&e.kmOld!=null?esc(e.kmOld):''}">
              <div class="fnote">Chỉ số công-tơ-mét lần bơm trước — hệ thống tự điền.</div></div>
            <div><label>KM mới</label><input id="pKmNew" inputmode="decimal" value="${e&&e.kmNew!=null?esc(e.kmNew):''}">
              <div class="fnote">Chỉ số công-tơ-mét hiện tại. Bắt buộc khi xe có công-tơ-mét.</div></div>
          </div>
        </div>
        <div id="pKmHint" class="muted" style="font-size:13px;min-height:18px"></div>
        <div id="pSupWrap"><label>Nhà cung cấp (bơm ngoài) <span class="rq">*</span></label><select id="pSup" class="req"><option value="">—</option>${opt(sups,'id','name',e&&e.supplierId)}</select>
          <div class="fnote">Nơi mua dầu khi Bơm ngoài. Chỉ hiện khi chọn loại Bơm ngoài.</div></div>
        <label>Ghi chú</label><input id="pNote" value="${e&&e.note?esc(e.note):''}">
        <div class="fnote">Không bắt buộc. Ghi thêm thông tin bất thường của lần bơm.</div>
        <div class="row" style="margin-top:12px;flex:0">
          <button id="pSave" style="flex:0">${e?'Lưu':'Thêm phiếu'}</button>
          ${e?'<button class="ghost" id="pCancel" style="flex:0">Hủy</button>':''}
        </div><div id="pMsg" class="msg"></div>
      </div>
      ${e?`<div class="panel"><h2>Ảnh chứng từ</h2>
        <p class="muted" style="margin-top:-6px">Bắt buộc ảnh đồng hồ bơm; ảnh công-tơ-mét bắt buộc khi xe có công-tơ-mét. Chụp trước khi Submit ngày.</p>
        <div id="photoBox" class="muted">Đang tải ảnh…</div></div>`:''}
      <div class="panel"><div class="row" style="align-items:center"><h2 style="flex:1;margin:0">Phiếu của tôi</h2>
        <button id="pSubmit" class="sm" style="flex:0">Submit ngày</button></div>
        <div id="pList" style="margin-top:12px"></div></div>`;

      const setKindUI=()=>{
        const kOpt=document.getElementById('pTxn').selectedOptions[0];
        const kind=kOpt?kOpt.dataset.kind:curKind;
        document.getElementById('pTankWrap').style.display = kind==='bom_ngoai'?'none':'';
        document.getElementById('pSupWrap').style.display = kind==='bom_ngoai'?'':'none';
      };
      // Ẩn cả khu KM khi xe không có công-tơ-mét (không nhập KM).
      const setKmUI=()=>{
        const hasOdo = vehHasOdo(val('pVeh'));
        document.getElementById('pKmWrap').style.display = hasOdo?'':'none';
        if(!hasOdo){ document.getElementById('pKmNew').value=''; document.getElementById('pKmHint').textContent=''; }
      };
      const kmHint=()=>{
        const o=num(val('pKmOld')), n=num(val('pKmNew')), h=document.getElementById('pKmHint');
        if(!val('pKmOld')){ h.textContent=val('pKmNew')?'Chưa có KM cũ trong hệ thống — lần bơm đầu của xe này.':''; h.style.color='var(--muted)'; return; }
        if(!val('pKmNew')){ h.textContent=`KM cũ trong hệ thống: ${fmtNum(o)}. Nhập KM mới để hệ thống tự trừ.`; h.style.color='var(--muted)'; return; }
        const d=n-o; h.textContent = d<0?`Lưu ý: KM mới nhỏ hơn KM cũ (${fmtNum(d)}).`:`KM đi (tự trừ): ${fmtNum(d)}`;
        h.style.color = d<0?'var(--danger)':'var(--muted)';
      };
      document.getElementById('pTxn').onchange=setKindUI;
      document.getElementById('pKmNew').oninput=kmHint;
      document.getElementById('pVeh').onchange=async(ev)=>{
        setKmUI();
        if(e) return; // sửa thì giữ nguyên KM cũ đã có
        const vid=ev.target.value; if(!vid){ document.getElementById('pKmOld').value=''; kmHint(); return; }
        try{ const r=await call('rpc_vehicle_last_km',{p_vehicle_id:vid});
          document.getElementById('pKmOld').value=r.kmOld!=null?r.kmOld:''; kmHint(); }catch(_){}
      };
      setKindUI(); setKmUI(); kmHint();
      document.getElementById('pSave').onclick=function(){ withBusy(this, e?'Đang lưu…':'Đang thêm…', ()=>savePump(e, el)); };
      document.getElementById('pSubmit').onclick=function(){ withBusy(this,'Đang submit…',()=>submitPumpDay(el)); };
      const c=document.getElementById('pCancel'); if(c) c.onclick=()=>{ state.pumpEdit=null; renderPumpUI(el); };
      renderPumpList();
      if(e) renderPhotoSection(e.id, e.vehicleId, monthOf(e.entryDate));
    }

    function vehHasOdo(vehicleId){
      const v=((state.active&&state.active.vehicles)||[]).find(x=>x.id===vehicleId);
      return !v || v.hasOdometer;  // mặc định coi là có công-tơ-mét nếu không rõ
    }
    async function signedUrl(path){
      try{ const {data}=await sb.storage.from('chung-tu').createSignedUrl(path,300); return (data&&data.signedUrl)||''; }
      catch(_){ return ''; }
    }
    // Storage chia folder theo tháng: <YYYY-MM>/<ledgerId>/<kind>-<ts>.<ext>.
    function monthOf(dateStr){ return (dateStr && /^\d{4}-\d{2}/.test(dateStr) ? dateStr : new Date().toISOString()).slice(0,7); }
    function photoPath(ym, ledgerId, kind, file){
      const ext=((file.name||'').split('.').pop()||'jpg').toLowerCase().replace(/[^a-z0-9]/g,'')||'jpg';
      return `${ym}/${ledgerId}/${kind}-${Date.now()}.${ext}`;
    }
    const KIND_LABEL={ pump_meter:'Ảnh đồng hồ bơm', odometer:'Ảnh công-tơ-mét' };
    async function renderPhotoSection(ledgerId, vehicleId, ym){
      const box=document.getElementById('photoBox'); if(!box) return;
      let photos=[];
      try{ photos=(await call('rpc_pump_photo_list',{p_ledger_id:ledgerId})).rows||[]; }
      catch(err){ box.innerHTML=`<span class="msg">${esc(err.message)}</span>`; return; }
      const slots=[['pump_meter',true]];
      if(vehHasOdo(vehicleId)) slots.push(['odometer',true]);
      const parts=[];
      for(const [kind] of slots){
        const p=photos.find(x=>x.kind===kind);
        if(p){
          const url=await signedUrl(p.path);
          parts.push(`<div style="flex:1;min-width:160px"><label>${KIND_LABEL[kind]}</label>
            ${url?`<a href="${esc(url)}" target="_blank"><img class="thumb" src="${esc(url)}"></a>`:'<div class="muted">Đã có ảnh.</div>'}
            <div style="margin-top:6px"><button class="ghost sm" data-delphoto="${p.id}">Xóa ảnh</button></div></div>`);
        }else{
          parts.push(`<div style="flex:1;min-width:160px"><label>${KIND_LABEL[kind]} <span style="color:var(--danger)">*</span></label>
            <input type="file" accept="image/*" capture="environment" data-kind="${kind}"></div>`);
        }
      }
      box.innerHTML=`<div class="row">${parts.join('')}</div><div id="photoMsg" class="msg"></div>`;
      box.querySelectorAll('input[type=file]').forEach(inp=> inp.onchange=()=>uploadPhoto(ledgerId, vehicleId, ym, inp.dataset.kind, inp.files[0]));
      box.querySelectorAll('[data-delphoto]').forEach(b=> b.onclick=()=>deletePhoto(ledgerId, vehicleId, ym, b.dataset.delphoto));
    }
    async function uploadPhoto(ledgerId, vehicleId, ym, kind, file){
      if(!file) return;
      const msg=document.getElementById('photoMsg'); if(msg){ msg.style.color='var(--muted)'; msg.textContent='Đang tải ảnh…'; }
      try{
        const path=photoPath(ym, ledgerId, kind, file);
        const {error}=await sb.storage.from('chung-tu').upload(path, file, {contentType:file.type||'image/jpeg', upsert:false});
        if(error) throw error;
        await call('rpc_pump_photo_add',{p_ledger_id:ledgerId, p_kind:kind, p_path:path});
        toast('Đã thêm ảnh.'); renderPhotoSection(ledgerId, vehicleId, ym);
      }catch(err){ if(msg){ msg.style.color='var(--danger)'; msg.textContent=err.message||'Tải ảnh thất bại.'; } }
    }
    async function deletePhoto(ledgerId, vehicleId, ym, photoId){
      if(!confirm('Xóa ảnh này?')) return;
      try{
        const r=await call('rpc_pump_photo_delete',{p_id:photoId});
        if(r&&r.path){ try{ await sb.storage.from('chung-tu').remove([r.path]); }catch(_){} }
        toast('Đã xóa ảnh.'); renderPhotoSection(ledgerId, vehicleId, ym);
      }catch(err){ toast(err.message); }
    }

    function pumpParams(e){
      const kOpt=document.getElementById('pTxn').selectedOptions[0];
      const kind=kOpt?kOpt.dataset.kind:'';
      const p={ p_vehicle_id:val('pVeh')||null, p_txn_type_id:val('pTxn')||null, p_oil_type_id:val('pOil')||null,
        p_liters:num(val('pLit')), p_tank_id: kind==='bom_ngoai'?null:(val('pTank')||null),
        p_km_new:val('pKmNew')?num(val('pKmNew')):null, p_km_old:val('pKmOld')?num(val('pKmOld')):null,
        p_supplier_id: kind==='bom_ngoai'?(val('pSup')||null):null, p_entry_date:val('pDate')||null, p_note:val('pNote') };
      if(e) p.p_id=e.id;
      return p;
    }
    async function savePump(e, el){
      const msg=document.getElementById('pMsg'); msg.textContent='';
      try{
        const res=await call(e?'rpc_pump_update':'rpc_pump_create', pumpParams(e));
        toast(e?'Đã lưu phiếu.':'Đã thêm phiếu. Bổ sung ảnh chứng từ.');
        state.pumpEdit=(e&&e.id)||(res&&res.id)||null;  // ở lại chế độ sửa để đính ảnh
        await loadPumpMine(); renderPumpUI(el);
        if(state.pumpEdit) window.scrollTo(0,0);
      }catch(err){ msg.textContent=err.message; }
    }
    async function submitPumpDay(el){
      if(!confirm('Submit toàn bộ phiếu Nháp để chuyển sang Chờ đối chiếu?')) return;
      try{ const r=await call('rpc_pump_submit_day'); toast(`Đã submit ${r.count} phiếu.`);
        await loadPumpMine(); renderPumpUI(el); }
      catch(err){ toast(err.message); }
    }
    function renderPumpList(){
      const box=document.getElementById('pList'); const rows=state.pumpMine||[];
      if(!rows.length){ box.innerHTML='<span class="muted">Chưa có phiếu.</span>'; return; }
      box.innerHTML=`<table><thead><tr><th>Số phiếu</th><th>Xe</th><th>Loại GD</th><th>Téc</th>
        <th>Lít</th><th>KM đi</th><th>Trạng thái</th><th></th></tr></thead><tbody>
        ${rows.map(r=>`<tr>
          <td>${r.code?esc(r.code):'<span class="muted">(nháp)</span>'}${r.rejectReason?`<div class="msg" style="min-height:0">Trả về: ${esc(r.rejectReason)}</div>`:''}</td>
          <td>${esc(r.plate||'')}</td><td>${esc(r.txnName||'')}</td><td>${esc(r.tankName||'')}</td>
          <td>${fmtNum(r.liters)}</td><td>${r.kmRun!=null?fmtNum(r.kmRun):''}</td>
          <td><span class="badge">${STATUS_LABEL[r.status]||esc(r.status)}</span></td>
          <td style="white-space:nowrap">${r.status==='Nhap'
            ? `<button class="ghost sm" data-edit="${r.id}">Sửa</button><button class="ghost sm" data-del="${r.id}">Xóa</button>`
            : `<button class="ghost sm" data-withdraw="${r.id}">Rút lại</button>`}</td>
        </tr>`).join('')}</tbody></table>`;
      const el=document.getElementById('screen');
      box.querySelectorAll('[data-edit]').forEach(b=> b.onclick=()=>{ state.pumpEdit=b.dataset.edit; renderPumpUI(el); window.scrollTo(0,0); });
      box.querySelectorAll('[data-del]').forEach(b=> b.onclick=()=>delPump(b.dataset.del, el));
      box.querySelectorAll('[data-withdraw]').forEach(b=> b.onclick=()=>withdrawPump(b.dataset.withdraw, el));
    }
    async function delPump(id, el){
      if(!confirm('Xóa phiếu nháp này?')) return;
      try{ await call('rpc_pump_delete',{p_id:id}); toast('Đã xóa.'); await loadPumpMine(); renderPumpUI(el); }
      catch(err){ toast(err.message); }
    }
    async function withdrawPump(id, el){

            reason=>reviewPump('rpc_pump_reject',{p_id:b.dataset.no,p_reason:reason},el),'Trả về'));

    async function reviewPump(rpc, params, el){
      try{ await call(rpc, params); toast('Đã xử lý phiếu.'); renderReview(el); }
      catch(err){ toast(err.message); }

    async function viewPhotos(ledgerId){
      let rows=[];
      try{ rows=(await call('rpc_pump_photo_list',{p_ledger_id:ledgerId})).rows||[]; }
      catch(err){ toast(err.message); return; }
      if(!rows.length){ toast('Phiếu chưa có ảnh.'); return; }
      showModal('Ảnh chứng từ', '<div class="muted">Đang tải ảnh…</div>');
      const parts=[];
      for(const p of rows){
        const url=await signedUrl(p.path);
        parts.push(`<div style="flex:1;min-width:200px"><label>${KIND_LABEL[p.kind]||esc(p.kind)}</label>
          ${url?`<a href="${esc(url)}" target="_blank"><img class="thumb" style="max-height:none" src="${esc(url)}"></a>`:'<span class="muted">Không tải được ảnh.</span>'}</div>`);
      }
      showModal('Ảnh chứng từ', `<div class="row">${parts.join('')}</div>`);
    }
    function showModal(title, html){
      const m=document.getElementById('modal');
      m.innerHTML=`<div class="modalCard"><div class="row" style="align-items:center;margin-bottom:8px">
        <h2 style="flex:1;margin:0">${esc(title)}</h2>
        <button class="ghost sm" id="modalClose" style="flex:0">Đóng</button></div>
        <div>${html}</div></div>`;
      m.style.display='flex';
      m.onclick=(ev)=>{ if(ev.target===m) closeModal(); };
      document.getElementById('modalClose').onclick=closeModal;
    }
    function closeModal(){ const m=document.getElementById('modal'); m.style.display='none'; m.innerHTML=''; }
    // Modal có nút hành động (Lưu/Xác nhận) + báo lỗi trong modal.
    function openModal(title, bodyHtml, onSave, saveLabel){
      const m=document.getElementById('modal');
      const footer = onSave
        ? `<div class="actions"><button id="modalSave" style="flex:0">${esc(saveLabel||'Lưu')}</button><button class="ghost" style="flex:0" onclick="closeModal()">Huỷ</button></div>`
        : `<div class="actions"><button class="ghost" style="flex:0" onclick="closeModal()">Đóng</button></div>`;
      m.innerHTML=`<div class="modalCard">
        <div class="row" style="align-items:center;margin-bottom:8px"><h2 style="flex:1;margin:0">${esc(title)}</h2>
          <button class="ghost sm" style="flex:0" onclick="closeModal()">✕</button></div>
        <div class="notice err js-modal-msg hidden"></div>${bodyHtml}${footer}</div>`;
      m.style.display='flex';
      m.onclick=ev=>{ if(ev.target===m) closeModal(); };
      if(onSave) document.getElementById('modalSave').onclick=function(){ onSave(this); };
    }
    function modalErr(t){ const el=document.querySelector('#modal .js-modal-msg'); if(el){ el.textContent=t||''; el.classList.toggle('hidden',!t); } }
    // Hộp nhập lý do (thay prompt() — thân thiện trên điện thoại).
    function promptReason(title, placeholder, onConfirm, confirmLabel){
      openModal(title, `<label>Lý do</label><textarea id="reasonInput" rows="3" placeholder="${esc(placeholder||'')}"></textarea>`,
        function(){
          const v=(document.getElementById('reasonInput')?.value||'').trim();
          if(!v){ modalErr('Vui lòng nhập lý do.'); return; }
          closeModal();
          Promise.resolve(onConfirm(v)).catch(err=>toast(err.message||String(err),'err'));
        }, confirmLabel||'Xác nhận');
      setTimeout(()=>document.getElementById('reasonInput')?.focus(),60);
    }

    // ---- Màn Phiếu nhập (ThuKho) — nhập dầu về téc ----
    async function renderNhap(el){
      el.innerHTML=`<div class="panel">${loadingText()}</div>`;
      try{ await ensureActive(); await loadNhapMine(); renderNhapUI(el); }
      catch(err){ el.innerHTML=`<div class="panel"><span class="msg">${esc(err.message)}</span></div>`; }
    }
    async function loadNhapMine(){ state.nhapMine=(await call('rpc_nhap_list_mine')).rows||[]; }

          <div><label>Nhà cung cấp <span class="rq">*</span></label><select id="nSup" class="req"><option value="">— chọn NCC —</option>${opt(sups,'id','name',e&&e.supplierId)}</select>
            <div class="fnote">Đơn vị bán/giao lô dầu này.</div></div>
        </div>
        <div class="row">
          <div><label>Téc nhận <span class="rq">*</span></label><select id="nTank" class="req"><option value="">— chọn téc —</option>${opt(tanks,'id','name',e&&e.tankId)}</select>
            <div class="fnote">Téc chứa lô dầu nhập về. Chọn téc sẽ gợi ý loại dầu của téc.</div></div>
          <div><label>Loại dầu <span class="rq">*</span></label><select id="nOil" class="req"><option value="">— chọn loại dầu —</option>${opt(oils,'id','name',e&&e.oilTypeId)}</select>
            <div class="fnote">Loại dầu của lô nhập (thường trùng loại dầu của téc nhận).</div></div>
        </div>
        <div class="row">
          <div><label>Số lít <span class="rq">*</span></label><input id="nLit" class="req" inputmode="decimal" value="${e?esc(e.liters):''}">
            <div class="fnote">Số lít thực nhận theo phiếu nhập kho. Nhập số dương.</div></div>
          <div><label>Đơn giá</label><input id="nPrice" inputmode="decimal" value="${e&&e.unitPrice!=null?esc(e.unitPrice):''}">
            <div class="fnote">Giá 1 lít (đồng). Để trống nếu chưa có giá.</div></div>
        </div>
        <div class="row">
          <div><label>Thành tiền (tự tính)</label><input id="nAmount" readonly
            style="background:var(--bg);color:var(--muted)" value="${e&&e.amount!=null?fmtNum(e.amount):''}">
            <div class="fnote">Số lít × đơn giá — hệ thống tự tính, không sửa tay.</div></div>
          <div><label>Số HĐ NCC</label><input id="nInv" value="${e&&e.supplierInvoiceNo?esc(e.supplierInvoiceNo):''}" placeholder="Số hóa đơn nhà cung cấp">
            <div class="fnote">Số hóa đơn của nhà cung cấp (khác Số phiếu hệ thống tự cấp).</div></div>
        </div>
        <label>Ghi chú</label><input id="nNote" value="${e&&e.note?esc(e.note):''}">
        <div class="fnote">Không bắt buộc. Ghi thêm thông tin bất thường của lô nhập.</div>
        <div class="row" style="margin-top:12px;flex:0">
          <button id="nSave" style="flex:0">${e?'Lưu':'Thêm phiếu'}</button>
          ${e?'<button class="ghost" id="nCancel" style="flex:0">Hủy</button>':''}
        </div><div id="nMsg" class="msg"></div>
      </div>
      ${e?`<div class="panel"><h2>Ảnh chứng từ</h2>
        <p class="muted" style="margin-top:-6px">Bắt buộc <b>2 ảnh</b>: Biên bản giao nhận + Phiếu nhập kho. Chụp trước khi Submit ngày.</p>
        <div id="nPhotoBox" class="muted">Đang tải ảnh…</div></div>`:''}
      <div class="panel"><div class="row" style="align-items:center"><h2 style="flex:1;margin:0">Phiếu của tôi</h2>
        <button id="nSubmit" class="sm" style="flex:0">Submit ngày</button></div>
        <div id="nList" style="margin-top:12px"></div></div>`;

      const recalc=()=>{ const amt=num(val('nLit'))*num(val('nPrice')); document.getElementById('nAmount').value = amt>0?fmtNum(Math.round(amt*100)/100):''; };
      // Chọn téc → gợi ý loại dầu của téc nếu chưa chọn.
      document.getElementById('nTank').onchange=(ev)=>{
        const t=(a.tanks||[]).find(x=>x.id===ev.target.value);
        const oilSel=document.getElementById('nOil');
        if(t&&t.oilTypeId&&!oilSel.value) oilSel.value=t.oilTypeId;
      };
      document.getElementById('nLit').oninput=recalc;
      document.getElementById('nPrice').oninput=recalc;
      recalc();
      document.getElementById('nSave').onclick=function(){ withBusy(this, e?'Đang lưu…':'Đang thêm…', ()=>saveNhap(e, el)); };

      const c=document.getElementById('nCancel'); if(c) c.onclick=()=>{ state.nhapEdit=null; renderNhapUI(el); };
      renderNhapList();
      if(e) renderReceiptSection(e.id, monthOf(e.entryDate));
    }

    const NHAP_KIND_LABEL={ bien_ban_giao_nhan:'Ảnh biên bản giao nhận', phieu_nhap_kho:'Ảnh phiếu nhập kho' };
    async function renderReceiptSection(ledgerId, ym){
      const box=document.getElementById('nPhotoBox'); if(!box) return;
      let photos=[];
      try{ photos=(await call('rpc_nhap_photo_list',{p_ledger_id:ledgerId})).rows||[]; }
      catch(err){ box.innerHTML=`<span class="msg">${esc(err.message)}</span>`; return; }
      const slots=['bien_ban_giao_nhan','phieu_nhap_kho'];
      const parts=[];
      for(const kind of slots){
        const p=photos.find(x=>x.kind===kind) || photos.find(x=>x.kind==='receipt' && kind==='bien_ban_giao_nhan');
        if(p){
          const url=await signedUrl(p.path);
          parts.push(`<div style="flex:1;min-width:160px"><label>${NHAP_KIND_LABEL[kind]}</label>
            ${url?`<a href="${esc(url)}" target="_blank"><img class="thumb" src="${esc(url)}"></a>`:'<div class="muted">Đã có ảnh.</div>'}
            <div style="margin-top:6px"><button class="ghost sm" data-delreceipt="${p.id}">Xóa ảnh</button></div></div>`);
        }else{
          parts.push(`<div style="flex:1;min-width:160px"><label>${NHAP_KIND_LABEL[kind]} <span class="rq">*</span></label>
            <input type="file" accept="image/*" capture="environment" data-kind="${kind}"></div>`);
        }
      }
      box.innerHTML=`<div class="row">${parts.join('')}</div><div id="nPhotoMsg" class="msg"></div>`;
      box.querySelectorAll('input[type=file]').forEach(inp=> inp.onchange=()=>uploadReceipt(ledgerId, ym, inp.dataset.kind, inp.files[0]));
      box.querySelectorAll('[data-delreceipt]').forEach(b=> b.onclick=()=>deleteReceipt(ledgerId, ym, b.dataset.delreceipt));
    }
    async function uploadReceipt(ledgerId, ym, kind, file){
      if(!file) return;
      const msg=document.getElementById('nPhotoMsg'); if(msg){ msg.style.color='var(--muted)'; msg.textContent='Đang tải ảnh…'; }
      try{
        const path=photoPath(ym, ledgerId, kind, file);
        const {error}=await sb.storage.from('chung-tu').upload(path, file, {contentType:file.type||'image/jpeg', upsert:false});
        if(error) throw error;
        await call('rpc_nhap_photo_add',{p_ledger_id:ledgerId, p_kind:kind, p_path:path});
        toast('Đã thêm ảnh.'); renderReceiptSection(ledgerId, ym);
      }catch(err){ if(msg){ msg.style.color='var(--danger)'; msg.textContent=err.message||'Tải ảnh thất bại.'; } }
    }
    async function deleteReceipt(ledgerId, ym, photoId){
      if(!confirm('Xóa ảnh này?')) return;
      try{
        const r=await call('rpc_nhap_photo_delete',{p_id:photoId});
        if(r&&r.path){ try{ await sb.storage.from('chung-tu').remove([r.path]); }catch(_){} }
        toast('Đã xóa ảnh.'); renderReceiptSection(ledgerId, ym);
      }catch(err){ toast(err.message); }
    }

    function nhapParams(e){
      const p={ p_supplier_id:val('nSup')||null, p_tank_id:val('nTank')||null, p_oil_type_id:val('nOil')||null,
        p_liters:num(val('nLit')), p_unit_price:num(val('nPrice')),
        p_supplier_invoice_no:val('nInv'), p_entry_date:val('nDate')||null, p_note:val('nNote') };
      if(e) p.p_id=e.id;
      return p;
    }
    async function saveNhap(e, el){
      const msg=document.getElementById('nMsg'); msg.textContent='';
      try{
        const res=await call(e?'rpc_nhap_update':'rpc_nhap_create', nhapParams(e));
        toast(e?'Đã lưu phiếu.':'Đã thêm phiếu. Bổ sung ảnh phiếu nhập.');
        state.nhapEdit=(e&&e.id)||(res&&res.id)||null;  // ở lại chế độ sửa để đính ảnh
        await loadNhapMine(); renderNhapUI(el);
        if(state.nhapEdit) window.scrollTo(0,0);
      }catch(err){ msg.textContent=err.message; }
    }
    async function submitNhapDay(el){
      if(!confirm('Submit toàn bộ phiếu nhập Nháp? Phiếu sẽ được duyệt thẳng và vào tồn kho ngay.')) return;
      try{ const r=await call('rpc_nhap_submit_day'); toast(`Đã nhập & duyệt ${r.count} phiếu vào tồn.`);
        await loadNhapMine(); renderNhapUI(el); }
      catch(err){ toast(err.message); }
    }
    function renderNhapList(){
      const box=document.getElementById('nList'); const rows=state.nhapMine||[];

      box.innerHTML=`<table><thead><tr><th>Số phiếu</th><th>NCC</th><th>Téc</th><th>Loại dầu</th>
        <th>Lít</th><th>Đơn giá</th><th>Thành tiền</th><th>Trạng thái</th><th></th></tr></thead><tbody>
        ${rows.map(r=>`<tr>
          <td>${r.code?esc(r.code):'<span class="muted">(nháp)</span>'}${r.rejectReason?`<div class="msg" style="min-height:0">Trả về: ${esc(r.rejectReason)}</div>`:''}${r.supplierInvoiceNo?`<div class="muted" style="font-size:12px">HĐ: ${esc(r.supplierInvoiceNo)}</div>`:''}</td>

          <td><span class="badge">${STATUS_LABEL[r.status]||esc(r.status)}</span></td>
          <td style="white-space:nowrap">${r.status==='Nhap'
            ? `<button class="ghost sm" data-nedit="${r.id}">Sửa</button><button class="ghost sm" data-ndel="${r.id}">Xóa</button>`
            : `<button class="ghost sm" data-nwithdraw="${r.id}">Rút lại</button>`}</td>

      const el=document.getElementById('screen');
      box.querySelectorAll('[data-nedit]').forEach(b=> b.onclick=()=>{ state.nhapEdit=b.dataset.nedit; renderNhapUI(el); window.scrollTo(0,0); });

      box.querySelectorAll('[data-nwithdraw]').forEach(b=> b.onclick=()=>withdrawNhap(b.dataset.nwithdraw, el));

    async function delNhap(id, el){
      if(!confirm('Xóa phiếu nháp này?')) return;
      try{ await call('rpc_nhap_delete',{p_id:id}); toast('Đã xóa.'); await loadNhapMine(); renderNhapUI(el); }

    async function reviewNhap(rpc, params, el){

    async function viewReceiptPhotos(ledgerId){
      let rows=[];
      try{ rows=(await call('rpc_nhap_photo_list',{p_ledger_id:ledgerId})).rows||[]; }
      catch(err){ toast(err.message); return; }
