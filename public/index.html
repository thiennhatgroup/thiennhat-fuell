          promptReason('Trả về phiếu nhập (Lệch)','Nhập lý do lệch để người tạo sửa lại…',
            reason=>reviewNhap('rpc_nhap_reject',{p_id:b.dataset.nno,p_reason:reason},el),'Trả về'));

    async function reviewNhap(rpc, params, el){
      try{ await call(rpc, params); toast('Đã xử lý phiếu.'); renderNhapReview(el); }
      catch(err){ toast(err.message); }
    }

    // ---- Màn Tồn kho thời gian thực (ThuKho + KeToan) ----
    async function renderInventory(el){
      el.innerHTML=`<div class="panel">${loadingText()}</div>`;
      try{
        state.stock=(await call('rpc_inventory_stock')).rows||[]; renderInventoryUI(el);
        // Quét cảnh báo dựa trên tồn vừa tải (nền, không chặn giao diện).
        call('rpc_alerts_scan').then(()=>refreshAlertBell()).catch(()=>{});
      }
      catch(err){ el.innerHTML=`<div class="panel"><span class="msg">${esc(err.message)}</span></div>`; }
    }
    function invFlag(r){
      if(Number(r.closing)<0) return '<span class="badge" style="background:var(--danger);color:#fff">Tồn âm</span>';
      if(r.capacity>0 && Number(r.closing)>Number(r.capacity)) return '<span class="badge" style="background:#B26B00;color:#fff">Vượt sức chứa</span>';
      if(r.leadTimeDays>0 && r.daysLeft!=null && Number(r.daysLeft)<=Number(r.leadTimeDays)) return '<span class="badge" style="background:var(--danger);color:#fff">Cần đặt hàng ngay</span>';
      if(r.reorderPoint>0 && Number(r.closing)<=Number(r.reorderPoint)) return '<span class="badge" style="background:#B26B00;color:#fff">Dưới điểm đặt hàng</span>';
      return '';
    }
    function pctBar(r){
      if(r.pctFull==null) return '<span class="muted">—</span>';
      const p=Math.max(0,Math.min(100,Number(r.pctFull)));
      const col = Number(r.closing)<0?'var(--danger)':(Number(r.pctFull)>100?'#B26B00':'var(--ok)');
      return `<div style="display:flex;align-items:center;gap:8px">
        <div style="flex:1;height:8px;background:var(--line);border-radius:999px;overflow:hidden">
          <div style="width:${p}%;height:100%;background:${col}"></div></div>
        <span style="min-width:48px;text-align:right">${fmtNum(r.pctFull)}%</span></div>`;
    }
    // Màu mức đầy: đỏ khi âm, cam khi vượt sức chứa hoặc dưới điểm đặt hàng, còn lại xanh.
    function invColor(r){
      if(Number(r.closing)<0) return 'var(--danger)';
      if(Number(r.pctFull)>100) return '#B26B00';
      if(Number(r.reorderPoint)>0 && Number(r.closing)<=Number(r.reorderPoint)) return '#B26B00';
      return 'var(--ok)';
    }
    // Thẻ trực quan một téc: thanh mức đầy trên sức chứa + vài con số thống kê chính.
    function invCard(r){
      const p = r.pctFull==null ? null : Math.max(0, Math.min(100, Number(r.pctFull)));
      const col = invColor(r);
      const flag = invFlag(r);
      return `<div class="inv-card">
        <div class="inv-card-head">
          <div><div class="inv-tank">${esc(r.tankName||'')}</div><div class="muted inv-oil">${esc(r.oilTypeName||'')}</div></div>
          <div class="inv-pct" style="color:${col}">${p==null?'—':fmtNum(r.pctFull)+'%'}</div>
        </div>
        <div class="inv-track"><div class="inv-fill" style="width:${p==null?0:p}%;background:${col}"></div></div>
        <div class="inv-nums">Tồn hiện tại <b style="${Number(r.closing)<0?'color:var(--danger)':''}">${fmtNum(r.closing)}</b> lít
          <span class="muted">trên sức chứa ${fmtNum(r.capacity)} lít</span></div>
        <div class="inv-chips">
          <div class="chip"><span class="muted">Tiêu hao trung bình mỗi ngày (30 ngày)</span><b>${fmtNum(r.avgDailyMonth)} lít</b></div>
          <div class="chip"><span class="muted">Số ngày tồn còn lại</span><b>${r.daysLeft!=null?fmtNum(r.daysLeft)+' ngày':'—'}</b></div>
          <div class="chip"><span class="muted">Tiêu hao trung bình mỗi ngày (7 ngày)</span><b>${fmtNum(r.avgDailyWeek)} lít</b></div>
          <div class="chip"><span class="muted">Mức tồn tối thiểu nên giữ</span><b>${fmtNum(r.minStock)} lít</b></div>
        </div>
        ${flag?`<div style="margin-top:10px">${flag}</div>`:''}
      </div>`;
    }
    // Chuẩn hoá tiếng Việt (bỏ dấu, thường hoá) để phân loại/sắp xếp téc.
    function normVi(s){ return String(s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/\u0111/g,'d').trim(); }
    // Téc diesel chính (Téc 1/2/3, cát nghiền) vs téc dầu chuyên dụng (cầu/số/thủy lực/động cơ).
    function isDieselTank(r){ const o=normVi(r.oilTypeName); return o===''||o.startsWith('do')||o.includes('diesel'); }
    // Thứ tự ưu tiên hiển thị các téc diesel chính.
    function tankRank(name){ const n=normVi(name);
      if(/\btec\s*1\b/.test(n)) return 1;
      if(/\btec\s*2\b/.test(n)) return 2;
      if(/\btec\s*3\b/.test(n)) return 3;
      if(n.includes('cat nghien')) return 4;
      return 5; }
    // Header + một dòng bảng chi tiết tồn kho (dùng lại cho nhóm chính & nhóm chuyên dụng).
    function invDetailTable(list){
      const head=`<thead><tr><th>Téc</th><th>Loại dầu</th><th>Tồn đầu</th><th>Nhập</th><th>Xuất</th>
          <th>Tồn cuối</th><th>Sức chứa</th><th style="min-width:140px">% đầy</th>
          <th>TH BQ/ngày (tuần)</th><th>TH BQ/ngày (tháng)</th><th>Ngày tồn còn lại</th>
          <th>Chờ NCC (ngày)</th><th>Tồn tối thiểu</th><th></th></tr></thead>`;
      const body=list.map(r=>`<tr>
          <td>${esc(r.tankName||'')}</td><td>${esc(r.oilTypeName||'')}</td>
          <td>${fmtNum(r.opening)}</td><td>${fmtNum(r.nhap)}</td><td>${fmtNum(r.xuat)}</td>
          <td style="font-weight:700${Number(r.closing)<0?';color:var(--danger)':''}">${fmtNum(r.closing)}</td>
          <td>${fmtNum(r.capacity)}</td><td>${pctBar(r)}</td>
          <td>${fmtNum(r.avgDailyWeek)}</td><td>${fmtNum(r.avgDailyMonth)}</td>
          <td>${r.daysLeft!=null?fmtNum(r.daysLeft):'<span class="muted">—</span>'}</td>
          <td>${fmtNum(r.leadTimeDays)}</td><td>${fmtNum(r.minStock)}</td>
          <td>${invFlag(r)}</td></tr>`).join('');
      return `<div style="overflow-x:auto"><table>${head}<tbody>${body}</tbody></table></div>`;
    }
    function renderInventoryUI(el){
      const rows=state.stock||[];
      // Tách nhóm: diesel chính (sắp theo ưu tiên) trước, dầu chuyên dụng gom vào 1 mục.
      const mainRows=rows.filter(isDieselTank)
        .sort((a,b)=> tankRank(a.tankName)-tankRank(b.tankName) || String(a.tankName||'').localeCompare(String(b.tankName||''),'vi'));
      const specialRows=rows.filter(r=>!isDieselTank(r))
        .sort((a,b)=> String(a.tankName||'').localeCompare(String(b.tankName||''),'vi'));
      // Thống kê tổng hợp toàn kho.
      const totClosing=rows.reduce((a,r)=>a+Number(r.closing||0),0);
      const totCap=rows.reduce((a,r)=>a+Number(r.capacity||0),0);
      const totAvgMonth=rows.reduce((a,r)=>a+Number(r.avgDailyMonth||0),0);
      const totAvgWeek=rows.reduce((a,r)=>a+Number(r.avgDailyWeek||0),0);
      const usePct=totCap>0?Math.round(totClosing/totCap*100):null;
      const needOrder=rows.filter(r=>
        (Number(r.leadTimeDays)>0 && r.daysLeft!=null && Number(r.daysLeft)<=Number(r.leadTimeDays))
        || (Number(r.reorderPoint)>0 && Number(r.closing)<=Number(r.reorderPoint))).length;
      const summary=`<div class="stat-row">
        <div class="stat"><div class="k">Số téc đang theo dõi</div><div class="v">${rows.length}</div></div>
        <div class="stat"><div class="k">Tổng tồn hiện tại</div><div class="v">${fmtNum(totClosing)} <span style="font-size:13px;font-weight:600">lít</span></div></div>
        <div class="stat"><div class="k">Tổng sức chứa</div><div class="v">${fmtNum(totCap)} <span style="font-size:13px;font-weight:600">lít</span></div></div>
        <div class="stat"><div class="k">Tiêu hao TB/ngày toàn kho</div><div class="v">${fmtNum(totAvgMonth)} <span style="font-size:13px;font-weight:600">lít</span><div class="muted" style="font-size:11px;font-weight:600;margin-top:2px">30 ngày · 7 ngày: ${fmtNum(totAvgWeek)} lít</div></div></div>
        <div class="stat"><div class="k">Mức sử dụng chung</div><div class="v" style="color:${usePct!=null&&usePct>100?'#B26B00':'inherit'}">${usePct!=null?usePct+'%':'—'}</div></div>
        <div class="stat"><div class="k">Số téc cần đặt hàng</div><div class="v" style="color:${needOrder>0?'var(--danger)':'inherit'}">${needOrder}</div></div>
      </div>`;
      const specialGroup=(bodyHtml,count)=>`<div class="inv-group collapsed" style="margin-top:14px">
          <button class="inv-group-h" onclick="this.closest('.inv-group').classList.toggle('collapsed')">
            <span>Dầu chuyên dụng (${count}) — dầu cầu, dầu số, thủy lực, động cơ</span><span class="caret">▾</span></button>
          <div class="inv-group-body">${bodyHtml}</div></div>`;
      const cards = rows.length
        ? `${mainRows.length?`<div class="inv-grid">${mainRows.map(invCard).join('')}</div>`:''}
           ${specialRows.length?specialGroup(`<div class="inv-grid" style="margin-top:0">${specialRows.map(invCard).join('')}</div>`,specialRows.length):''}`

    // Ô chọn ảnh biên bản kiểm kê (chờ upload lúc lưu).
    function renderBienBanBox(){
      const box=document.getElementById('kkBienBox'); if(!box) return;
      const f=state.kkBienBan;
      box.innerHTML = f
        ? `<img class="thumb" src="${URL.createObjectURL(f)}"><div style="margin-top:6px"><button class="ghost sm" id="kkBienClear">Bỏ ảnh</button></div>`
        : `<input type="file" accept="image/*" capture="environment" id="kkBienFile">`;
      const inp=document.getElementById('kkBienFile');
      if(inp) inp.onchange=()=>{ if(inp.files[0]){ state.kkBienBan=inp.files[0]; renderBienBanBox(); } };
      const clr=document.getElementById('kkBienClear');
      if(clr) clr.onclick=()=>{ state.kkBienBan=null; renderBienBanBox(); };
    }
    // Ghi thẳng một kỳ tịnh téc / kiểm kê (tạo + chốt trong một bước).
    async function recordPeriod(el, kind){
      const P = kind==='tinh_tec'
        ? { msg:'ttMsg', tank:'ttTank', actual:'ttActual', start:'ttStart', close:'ttClose', note:'ttNote' }
        : { msg:'kkMsg', tank:'kkTank', actual:'kkActual', start:'kkDate',  close:'kkDate',  note:'kkNote' };
      const msg=document.getElementById(P.msg); msg.textContent='';
      const tank=val(P.tank);
      if(!tank){ msg.textContent='Chọn téc.'; return; }
      if(!val(P.actual)){ msg.textContent='Nhập tồn thực tế (lít).'; return; }
      const start=val(P.start), close=val(P.close);
      if(!start){ msg.textContent='Chọn ngày bắt đầu.'; return; }
      if(kind==='tinh_tec' && (!close || close<start)){ msg.textContent='Ngày chốt phải ≥ ngày bắt đầu.'; return; }
      if(kind==='kiem_ke' && !state.kkBienBan){ msg.textContent='Đính kèm biên bản xác nhận kiểm kê.'; return; }
      let bienBanPath=null;
      try{
        if(kind==='kiem_ke' && state.kkBienBan){
          const f=state.kkBienBan;
          const ext=((f.name||'').split('.').pop()||'jpg').toLowerCase().replace(/[^a-z0-9]/g,'')||'jpg';
          const path=`${monthOf(close)}/kiem-ke/${tank}-${Date.now()}.${ext}`;
          const {error}=await sb.storage.from('chung-tu').upload(path, f, {contentType:f.type||'image/jpeg', upsert:false});
          if(error) throw error;
          bienBanPath=path;   // chỉ đánh dấu đã upload sau khi thành công → biết đường dọn nếu ghi kỳ lỗi
        }
        const r=await call('rpc_stock_period_record',{ p_tank_id:tank, p_kind:kind,
          p_start_date:start, p_close_date:close, p_actual_liters:num(val(P.actual)),
          p_note:val(P.note)||null, p_bien_ban_path:bienBanPath });
        toast(`Đã ghi. Tịnh âm ${fmtNum(r.tinhAm)}, tịnh dương ${fmtNum(r.tinhDuong)}.`);
        renderAdjust(el);
      }catch(err){

        if(bienBanPath){ try{ await sb.storage.from('chung-tu').remove([bienBanPath]); }catch(_){} }

    function renderPeriodList(el){

    // Chốt kỳ Mo cũ (từ luồng 2 bước trước đây) — luồng mới ghi thẳng nên không sinh kỳ Mo.
    async function closePeriod(id, el){
      const s=prompt('Nhập Tồn thực tế đo tay (lít) để chốt kỳ:',''); if(s===null) return;
      const actual=num(s);
      if(!confirm(`Chốt kỳ với tồn thực tế ${fmtNum(actual)} lít? Không thể sửa sau khi chốt.`)) return;
      try{ const r=await call('rpc_stock_period_close',{ p_id:id, p_actual_liters:actual });
        toast(`Đã chốt. Tịnh âm ${fmtNum(r.tinhAm)}, tịnh dương ${fmtNum(r.tinhDuong)}.`); renderAdjust(el);
      }catch(err){ toast(err.message); }
    }
    async function deletePeriod(id, el){
      if(!confirm('Xóa kỳ đang mở này?')) return;
      try{ await call('rpc_stock_period_delete',{p_id:id}); toast('Đã xóa.'); renderAdjust(el);
      }catch(err){ toast(err.message); }

    async function viewAlloc(id){

    // ---- Báo cáo tiêu hao tháng (S8) ----
    function fmtL(v){ const n=Number(v||0); return n===0?'0':n.toLocaleString('vi-VN',{maximumFractionDigits:3}); }
    // 3 báo cáo tiêu hao (tái hiện 3 sheet Excel cũ).
    const REPORT_KINDS=[['tonghop','Tổng hợp tiêu hao','rpc_report_monthly'],
      ['daily','Diesel theo ngày','rpc_report_diesel_daily'],
      ['detail','Diesel chi tiết (định mức)','rpc_report_diesel_detail']];
    async function renderReport(el){
      const now=new Date();
      state.report=state.report||{ month:now.getMonth()+1, year:now.getFullYear(), kind:'tonghop' };
      if(!state.report.kind) state.report.kind='tonghop';
      el.innerHTML=`<div class="panel">${loadingText()}</div>`;
      try{
        const rpc=(REPORT_KINDS.find(k=>k[0]===state.report.kind)||REPORT_KINDS[0])[2];
        const r=await call(rpc,{ p_month:state.report.month, p_year:state.report.year,
          p_from:state.report.from||null, p_to:state.report.to||null });
        state.reportData=r; renderReportUI(el);
      }catch(err){ el.innerHTML=`<div class="panel"><span class="msg">${esc(err.message)}</span></div>`; }
    }
    // Khoảng ngày mặc định (đầu → cuối tháng) tránh lệch múi giờ khi dùng toISOString.
    function monthBounds(m,y){ const pad=n=>String(n).padStart(2,'0'); const last=new Date(y,m,0).getDate();
      return [`${y}-${pad(m)}-01`, `${y}-${pad(m)}-${pad(last)}`]; }
    function renderReportUI(el){
      const d=state.reportData, kind=state.report.kind;
      const mopts=Array.from({length:12},(_,i)=>`<option value="${i+1}" ${d.month===i+1?'selected':''}>Tháng ${i+1}</option>`).join('');
      const yrs=[]; for(let y=new Date().getFullYear()+1;y>=2024;y--) yrs.push(`<option value="${y}" ${d.year===y?'selected':''}>${y}</option>`);
      const tabs=REPORT_KINDS.map(k=>`<button class="ghost sm ${k[0]===kind?'active':''}" data-rk="${k[0]}"
        style="${k[0]===kind?'background:var(--accent);color:#fff;border-color:var(--accent)':''}">${esc(k[1])}</button>`).join(' ');
      const built = kind==='daily'?reportDaily(d) : kind==='detail'?reportDetail(d) : reportTongHop(d);
      el.innerHTML=`<div class="panel">
        <div class="row" style="gap:6px;margin-bottom:12px">${tabs}</div>
        <div class="row" style="align-items:flex-end;flex-wrap:wrap;gap:10px">
          <div style="flex:0;min-width:120px"><label>Tháng</label><select id="rpMonth">${mopts}</select></div>
          <div style="flex:0;min-width:110px"><label>Năm</label><select id="rpYear">${yrs.join('')}</select></div>
          <div style="flex:0;min-width:150px"><label>Từ ngày</label><input type="date" id="rpFrom" value="${esc(d.from||'')}"></div>
          <div style="flex:0;min-width:150px"><label>Đến ngày</label><input type="date" id="rpTo" value="${esc(d.to||'')}"></div>
          <div style="flex:0"><button id="rpGo">Xem</button></div>
          <div style="flex:0"><button class="ghost" id="rpXlsx">Tải Excel</button></div>
        </div>
        <p class="muted" style="margin:6px 0 0;font-size:12px">Khoảng đang xem: ${esc(d.from||'')} → ${esc(d.to||'')} (mặc định là cả tháng; đổi Tháng/Năm sẽ tự đặt lại khoảng).</p>
        <p class="muted" style="margin-top:8px">${built.note}</p>
        <div style="overflow:auto">${built.table}</div></div>`;
      el.querySelectorAll('[data-rk]').forEach(b=> b.onclick=()=>{ state.report.kind=b.dataset.rk; renderReport(el); });
      // Đổi Tháng/Năm → đặt lại Từ/Đến ngày = đầu/cuối tháng đó.
      const resetBounds=()=>{ const [f,t]=monthBounds(Number(val('rpMonth')),Number(val('rpYear')));
        document.getElementById('rpFrom').value=f; document.getElementById('rpTo').value=t; };
      document.getElementById('rpMonth').onchange=resetBounds;
      document.getElementById('rpYear').onchange=resetBounds;
      document.getElementById('rpGo').onclick=()=>{ state.report={ month:Number(val('rpMonth')), year:Number(val('rpYear')),
        from:val('rpFrom')||null, to:val('rpTo')||null, kind }; renderReport(el); };
      document.getElementById('rpXlsx').onclick=()=>exportReportXlsx();
    }
    // ---- Báo cáo 1: Tổng hợp tiêu hao (TONG HOP TIEU HAO) ----
    // Báo cáo tách theo đơn vị (entity). Nhóm dòng, giữ thứ tự Thiên Nhật → Lâm Hải.
    const REPORT_ENTITIES=['Thiên Nhật','Lâm Hải'];
    function groupByEntity(rows){
      const map={}; (rows||[]).forEach(r=>{ const k=r.entity||'Thiên Nhật'; (map[k]=map[k]||[]).push(r); });
      const order=REPORT_ENTITIES.filter(e=>map[e]); Object.keys(map).forEach(k=>{ if(!order.includes(k)) order.push(k); });
      return order.map(e=>[e,map[e]]);
    }
    function sumBy(rows,f){ return (rows||[]).reduce((a,r)=>a+Number(f(r)||0),0); }
    // Dựng các bảng con theo đơn vị. renderTable(subset)→HTML một <table>. Rỗng → 1 bảng trống.
    function entitySplit(rows, renderTable){
      const groups=groupByEntity(rows);
      if(!groups.length) return renderTable([]);
      return groups.map(([name,sub])=>`<div style="margin-bottom:18px">
        <h3 style="margin:6px 0;color:var(--accent-dark)">${esc(name)} <span class="muted" style="font-weight:600;font-size:13px">(${sub.length} xe)</span></h3>
        ${renderTable(sub)}</div>`).join('');
    }
    function reportTongHop(d){
      const tanks=d.tanks||[], oils=d.oils||[], rows=d.rows||[];
      const cell=(obj,id)=>fmtL(obj&&obj[id]);
      const head=`<tr><th>STT</th><th>Biển số xe</th>${tanks.map(k=>`<th>${esc(k.name)}</th>`).join('')}
        <th>Bơm ngoài</th><th>Tổng diesel</th>${oils.map(o=>`<th>${esc(o.name)}</th>`).join('')}
        <th>Tổng dầu khác</th><th>KM</th><th>Tịnh âm</th><th>Tiêu hao thực</th><th>L/100km</th><th>Tháng trước</th></tr>`;
      const groupTable=(sub)=>{
        const body=sub.length?sub.map((r,i)=>`<tr>
          <td>${i+1}</td><td>${esc(r.plate)}</td>
          ${tanks.map(k=>`<td>${cell(r.tanks,k.id)}</td>`).join('')}
          <td>${fmtL(r.bomNgoai)}</td><td style="font-weight:700">${fmtL(r.tongDiesel)}</td>
          ${oils.map(o=>`<td>${cell(r.otherOils,o.id)}</td>`).join('')}
          <td>${fmtL(r.tongOilKhac)}</td><td>${fmtL(r.km)}</td><td>${fmtL(r.tinhAm)}</td>
          <td style="font-weight:700">${fmtL(r.tieuHaoThuc)}</td>
          <td>${r.lPer100==null?'—':fmtL(r.lPer100)}</td>
          <td class="muted">${r.lPer100Prev==null?'—':fmtL(r.lPer100Prev)}</td></tr>`).join('')
          :`<tr><td colspan="${tanks.length+oils.length+8}" class="muted">Không có dữ liệu trong kỳ này.</td></tr>`;
        const foot=`<tr class="rpt-foot" style="font-weight:800">
          <td>TỔNG</td><td></td>${tanks.map(()=>'<td></td>').join('')}
          <td>${fmtL(sumBy(sub,r=>r.bomNgoai))}</td><td>${fmtL(sumBy(sub,r=>r.tongDiesel))}</td>${oils.map(()=>'<td></td>').join('')}
          <td>${fmtL(sumBy(sub,r=>r.tongOilKhac))}</td><td>${fmtL(sumBy(sub,r=>r.km))}</td><td>${fmtL(sumBy(sub,r=>r.tinhAm))}</td>
          <td>${fmtL(sumBy(sub,r=>r.tieuHaoThuc))}</td><td></td><td></td></tr>`;
        return `<table class="rpt-grid">${head}${body}${foot}</table>`;
      };
      return { note:'Tiêu hao thực = Tổng diesel + Tịnh âm − Tịnh dương. L/100km = Tiêu hao thực ÷ KM × 100. Chỉ phiếu đã duyệt/legacy.',
        table:entitySplit(rows, groupTable) };
    }
    // ---- Báo cáo 2: Diesel theo ngày (TIEU HAO DIESEL_2) ----
    function reportDaily(d){
      const rows=d.rows||[], dim=d.daysInMonth||31;
      const days=Array.from({length:dim},(_,i)=>i+1);
      const head=`<tr><th>STT</th><th>Biển số xe</th>${days.map(n=>`<th>${n}</th>`).join('')}
        <th>Tổng xuất</th><th>Bơm ngoài</th><th>Tịnh âm</th><th>Tịnh dương</th><th>Tiêu hao thực</th>
        <th>KM</th><th>L/100km</th><th>L/km</th><th>L/km tháng trước</th></tr>`;
      const dcell=(obj,n)=>fmtL(obj&&obj[String(n)]);
      const groupTable=(sub)=>{
        const body=sub.length?sub.map((r,i)=>`<tr>
          <td>${i+1}</td><td>${esc(r.plate)}</td>
          ${days.map(n=>`<td>${dcell(r.days,n)}</td>`).join('')}
          <td style="font-weight:700">${fmtL(r.tongXuat)}</td><td>${fmtL(r.bomNgoai)}</td>
          <td>${fmtL(r.tinhAm)}</td><td>${fmtL(r.tinhDuong)}</td>
          <td style="font-weight:700">${fmtL(r.tieuHaoThuc)}</td><td>${fmtL(r.km)}</td>
          <td>${r.lPer100==null?'—':fmtL(r.lPer100)}</td><td>${r.lPerKm==null?'—':fmtL(r.lPerKm)}</td>
          <td class="muted">${r.lPerKmPrev==null?'—':fmtL(r.lPerKmPrev)}</td></tr>`).join('')
          :`<tr><td colspan="${dim+11}" class="muted">Không có dữ liệu trong kỳ này.</td></tr>`;
        const foot=`<tr class="rpt-foot" style="font-weight:800">
          <td>TỔNG</td><td></td>${days.map(()=>'<td></td>').join('')}
          <td>${fmtL(sumBy(sub,r=>r.tongXuat))}</td><td>${fmtL(sumBy(sub,r=>r.bomNgoai))}</td><td>${fmtL(sumBy(sub,r=>r.tinhAm))}</td>
          <td>${fmtL(sumBy(sub,r=>r.tinhDuong))}</td><td>${fmtL(sumBy(sub,r=>r.tieuHaoThuc))}</td><td>${fmtL(sumBy(sub,r=>r.km))}</td><td></td><td></td><td></td></tr>`;
        return `<table class="rpt-grid">${head}${body}${foot}</table>`;
      };
      return { note:'Lưới diesel xuất nội bộ theo từng ngày trong tháng. Tiêu hao thực = Tổng xuất + Bơm ngoài + Tịnh âm − Tịnh dương.',
        table:entitySplit(rows, groupTable) };
    }
    // ---- Báo cáo 3: Diesel chi tiết theo định mức (TIEU HAO DIESEL_1) ----
    function reportDetail(d){
      const rows=d.rows||[];
      const head=`<tr><th>STT</th><th>Biển số xe</th><th>Diesel từ téc</th><th>Bơm ngoài</th><th>Tổng diesel</th>
        <th>KM (phiếu bơm)</th><th>Tiêu hao thực</th><th>Định mức bơm bom</th>
        <th>L/km (phiếu bơm)</th><th>L/km tháng trước</th><th>Thay đổi L/km</th></tr>`;
      const groupTable=(sub)=>{
        const body=sub.length?sub.map((r,i)=>`<tr>
          <td>${i+1}</td><td>${esc(r.plate)}</td>
          <td>${fmtL(r.dieselTec)}</td><td>${fmtL(r.bomNgoai)}</td><td style="font-weight:700">${fmtL(r.tongDiesel)}</td>
          <td>${fmtL(r.km)}</td><td style="font-weight:700">${fmtL(r.tieuHaoThuc)}</td>
          <td>${r.dinhMucBom==null?'—':fmtL(r.dinhMucBom)}</td>
          <td>${r.lPerKm==null?'—':fmtL(r.lPerKm)}</td>
          <td class="muted">${r.lPerKmPrev==null?'—':fmtL(r.lPerKmPrev)}</td>
          <td style="${r.thayDoiLPerKm!=null&&Number(r.thayDoiLPerKm)>0?'color:var(--danger)':(r.thayDoiLPerKm!=null&&Number(r.thayDoiLPerKm)<0?'color:var(--ok)':'')}">${r.thayDoiLPerKm==null?'—':fmtL(r.thayDoiLPerKm)}</td></tr>`).join('')
          :`<tr><td colspan="11" class="muted">Không có dữ liệu trong kỳ này.</td></tr>`;
        const foot=`<tr class="rpt-foot" style="font-weight:800">
          <td>TỔNG</td><td></td><td>${fmtL(sumBy(sub,r=>r.dieselTec))}</td><td>${fmtL(sumBy(sub,r=>r.bomNgoai))}</td><td>${fmtL(sumBy(sub,r=>r.tongDiesel))}</td>
          <td>${fmtL(sumBy(sub,r=>r.km))}</td><td>${fmtL(sumBy(sub,r=>r.tieuHaoThuc))}</td><td></td><td></td><td></td><td></td></tr>`;
        return `<table class="rpt-grid">${head}${body}${foot}</table>`;
      };
      return { note:'L/km (phiếu bơm) = Diesel từ téc ÷ KM theo phiếu bơm. "Định mức bơm bom" lấy từ Danh mục & Xe. Thay đổi L/km so tháng trước: đỏ = tăng, xanh = giảm. Các cột nhập tay (dầu tồn thủ kho, KM đồng hồ, số chuyến…) nằm trong bản Excel để kế toán điền.',
        table:entitySplit(rows, groupTable) };
    }
    function exportReportXlsx(){
      const d=state.reportData, kind=state.report.kind; if(!d||!window.XLSX){ toast('Chưa có dữ liệu.'); return; }
      const N=v=>Number(v||0), S=(sub,key)=>sumBy(sub,r=>r[key]);
      const period=(d.from&&d.to)?`${d.from} → ${d.to}`:`Tháng ${d.month}/${d.year}`;
      let baseTitle, sheetBase, header, mapRow, mapFoot;
      if(kind==='daily'){
        const dim=d.daysInMonth||31, days=Array.from({length:dim},(_,i)=>i+1);
        baseTitle='TIÊU HAO DIESEL THEO NGÀY'; sheetBase='Diesel ngay';
        header=['STT','Biển số xe',...days,'Tổng xuất','Bơm ngoài','Tịnh âm','Tịnh dương','Tiêu hao thực','KM','L/100km','L/km','L/km tháng trước','Ghi chú'];
        mapRow=(r,i)=>[i+1,r.plate,...days.map(n=>N(r.days&&r.days[String(n)])),
          N(r.tongXuat),N(r.bomNgoai),N(r.tinhAm),N(r.tinhDuong),N(r.tieuHaoThuc),N(r.km),
          r.lPer100==null?'':N(r.lPer100),r.lPerKm==null?'':N(r.lPerKm),r.lPerKmPrev==null?'':N(r.lPerKmPrev),''];
        mapFoot=sub=>['','TỔNG',...days.map(()=>''),S(sub,'tongXuat'),S(sub,'bomNgoai'),S(sub,'tinhAm'),
          S(sub,'tinhDuong'),S(sub,'tieuHaoThuc'),S(sub,'km'),'','','',''];
      } else if(kind==='detail'){
        // Bám SÁT nguyên layout sheet gốc TIEU HAO DIESEL_1 (cột A→T). Cột suy ra
        // được thì tự điền; cột nhập tay (dầu tồn thủ kho, KM đồng hồ, số chuyến,
        // bơm bom, tỷ lệ theo đồng hồ, ghi chú) để trống cho kế toán điền.
        baseTitle='TIÊU HAO DIESEL CHI TIẾT'; sheetBase='Diesel chi tiet';
        header=['Stt','Biển số xe',
          'Dầu tồn đầu kỳ (thủ kho nhập)','Dầu tồn cuối kỳ (thủ kho nhập)',
          'Tổng nhập / tiêu hao sau tịnh','KL tiêu hao thực tế',
          'KM theo phiếu bơm','KM đầu tháng (đồng hồ)','KM cuối tháng (đồng hồ)','KM theo đồng hồ','Đồng hồ − phiếu bơm',
          'Bơm bom','Số chuyến (thủ kho nhập)','Định mức bơm bom','Bơm đầu xe',
          'Tỷ lệ tiêu hao theo phiếu bơm (L/km)','Tỷ lệ tiêu hao theo đồng hồ (L/km)',
          'L/km tháng này','Thay đổi L/km vs tháng trước','Ghi chú'];
        mapRow=(r,i)=>[i+1,r.plate,
          '','',                                  // C,D dầu tồn thủ kho — nhập tay
          N(r.tieuHaoThuc),                       // E tổng nhập/tiêu hao sau tịnh
          '',                                     // F = C+E−D — nhập tay
          N(r.km),                                // G KM theo phiếu bơm
          '','',                                  // H,I KM đồng hồ đầu/cuối — nhập tay
          '','',                                  // J,K = I−H, J−G — nhập tay
          '','',                                  // L,M bơm bom, số chuyến — nhập tay
          r.dinhMucBom==null?'':N(r.dinhMucBom),  // N định mức bơm bom
          N(r.dieselTec),                         // O bơm đầu xe (diesel xuất nội bộ từ téc)
          r.lPerKm==null?'':N(r.lPerKm),          // P tỷ lệ theo phiếu bơm = O/G
          '',                                     // Q theo đồng hồ (cần J) — nhập tay
          r.lPerKm==null?'':N(r.lPerKm),          // R L/km tháng này = O/G
          r.thayDoiLPerKm==null?'':N(r.thayDoiLPerKm), // S thay đổi vs tháng trước
          ''];                                    // T ghi chú
        mapFoot=sub=>['','TỔNG','','',S(sub,'tieuHaoThuc'),'',S(sub,'km'),
          '','','','','','','',S(sub,'dieselTec'),'','','','',''];
      } else {
        const tanks=d.tanks||[], oils=d.oils||[];
        baseTitle='TỔNG HỢP TIÊU HAO'; sheetBase='Tong hop';
        header=['STT','Biển số xe',...tanks.map(k=>k.name),'Bơm ngoài','Tổng diesel',
          ...oils.map(o=>o.name),'Tổng dầu khác','KM','Tịnh âm','Tiêu hao thực','L/100km','L/100km tháng trước','Ghi chú'];
        mapRow=(r,i)=>[i+1,r.plate,...tanks.map(k=>N(r.tanks&&r.tanks[k.id])),N(r.bomNgoai),N(r.tongDiesel),
          ...oils.map(o=>N(r.otherOils&&r.otherOils[o.id])),N(r.tongOilKhac),N(r.km),N(r.tinhAm),
          N(r.tieuHaoThuc),r.lPer100==null?'':N(r.lPer100),r.lPer100Prev==null?'':N(r.lPer100Prev),''];
        mapFoot=sub=>['','TỔNG',...tanks.map(()=>''),S(sub,'bomNgoai'),S(sub,'tongDiesel'),
          ...oils.map(()=>''),S(sub,'tongOilKhac'),S(sub,'km'),S(sub,'tinhAm'),S(sub,'tieuHaoThuc'),'','',''];
      }
      const wb=window.XLSX.utils.book_new(); const used={};
      const addSheet=(name,sub)=>{
        const aoa=[[`${baseTitle} — ${name} — ${period}`],[],header];
        sub.forEach((r,i)=>aoa.push(mapRow(r,i)));
        aoa.push(mapFoot(sub));
        let sn=`${sheetBase} ${name}`.replace(/[\\\/\?\*\[\]:]/g,' ').slice(0,31);
        while(used[sn]) sn=(sn.slice(0,29)+' '+(Object.keys(used).length)).slice(0,31); used[sn]=1;
        window.XLSX.utils.book_append_sheet(wb, window.XLSX.utils.aoa_to_sheet(aoa), sn);
      };
      const groups=groupByEntity(d.rows||[]);
      if(groups.length) groups.forEach(([name,sub])=>addSheet(name,sub)); else addSheet('Tất cả',[]);
      window.XLSX.writeFile(wb, `${sheetBase.replace(/ /g,'_')}_${d.year}_${String(d.month).padStart(2,'0')}.xlsx`);
    }

    // ---- Cảnh báo tồn + Web Push (S7) ----
    function alertColor(level){ return level==='danger'?'var(--danger)':'var(--orange)'; }

    async function refreshAlertBell(){
      const bell=document.getElementById('alertBell'), badge=document.getElementById('notifBadge');
      if(!bell || !can('alert:read')){ if(bell) bell.classList.add('hidden'); return; }
      bell.classList.remove('hidden');
      try{
        const res=await call('rpc_alerts_list',{ p_limit:1 });
        const n=Number(res.unread)||0;
        if(n>0){ badge.textContent = n>99?'99+':n; badge.classList.remove('hidden'); }
        else badge.classList.add('hidden');
      }catch(_e){}
    }

    async function renderAlerts(el){
      el.innerHTML=`<div class="panel">${loadingText()}</div>`;
      try{
        const res=await call('rpc_alerts_list',{ p_limit:100 });
        state.alerts=res.rows||[];
        renderAlertsUI(el, res.unread||0);
        refreshAlertBell();
      }catch(err){ el.innerHTML=`<div class="panel"><span class="msg">${esc(err.message)}</span></div>`; }
    }
    function renderAlertsUI(el, unread){
      const rows=state.alerts||[];
      const list = rows.length
        ? rows.map(r=>`<div class="panel" style="margin-bottom:10px;border-left:4px solid ${alertColor(r.level)};${r.read?'opacity:.6':''}">
            <div class="row" style="align-items:center">
              <div style="flex:1"><b>${esc(r.title)}</b>
                ${r.read?'':'<span class="badge" style="background:var(--danger);color:#fff">mới</span>'}
                <div class="muted" style="margin-top:2px">${esc(r.body)}</div>
                <div class="muted" style="font-size:12px;margin-top:4px">${esc(r.createdAt)}</div></div>
              ${r.read?'':`<button class="ghost sm" data-read="${r.id}" style="flex:0">Đã đọc</button>`}
            </div></div>`).join('')
        : '<div class="panel muted">Chưa có cảnh báo nào. Tồn kho đang trong ngưỡng an toàn.</div>';
      el.innerHTML=`<div class="panel"><div class="row" style="align-items:center">
          <h2 style="flex:1;margin:0">Cảnh báo tồn</h2>
          ${unread>0?'<button class="ghost sm" id="alRead" style="flex:0">Đánh dấu đã đọc hết</button>':''}
          <button class="ghost sm" id="alReload" style="flex:0">Tải lại</button></div>
        <p class="muted" style="margin-top:4px">Tồn âm · vượt sức chứa · dưới điểm đặt hàng. Tối đa 1 cảnh báo / loại / téc / ngày.</p>
        <div id="pushBox"></div></div>
        ${list}`;
      document.getElementById('alReload').onclick=()=>renderAlerts(el);
      const allBtn=document.getElementById('alRead');
      if(allBtn) allBtn.onclick=async()=>{ try{ await call('rpc_alerts_mark_read',{}); renderAlerts(el); }catch(err){ toast(err.message); } };
      el.querySelectorAll('[data-read]').forEach(b=> b.onclick=async()=>{
        try{ await call('rpc_alerts_mark_read',{ p_id:b.dataset.read }); renderAlerts(el); }catch(err){ toast(err.message); } });
      renderPushBox();
    }

    // --- Web Push ---
    function pushSupported(){ return 'serviceWorker' in navigator && 'PushManager' in window && 'Notification' in window; }
    function urlBase64ToUint8Array(base64){
      const pad='='.repeat((4-base64.length%4)%4);
      const b64=(base64+pad).replace(/-/g,'+').replace(/_/g,'/');
      const raw=atob(b64); const out=new Uint8Array(raw.length);
      for(let i=0;i<raw.length;i++) out[i]=raw.charCodeAt(i);
      return out;
    }
    async function currentPushSub(){
      if(!pushSupported()) return null;
      const reg=await navigator.serviceWorker.ready;
      return reg.pushManager.getSubscription();
    }
    async function renderPushBox(){
      const box=document.getElementById('pushBox'); if(!box) return;
      if(!APP.vapidPublicKey){ box.innerHTML='<p class="muted" style="font-size:13px">Web Push chưa cấu hình (thiếu VAPID). Cảnh báo vẫn hiện trong app.</p>'; return; }
      if(!pushSupported()){ box.innerHTML='<p class="muted" style="font-size:13px">Trình duyệt/thiết bị này không hỗ trợ push. iOS cần cài PWA vào màn hình chính.</p>'; return; }
      const sub=await currentPushSub();
      box.innerHTML = sub
        ? '<button class="ghost sm" id="pushOff" style="flex:0">Tắt thông báo đẩy trên thiết bị này</button>'
        : '<button class="sm" id="pushOn" style="flex:0">Bật thông báo đẩy trên thiết bị này</button>';
      const on=document.getElementById('pushOn'), off=document.getElementById('pushOff');
      if(on) on.onclick=enablePush;
      if(off) off.onclick=disablePush;
    }
    async function enablePush(){
      try{
        const perm=await Notification.requestPermission();
        if(perm!=='granted'){ toast('Bạn chưa cho phép thông báo.'); return; }
        const reg=await navigator.serviceWorker.ready;
        const sub=await reg.pushManager.subscribe({ userVisibleOnly:true,
          applicationServerKey:urlBase64ToUint8Array(APP.vapidPublicKey) });
        const j=sub.toJSON();
        await call('rpc_push_subscribe',{ p_endpoint:sub.endpoint,
          p_p256dh:j.keys&&j.keys.p256dh, p_auth:j.keys&&j.keys.auth, p_user_agent:navigator.userAgent });
        toast('Đã bật thông báo đẩy.'); renderPushBox();
      }catch(err){ toast('Không bật được push: '+(err.message||err)); }
    }
    async function disablePush(){
      try{
        const sub=await currentPushSub();
        if(sub){ await call('rpc_push_unsubscribe',{ p_endpoint:sub.endpoint }); await sub.unsubscribe(); }
        toast('Đã tắt thông báo đẩy.'); renderPushBox();
      }catch(err){ toast('Không tắt được push: '+(err.message||err)); }
    }

    document.getElementById('alertBell').onclick=toggleNotif;
    document.getElementById('loginBtn').onclick=function(){ withBusy(this,'Đang đăng nhập…',login); };
    document.getElementById('logoutBtn').onclick=logout;
    document.getElementById('loginPin').addEventListener('keydown',e=>{ if(e.key==='Enter') login(); });
    // Đóng panel thông báo khi bấm ra ngoài chuông.
    document.addEventListener('click',e=>{ if(!e.target.closest('.bell-wrap')) closeNotif(); });

    // FAB: Quay lại + Lên đầu trang.
    (function initFabs(){
      const back=document.createElement('button'); back.className='back-fab'; back.id='backFab'; back.innerHTML='← Quay lại';
      back.onclick=()=>history.back(); document.body.appendChild(back);
      const top=document.createElement('button'); top.className='to-top'; top.id='toTop'; top.textContent='↑'; top.title='Lên đầu trang';
      top.onclick=()=>window.scrollTo({top:0,behavior:'smooth'}); document.body.appendChild(top);
      window.addEventListener('scroll',()=>{ top.classList.toggle('show',(window.scrollY||document.documentElement.scrollTop||0)>400); },{passive:true});
    })();

    // Tự gắn nhãn cột cho mọi bảng render vào vùng nội dung (kể cả tải bất đồng bộ).
    (function initTableLabels(){
      const host=document.getElementById('screen'); if(!host) return;
      // Chỉ theo dõi childList (không theo dõi attribute) nên gắn data-label không tự kích hoạt lại.
      new MutationObserver(()=>labelTableCells(host)).observe(host,{childList:true,subtree:true});
    })();

    (async function init(){
      const { data } = await sb.auth.getSession();
      if(data && data.session){ state.session=data.session; bootstrap(); }
    })();
    sb.auth.onAuthStateChange((event)=>{ if(event==='SIGNED_OUT') location.reload(); });
  </script>
