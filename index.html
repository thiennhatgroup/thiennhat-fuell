<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Thiên Nhật — Tồn kho Xăng dầu</title>
  <link rel="manifest" href="./manifest.webmanifest">
  <meta name="theme-color" content="#0E5AA7">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="TN Xăng dầu">
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js').catch(() => {}));
    }
  </script>
  <style>
    :root{--bg:#F4F6FA;--panel:#fff;--ink:#1E2A38;--muted:#64707E;--line:#E4EAF1;
      --accent:#0E5AA7;--accent-soft:#E7F0FA;--ok:#1E8E5A;--danger:#D14343;--input:#F5F8FC;}
    *{box-sizing:border-box}
    body{margin:0;background:var(--bg);color:var(--ink);font-size:15px;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif}
    header{display:flex;align-items:center;justify-content:space-between;gap:12px;
      padding:12px 16px;background:#fff;border-bottom:1px solid var(--line);position:sticky;top:0;z-index:20}
    h1{margin:0;font-size:16px;font-weight:800}
    h2{margin:0 0 12px;font-size:18px;font-weight:800}
    button,input,select{font:inherit;border-radius:10px;border:1px solid var(--line);min-height:44px}
    input,select{width:100%;background:var(--input);padding:10px 12px;color:var(--ink)}
    input:focus,select:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft);background:#fff}
    button{background:var(--accent);color:#fff;border:none;padding:10px 16px;font-weight:700;cursor:pointer}
    button.ghost{background:#fff;color:var(--accent);border:1px solid var(--line)}
    button.sm{min-height:34px;padding:6px 12px;font-size:13px}
    .wrap{max-width:820px;margin:0 auto;padding:16px}
    .panel{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:18px;margin-bottom:14px}
    .muted{color:var(--muted)}
    .row{display:flex;gap:10px;flex-wrap:wrap}
    .row>*{flex:1;min-width:140px}
    label{display:block;font-size:13px;color:var(--muted);margin:10px 0 4px;font-weight:600}
    .hidden{display:none!important}
    .nav{display:flex;gap:8px;overflow-x:auto;padding:10px 16px;background:#fff;border-bottom:1px solid var(--line);position:sticky;top:57px;z-index:10}
    .nav button{background:var(--accent-soft);color:var(--accent);white-space:nowrap;min-height:38px;padding:6px 14px;border-radius:999px}
    .nav button.active{background:var(--accent);color:#fff}
    table{width:100%;border-collapse:collapse}
    th,td{text-align:left;padding:9px 8px;border-bottom:1px solid var(--line);font-size:14px}
    th{color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:.03em}
    .badge{display:inline-block;padding:2px 10px;border-radius:999px;background:var(--accent-soft);color:var(--accent);font-size:12px;font-weight:700}
    .toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);background:#1E2A38;color:#fff;
      padding:12px 18px;border-radius:12px;opacity:0;transition:opacity .2s;z-index:50;max-width:90%}
    .toast.show{opacity:1}
    .msg{color:var(--danger);font-size:13px;min-height:18px;margin-top:6px}
    .soon{padding:30px 10px;text-align:center;color:var(--muted)}
    .soon .big{font-size:40px}
    .modalOverlay{position:fixed;inset:0;background:rgba(20,30,45,.55);display:none;
      align-items:flex-start;justify-content:center;z-index:60;padding:24px;overflow:auto}
    .modalCard{background:#fff;border-radius:14px;padding:18px;max-width:720px;width:100%}
    .thumb{width:100%;max-height:170px;object-fit:cover;border-radius:10px;border:1px solid var(--line)}
  </style>
</head>
<body>
  <!-- ĐĂNG NHẬP -->
  <div id="loginView" class="wrap">
    <div class="panel" style="max-width:420px;margin:8vh auto 0">
      <h2>Đăng nhập</h2>
      <p class="muted" style="margin-top:-6px">Tồn kho Xăng dầu — Thiên Nhật</p>
      <label>Email</label>
      <input id="loginEmail" type="email" autocomplete="username" placeholder="ban@congty.com">
      <label>Mã PIN</label>
      <input id="loginPin" type="password" inputmode="numeric" autocomplete="current-password" placeholder="••••">
      <div style="margin-top:14px"><button id="loginBtn" style="width:100%">Đăng nhập</button></div>
      <div id="loginMsg" class="msg"></div>
    </div>
  </div>

  <!-- APP -->
  <div id="appView" class="hidden">
    <header>
      <h1>TN — Tồn kho Xăng dầu</h1>
      <div class="row" style="flex:0">
        <span id="userBadge" class="badge"></span>
        <button class="ghost sm" id="logoutBtn">Đăng xuất</button>
      </div>
    </header>
    <div class="nav" id="nav"></div>
    <div class="wrap"><div id="screen"></div></div>
  </div>

  <div id="toast" class="toast"></div>
  <div id="modal" class="modalOverlay"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="./config.js"></script>
  <script>
    const APP = window.APP_CONFIG || {};
    const sb = window.supabase.createClient(APP.supabaseUrl, APP.supabaseAnonKey, {
      auth: { persistSession: true, autoRefreshToken: true }
    });

    const state = { session:null, user:null, permissions:[], screen:'home' };

    // [id, nhãn, quyền cần có, slice] — server VẪN chốt quyền qua require_permission().
    const SCREENS = [
      ['home',      'Trang chủ',        null,             ''],
      ['pump',      'Nhập bơm',         'pump:create',    'S2'],
      ['review',    'Đối chiếu bơm',    'pump:review',    'S2'],
      ['nhap',      'Phiếu nhập',       'pump:create',    'S4'],
      ['nhapReview','Đối chiếu nhập',   'pump:review',    'S4'],
      ['inventory', 'Tồn kho',          'inventory:read', 'S5'],
      ['adjust',    'Tịnh téc / Kiểm kê','adjust:manage',  'S6'],
      ['report',    'Báo cáo tháng',    'report:read',    'S8'],
      ['catalog',   'Danh mục & Xe',    'catalog:manage', 'S1'],
      ['users',     'Tài khoản',        'user:manage',    '']
    ];
    const ROLE_LABELS = { ThuKho:'Thủ kho', KeToan:'Kế toán', Admin:'Admin' };

    function can(p){ return !p || state.permissions.includes('*') || state.permissions.includes(p); }
    function visibleScreens(){ return SCREENS.filter(s => can(s[2])); }
    function esc(v){ return String(v ?? '').replace(/[&<>"']/g, s => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[s])); }
    function val(id){ return (document.getElementById(id)?.value || '').trim(); }
    function toast(t){ const e=document.getElementById('toast'); e.textContent=t; e.classList.add('show'); setTimeout(()=>e.classList.remove('show'),2600); }

    function call(name, params){
      return new Promise((resolve,reject)=>{
        let done=false;
        const timer=setTimeout(()=>{ if(done)return; done=true; reject(new Error(`Tác vụ ${name} chạy quá lâu. Kiểm tra mạng.`)); },45000);
        sb.rpc(name, params||{}).then(({data,error})=>{
          if(done)return; done=true; clearTimeout(timer);
          if(error){ reject(new Error(error.message||String(error))); return; }
          if(data && data.ok===false){ reject(new Error((data.error&&data.error.message)||data.message||`Tác vụ ${name} lỗi.`)); return; }
          resolve(data);
        }).catch(err=>{ if(done)return; done=true; clearTimeout(timer); reject(err instanceof Error?err:new Error(String(err))); });
      });
    }

    async function login(){
      const msg=document.getElementById('loginMsg'); msg.textContent='Đang đăng nhập...';
      const email=val('loginEmail'), pin=val('loginPin');
      if(!email||!pin){ msg.textContent='Nhập email và mã PIN.'; return; }
      try{
        const {data,error}=await sb.auth.signInWithPassword({ email, password:'tn-pin::'+pin });
        if(error) throw error;
        state.session=data.session; msg.textContent=''; await bootstrap();
      }catch(err){ msg.textContent=mapAuthError(err); }
    }
    function mapAuthError(err){
      const m=String(err&&err.message||err||'');
      if(/invalid login credentials/i.test(m)) return 'Email hoặc mã PIN không đúng.';
      if(/email not confirmed/i.test(m)) return 'Tài khoản chưa kích hoạt. Liên hệ Admin.';
      return m || 'Đăng nhập thất bại.';
    }
    async function logout(){ await sb.auth.signOut(); location.reload(); }

    async function bootstrap(){
      try{
        const res=await call('rpc_bootstrap');
        state.user=res.user; state.permissions=res.permissions||[];
        document.getElementById('loginView').classList.add('hidden');
        document.getElementById('appView').classList.remove('hidden');
        document.getElementById('userBadge').textContent=`${state.user.name} · ${ROLE_LABELS[state.user.role]||state.user.role}`;
        const allowed=visibleScreens();
        if(!allowed.some(s=>s[0]===state.screen)) state.screen=allowed[0][0];
        renderNav(); renderScreen();
      }catch(err){
        document.getElementById('loginView').classList.remove('hidden');
        document.getElementById('appView').classList.add('hidden');
        document.getElementById('loginMsg').textContent=err.message||'Không tải được dữ liệu.';
      }
    }

    function renderNav(){
      const nav=document.getElementById('nav');
      nav.innerHTML = visibleScreens().map(s =>
        `<button data-s="${s[0]}" class="${s[0]===state.screen?'active':''}">${esc(s[1])}</button>`).join('');
      nav.querySelectorAll('button').forEach(b=> b.onclick=()=>{ state.screen=b.dataset.s; renderNav(); renderScreen(); });
    }

    function renderScreen(){
      const el=document.getElementById('screen');
      const scr=SCREENS.find(s=>s[0]===state.screen);
      if(state.screen==='home') return renderHome(el);
      if(state.screen==='users') return renderUsers(el);
      if(state.screen==='catalog') return renderCatalog(el);
      if(state.screen==='pump') return renderPump(el);
      if(state.screen==='review') return renderReview(el);
      if(state.screen==='nhap') return renderNhap(el);
      if(state.screen==='nhapReview') return renderNhapReview(el);
      if(state.screen==='inventory') return renderInventory(el);
      // Placeholder cho các slice chưa build
      el.innerHTML=`<div class="panel soon"><div class="big">🛠️</div>
        <h2>${esc(scr[1])}</h2>
        <p class="muted">Màn hình này sẽ được xây ở lát <b>${scr[3]}</b> theo lộ trình (xem docs/issues).</p></div>`;
    }

    function renderHome(el){
      const items=visibleScreens().filter(s=>s[0]!=='home');
      el.innerHTML=`<div class="panel">
        <h2>Xin chào, ${esc(state.user.name)}</h2>
        <p class="muted">Vai trò: <b>${ROLE_LABELS[state.user.role]||state.user.role}</b>. Chọn chức năng bên dưới.</p>
        <div class="row" style="margin-top:8px">
          ${items.map(s=>`<button class="ghost" data-go="${s[0]}">${esc(s[1])}${s[3]?` <span class="muted">(${s[3]})</span>`:''}</button>`).join('')}
        </div>
      </div>
      <div class="panel"><b>Nền tảng S0 đã sẵn sàng.</b>
        <p class="muted">Đăng nhập email+PIN, phân quyền theo vai trò (Thủ kho / Kế toán / Admin), quản tài khoản. Các nghiệp vụ xăng dầu sẽ bổ sung theo từng lát S1→S9.</p></div>`;
      el.querySelectorAll('[data-go]').forEach(b=> b.onclick=()=>{ state.screen=b.dataset.go; renderNav(); renderScreen(); });
    }

    // ---- Màn Tài khoản (Admin) — chạy thật ----
    async function renderUsers(el){
      el.innerHTML=`<div class="panel">
        <h2>Tạo tài khoản</h2>
        <div class="row">
          <div><label>Email</label><input id="uEmail" type="email" placeholder="nguoidung@congty.com"></div>
          <div><label>Tên</label><input id="uName" placeholder="Họ tên"></div>
        </div>
        <div class="row">
          <div><label>Vai trò</label><select id="uRole">
            <option value="ThuKho">Thủ kho</option>
            <option value="KeToan">Kế toán</option>
            <option value="Admin">Admin</option>
          </select></div>
          <div><label>Mã PIN (≥4 số)</label><input id="uPin" inputmode="numeric" placeholder="••••"></div>
        </div>
        <div style="margin-top:12px"><button id="uCreate">Tạo tài khoản</button></div>
        <div id="uMsg" class="msg"></div>
      </div>
      <div class="panel"><h2>Danh sách tài khoản</h2><div id="uList" class="muted">Đang tải…</div></div>`;
      document.getElementById('uCreate').onclick=createUser;
      loadUsers();
    }
    async function loadUsers(){
      const box=document.getElementById('uList');
      try{
        const res=await call('rpc_admin_list_users');
        const rows=res.rows||[];
        if(!rows.length){ box.innerHTML='<span class="muted">Chưa có tài khoản.</span>'; return; }
        box.innerHTML=`<table><thead><tr><th>Email</th><th>Tên</th><th>Vai trò</th><th>Trạng thái</th><th></th></tr></thead><tbody>
          ${rows.map(r=>`<tr>
            <td>${esc(r.email)}</td><td>${esc(r.name)}</td>
            <td>${ROLE_LABELS[r.role]||esc(r.role)}</td>
            <td>${r.status==='Hoạt động'?'<span class="badge">Hoạt động</span>':esc(r.status)}</td>
            <td style="white-space:nowrap">
              <button class="ghost sm" data-pin="${r.id}" data-email="${esc(r.email)}">Đổi PIN</button>
              <button class="ghost sm" data-toggle="${r.id}" data-status="${esc(r.status)}">${r.status==='Hoạt động'?'Ngừng':'Bật'}</button>
            </td></tr>`).join('')}
        </tbody></table>`;
        box.querySelectorAll('[data-pin]').forEach(b=> b.onclick=()=>resetPin(b.dataset.pin,b.dataset.email));
        box.querySelectorAll('[data-toggle]').forEach(b=> b.onclick=()=>toggleUser(b.dataset.toggle, b.dataset.status));
      }catch(err){ box.innerHTML=`<span class="msg">${esc(err.message)}</span>`; }
    }
    async function createUser(){
      const msg=document.getElementById('uMsg'); msg.textContent='';
      try{
        await call('rpc_admin_create_user',{ p_email:val('uEmail'), p_name:val('uName'), p_role:val('uRole'), p_pin:val('uPin') });
        toast('Đã tạo tài khoản.'); ['uEmail','uName','uPin'].forEach(id=>document.getElementById(id).value=''); loadUsers();
      }catch(err){ msg.textContent=err.message; }
    }
    async function resetPin(id,email){
      const pin=(prompt(`Đặt lại PIN cho ${email} (≥4 số):`,'')||'').trim();
      if(!pin) return;
      try{ await call('rpc_admin_reset_pin',{ p_id:id, p_pin:pin }); toast('Đã đặt lại PIN.'); }
      catch(err){ toast(err.message); }
    }
    async function toggleUser(id,status){
      const next = status==='Hoạt động' ? 'Ngừng' : 'Hoạt động';
      try{ await call('rpc_admin_update_user',{ p_id:id, p_status:next }); toast('Đã cập nhật.'); loadUsers(); }
      catch(err){ toast(err.message); }
    }

    // ---- Màn Danh mục & Xe (Kế toán / Admin) ----
    const CAT_TABS = [
      ['tanks',    'Téc'],
      ['vehicles', 'Xe'],
      ['oilTypes', 'Loại dầu'],
      ['suppliers','Nhà cung cấp'],
      ['txnTypes', 'Loại giao dịch']
    ];
    function num(v){ const n=parseFloat(String(v).replace(',','.')); return isNaN(n)?0:n; }
    function fmtNum(v){ return (v==null||v==='')?'':Number(v).toLocaleString('vi-VN'); }

    async function renderCatalog(el){
      if(!state.catTab) state.catTab='tanks';
      el.innerHTML=`<div class="nav" style="position:static;padding:0 0 12px;border:none" id="catNav"></div>
        <div id="catBody" class="muted">Đang tải…</div>`;
      const nav=document.getElementById('catNav');
      nav.innerHTML=CAT_TABS.map(t=>`<button data-t="${t[0]}" class="${t[0]===state.catTab?'active':''}">${esc(t[1])}</button>`).join('');
      nav.querySelectorAll('button').forEach(b=> b.onclick=()=>{ state.catTab=b.dataset.t; state.catEdit=null; renderCatalog(el); });
      try{
        state.catalog=await call('rpc_catalog_list');
        renderCatTab();
      }catch(err){ document.getElementById('catBody').innerHTML=`<span class="msg">${esc(err.message)}</span>`; }
    }

    function renderCatTab(){
      const body=document.getElementById('catBody'); if(!body) return;
      const tab=state.catTab;
      if(tab==='tanks')     return renderTankTab(body);
      if(tab==='vehicles')  return renderVehicleTab(body);
      if(tab==='oilTypes')  return renderOilTypeTab(body);
      if(tab==='suppliers') return renderSupplierTab(body);
      if(tab==='txnTypes')  return renderTxnTypeTab(body);
    }

    function statusCell(active){ return active?'<span class="badge">Hoạt động</span>':'<span class="muted">Ngừng</span>'; }
    function rowActions(kind, r){
      return `<button class="ghost sm" data-edit="${r.id}">Sửa</button>
        <button class="ghost sm" data-toggle="${r.id}" data-active="${r.active?1:0}">${r.active?'Ngừng':'Bật'}</button>`;
    }
    async function catToggle(kind, id, active){
      try{ await call('rpc_catalog_toggle',{ p_kind:kind, p_id:id, p_active:!active }); toast('Đã cập nhật.');
        state.catalog=await call('rpc_catalog_list'); renderCatTab(); }
      catch(err){ toast(err.message); }
    }
    async function catSave(rpc, params, msgId){
      const msg=document.getElementById(msgId); if(msg) msg.textContent='';
      try{ await call(rpc, params); toast('Đã lưu.'); state.catEdit=null;
        state.catalog=await call('rpc_catalog_list'); renderCatTab(); }
      catch(err){ if(msg) msg.textContent=err.message; else toast(err.message); }
    }

    // --- Téc ---
    function renderTankTab(body){
      const rows=state.catalog.tanks||[], oils=state.catalog.oilTypes||[];
      const e=(state.catEdit&&rows.find(r=>r.id===state.catEdit))||null;
      const oilOpts=`<option value="">— chọn loại dầu —</option>`+oils.map(o=>`<option value="${o.id}" ${e&&e.oilTypeId===o.id?'selected':''}>${esc(o.name)}</option>`).join('');
      body.innerHTML=`<div class="panel"><h2>${e?'Sửa téc':'Thêm téc'}</h2>
        <div class="row">
          <div><label>Tên téc</label><input id="tName" value="${e?esc(e.name):''}" placeholder="Téc 1"></div>
          <div><label>Loại dầu</label><select id="tOil">${oilOpts}</select></div>
        </div>
        <div class="row">
          <div><label>Sức chứa (lít)</label><input id="tCap" inputmode="decimal" value="${e?esc(e.capacity):''}"></div>
          <div><label>Reorder point (lít)</label><input id="tReorder" inputmode="decimal" value="${e?esc(e.reorderPoint):''}"></div>
          <div><label>Lead-time (ngày)</label><input id="tLead" inputmode="numeric" value="${e?esc(e.leadTimeDays):''}"></div>
        </div>
        <div class="row" style="margin-top:12px;flex:0">
          <button id="tSave" style="flex:0">${e?'Lưu':'Thêm'}</button>
          ${e?'<button class="ghost" id="tCancel" style="flex:0">Hủy</button>':''}
        </div><div id="tMsg" class="msg"></div></div>
        <div class="panel"><h2>Danh sách téc</h2>${rows.length?`<table><thead><tr>
          <th>Tên</th><th>Loại dầu</th><th>Sức chứa</th><th>Reorder</th><th>Lead-time</th><th>Trạng thái</th><th></th></tr></thead><tbody>
          ${rows.map(r=>`<tr><td>${esc(r.name)}</td><td>${esc(r.oilTypeName||'')}</td>
            <td>${fmtNum(r.capacity)}</td><td>${fmtNum(r.reorderPoint)}</td><td>${esc(r.leadTimeDays)}</td>
            <td>${statusCell(r.active)}</td><td style="white-space:nowrap">${rowActions('tank',r)}</td></tr>`).join('')}
          </tbody></table>`:'<span class="muted">Chưa có téc.</span>'}</div>`;
      document.getElementById('tSave').onclick=()=>catSave('rpc_tank_upsert',{
        p_id:e?e.id:null, p_name:val('tName'), p_oil_type_id:val('tOil')||null,
        p_capacity:num(val('tCap')), p_reorder:num(val('tReorder')),
        p_lead_time_days:Math.round(num(val('tLead'))), p_active:e?e.active:true },'tMsg');
      wireEditToggle(body,'tank');
    }

    // --- Xe ---
    function renderVehicleTab(body){
      const rows=state.catalog.vehicles||[];
      const e=(state.catEdit&&rows.find(r=>r.id===state.catEdit))||null;
      body.innerHTML=`<div class="panel"><h2>${e?'Sửa xe':'Thêm xe'}</h2>
        <div class="row">
          <div><label>Biển số</label><input id="vPlate" value="${e?esc(e.plate):''}" placeholder="51C-123.45"></div>
          <div><label>Định mức bơm</label><input id="vNorm" inputmode="decimal" value="${e?esc(e.pumpNorm):''}"></div>
        </div>
        <label style="display:flex;align-items:center;gap:8px;margin-top:12px">
          <input type="checkbox" id="vOdo" style="width:auto;min-height:auto" ${(!e||e.hasOdometer)?'checked':''}> Có công-tơ-mét (đồng hồ KM)</label>
        <div class="row" style="margin-top:12px;flex:0">
          <button id="vSave" style="flex:0">${e?'Lưu':'Thêm'}</button>
          ${e?'<button class="ghost" id="vCancel" style="flex:0">Hủy</button>':''}
        </div><div id="vMsg" class="msg"></div></div>
        <div class="panel"><h2>Danh sách xe</h2>${rows.length?`<table><thead><tr>
          <th>Biển số</th><th>Định mức bơm</th><th>Công-tơ-mét</th><th>Trạng thái</th><th></th></tr></thead><tbody>
          ${rows.map(r=>`<tr><td>${esc(r.plate)}</td><td>${fmtNum(r.pumpNorm)}</td>
            <td>${r.hasOdometer?'Có':'Không'}</td><td>${statusCell(r.active)}</td>
            <td style="white-space:nowrap">${rowActions('vehicle',r)}</td></tr>`).join('')}
          </tbody></table>`:'<span class="muted">Chưa có xe.</span>'}</div>`;
      document.getElementById('vSave').onclick=()=>catSave('rpc_vehicle_upsert',{
        p_id:e?e.id:null, p_plate:val('vPlate'), p_pump_norm:num(val('vNorm')),
        p_has_odometer:document.getElementById('vOdo').checked, p_active:e?e.active:true },'vMsg');
      wireEditToggle(body,'vehicle');
    }

    // --- Loại dầu ---
    function renderOilTypeTab(body){
      const rows=state.catalog.oilTypes||[];
      const e=(state.catEdit&&rows.find(r=>r.id===state.catEdit))||null;
      body.innerHTML=`<div class="panel"><h2>${e?'Sửa loại dầu':'Thêm loại dầu'}</h2>
        <div class="row"><div><label>Tên loại dầu</label><input id="oName" value="${e?esc(e.name):''}" placeholder="DO 0.05S"></div></div>
        <div class="row" style="margin-top:12px;flex:0">
          <button id="oSave" style="flex:0">${e?'Lưu':'Thêm'}</button>
          ${e?'<button class="ghost" id="oCancel" style="flex:0">Hủy</button>':''}
        </div><div id="oMsg" class="msg"></div></div>
        <div class="panel"><h2>Danh sách loại dầu</h2>${rows.length?`<table><thead><tr>
          <th>Tên</th><th>Trạng thái</th><th></th></tr></thead><tbody>
          ${rows.map(r=>`<tr><td>${esc(r.name)}</td><td>${statusCell(r.active)}</td>
            <td style="white-space:nowrap">${rowActions('oilType',r)}</td></tr>`).join('')}
          </tbody></table>`:'<span class="muted">Chưa có loại dầu.</span>'}</div>`;
      document.getElementById('oSave').onclick=()=>catSave('rpc_oil_type_upsert',{
        p_id:e?e.id:null, p_name:val('oName'), p_active:e?e.active:true },'oMsg');
      wireEditToggle(body,'oilType');
    }

    // --- Nhà cung cấp ---
    function renderSupplierTab(body){
      const rows=state.catalog.suppliers||[];
      const e=(state.catEdit&&rows.find(r=>r.id===state.catEdit))||null;
      body.innerHTML=`<div class="panel"><h2>${e?'Sửa nhà cung cấp':'Thêm nhà cung cấp'}</h2>
        <div class="row">
          <div><label>Tên NCC</label><input id="sName" value="${e?esc(e.name):''}" placeholder="Cửa hàng xăng dầu…"></div>
          <div><label>Điện thoại</label><input id="sPhone" value="${e&&e.phone?esc(e.phone):''}"></div>
        </div>
        <label>Ghi chú</label><input id="sNote" value="${e&&e.note?esc(e.note):''}">
        <div class="row" style="margin-top:12px;flex:0">
          <button id="sSave" style="flex:0">${e?'Lưu':'Thêm'}</button>
          ${e?'<button class="ghost" id="sCancel" style="flex:0">Hủy</button>':''}
        </div><div id="sMsg" class="msg"></div></div>
        <div class="panel"><h2>Danh sách nhà cung cấp</h2>${rows.length?`<table><thead><tr>
          <th>Tên</th><th>Điện thoại</th><th>Ghi chú</th><th>Trạng thái</th><th></th></tr></thead><tbody>
          ${rows.map(r=>`<tr><td>${esc(r.name)}</td><td>${esc(r.phone||'')}</td><td>${esc(r.note||'')}</td>
            <td>${statusCell(r.active)}</td><td style="white-space:nowrap">${rowActions('supplier',r)}</td></tr>`).join('')}
          </tbody></table>`:'<span class="muted">Chưa có nhà cung cấp.</span>'}</div>`;
      document.getElementById('sSave').onclick=()=>catSave('rpc_supplier_upsert',{
        p_id:e?e.id:null, p_name:val('sName'), p_phone:val('sPhone'), p_note:val('sNote'), p_active:e?e.active:true },'sMsg');
      wireEditToggle(body,'supplier');
    }

    // --- Loại giao dịch (cố định: chỉ đổi tên / ngừng) ---
    function renderTxnTypeTab(body){
      const rows=state.catalog.txnTypes||[];
      const e=(state.catEdit&&rows.find(r=>r.id===state.catEdit))||null;
      body.innerHTML=`${e?`<div class="panel"><h2>Sửa loại giao dịch</h2>
        <div class="row"><div><label>Tên hiển thị</label><input id="xName" value="${esc(e.name)}"></div></div>
        <p class="muted">Mã: <b>${esc(e.code)}</b> · Bản chất: <b>${esc(e.kind)}</b> (cố định).</p>
        <div class="row" style="margin-top:12px;flex:0">
          <button id="xSave" style="flex:0">Lưu</button>
          <button class="ghost" id="xCancel" style="flex:0">Hủy</button>
        </div><div id="xMsg" class="msg"></div></div>`:''}
        <div class="panel"><h2>Loại giao dịch</h2>
        <p class="muted">Danh mục cố định (không thêm mới). Đổi tên hiển thị hoặc ngừng dùng.</p>
        ${rows.length?`<table><thead><tr><th>Tên</th><th>Mã</th><th>Bản chất</th><th>Trạng thái</th><th></th></tr></thead><tbody>
          ${rows.map(r=>`<tr><td>${esc(r.name)}</td><td>${esc(r.code)}</td><td>${esc(r.kind)}</td>
            <td>${statusCell(r.active)}</td><td style="white-space:nowrap">${rowActions('txnType',r)}</td></tr>`).join('')}
          </tbody></table>`:'<span class="muted">Chưa có.</span>'}</div>`;
      if(e) document.getElementById('xSave').onclick=()=>catSave('rpc_txn_type_upsert',{
        p_id:e.id, p_name:val('xName'), p_active:e.active },'xMsg');
      wireEditToggle(body,'txnType');
    }

    function wireEditToggle(body, kind){
      body.querySelectorAll('[data-edit]').forEach(b=> b.onclick=()=>{ state.catEdit=b.dataset.edit; renderCatTab(); });
      body.querySelectorAll('[data-toggle]').forEach(b=> b.onclick=()=>catToggle(kind, b.dataset.toggle, b.dataset.active==='1'));
      ['tCancel','vCancel','oCancel','sCancel','xCancel'].forEach(id=>{
        const c=document.getElementById(id); if(c) c.onclick=()=>{ state.catEdit=null; renderCatTab(); };
      });
    }

    // ---- Danh mục active dùng chung cho dropdown nhập liệu ----
    async function ensureActive(force){
      if(state.active && !force) return state.active;
      state.active=await call('rpc_catalog_active');
      return state.active;
    }

    // ---- Màn Nhập bơm (ThuKho) ----
    const STATUS_LABEL={ Nhap:'Nháp', ChoDoiChieu:'Chờ đối chiếu', DaDuyet:'Đã duyệt' };
    async function renderPump(el){
      el.innerHTML='<div class="panel muted">Đang tải…</div>';
      try{ await ensureActive(); await loadPumpMine(); renderPumpUI(el); }
      catch(err){ el.innerHTML=`<div class="panel"><span class="msg">${esc(err.message)}</span></div>`; }
    }
    async function loadPumpMine(){ state.pumpMine=(await call('rpc_pump_list_mine')).rows||[]; }

    function renderPumpUI(el){
      const a=state.active, e=(state.pumpEdit&&state.pumpMine.find(r=>r.id===state.pumpEdit&&r.status==='Nhap'))||null;
      const txns=(a.txnTypes||[]).filter(t=>t.kind!=='nhap');
      const veh=a.vehicles||[], tanks=a.tanks||[], oils=a.oilTypes||[], sups=a.suppliers||[];
      const sel=(id,v)=>v&&v===id?'selected':'';
      const opt=(arr,idKey,labelKey,cur)=>arr.map(x=>`<option value="${x[idKey]}" ${sel(x[idKey],cur)}>${esc(x[labelKey])}</option>`).join('');
      const curKind = e ? e.txnKind : (txns[0]&&txns[0].kind);
      el.innerHTML=`<div class="panel"><h2>${e?`Sửa phiếu ${e.code?esc(e.code):'nháp'}`:'Phiếu bơm mới'}</h2>
        <div class="row">
          <div><label>Xe</label><select id="pVeh"><option value="">— chọn xe —</option>${opt(veh,'id','plate',e&&e.vehicleId)}</select></div>
          <div><label>Loại giao dịch</label><select id="pTxn">${txns.map(t=>`<option value="${t.id}" data-kind="${t.kind}" ${sel(t.id,e&&e.txnTypeId)}>${esc(t.name)}</option>`).join('')}</select></div>
        </div>
        <div class="row">
          <div id="pTankWrap"><label>Téc</label><select id="pTank"><option value="">— chọn téc —</option>${opt(tanks,'id','name',e&&e.tankId)}</select></div>
          <div><label>Loại dầu</label><select id="pOil"><option value="">— chọn loại dầu —</option>${opt(oils,'id','name',e&&e.oilTypeId)}</select></div>
        </div>
        <div class="row">
          <div><label>Số lít</label><input id="pLit" inputmode="decimal" value="${e?esc(e.liters):''}"></div>
          <div id="pKmWrap" class="row" style="flex:2;margin:0">
            <div><label>KM cũ (tự động)</label><input id="pKmOld" inputmode="decimal" readonly
              style="background:var(--bg);color:var(--muted)" value="${e&&e.kmOld!=null?esc(e.kmOld):''}"></div>
            <div><label>KM mới</label><input id="pKmNew" inputmode="decimal" value="${e&&e.kmNew!=null?esc(e.kmNew):''}"></div>
          </div>
        </div>
        <div id="pKmHint" class="muted" style="font-size:13px;min-height:18px"></div>
        <div id="pSupWrap"><label>Nhà cung cấp (bơm ngoài)</label><select id="pSup"><option value="">—</option>${opt(sups,'id','name',e&&e.supplierId)}</select></div>
        <label>Ghi chú</label><input id="pNote" value="${e&&e.note?esc(e.note):''}">
        <div class="row" style="margin-top:12px;flex:0">
          <button id="pSave" style="flex:0">${e?'Lưu':'Thêm phiếu'}</button>
          ${e?'<button class="ghost" id="pCancel" style="flex:0">Hủy</button>':''}
        </div><div id="pMsg" class="msg"></div>
      </div>
      ${e?`<div class="panel"><h2>Ảnh chứng từ</h2>
        <p class="muted" style="margin-top:-6px">Bắt buộc ảnh đồng hồ bơm; ảnh công-tơ-mét bắt buộc khi xe có công-tơ-mét. Chụp trước khi Submit ngày.</p>
        <div id="photoBox" class="muted">Đang tải ảnh…</div></div>`:''}
      <div class="panel"><div class="row" style="align-items:center"><h2 style="flex:1;margin:0">Phiếu của tôi</h2>
        <button id="pSubmit" class="sm" style="flex:0">Submit ngày</button></div>
        <div id="pList" style="margin-top:12px"></div></div>`;

      const setKindUI=()=>{
        const kOpt=document.getElementById('pTxn').selectedOptions[0];
        const kind=kOpt?kOpt.dataset.kind:curKind;
        document.getElementById('pTankWrap').style.display = kind==='bom_ngoai'?'none':'';
        document.getElementById('pSupWrap').style.display = kind==='bom_ngoai'?'':'none';
      };
      // Ẩn cả khu KM khi xe không có công-tơ-mét (không nhập KM).
      const setKmUI=()=>{
        const hasOdo = vehHasOdo(val('pVeh'));
        document.getElementById('pKmWrap').style.display = hasOdo?'':'none';
        if(!hasOdo){ document.getElementById('pKmNew').value=''; document.getElementById('pKmHint').textContent=''; }
      };
      const kmHint=()=>{
        const o=num(val('pKmOld')), n=num(val('pKmNew')), h=document.getElementById('pKmHint');
        if(!val('pKmOld')){ h.textContent=val('pKmNew')?'Chưa có KM cũ trong hệ thống — lần bơm đầu của xe này.':''; h.style.color='var(--muted)'; return; }
        if(!val('pKmNew')){ h.textContent=`KM cũ trong hệ thống: ${fmtNum(o)}. Nhập KM mới để hệ thống tự trừ.`; h.style.color='var(--muted)'; return; }
        const d=n-o; h.textContent = d<0?`⚠ KM mới nhỏ hơn KM cũ (${fmtNum(d)}).`:`KM đi (tự trừ): ${fmtNum(d)}`;
        h.style.color = d<0?'var(--danger)':'var(--muted)';
      };
      document.getElementById('pTxn').onchange=setKindUI;
      document.getElementById('pKmNew').oninput=kmHint;
      document.getElementById('pVeh').onchange=async(ev)=>{
        setKmUI();
        if(e) return; // sửa thì giữ nguyên KM cũ đã có
        const vid=ev.target.value; if(!vid){ document.getElementById('pKmOld').value=''; kmHint(); return; }
        try{ const r=await call('rpc_vehicle_last_km',{p_vehicle_id:vid});
          document.getElementById('pKmOld').value=r.kmOld!=null?r.kmOld:''; kmHint(); }catch(_){}
      };
      setKindUI(); setKmUI(); kmHint();
      document.getElementById('pSave').onclick=()=>savePump(e, el);
      document.getElementById('pSubmit').onclick=()=>submitPumpDay(el);
      const c=document.getElementById('pCancel'); if(c) c.onclick=()=>{ state.pumpEdit=null; renderPumpUI(el); };
      renderPumpList();
      if(e) renderPhotoSection(e.id, e.vehicleId);
    }

    function vehHasOdo(vehicleId){
      const v=((state.active&&state.active.vehicles)||[]).find(x=>x.id===vehicleId);
      return !v || v.hasOdometer;  // mặc định coi là có công-tơ-mét nếu không rõ
    }
    async function signedUrl(path){
      try{ const {data}=await sb.storage.from('chung-tu').createSignedUrl(path,300); return (data&&data.signedUrl)||''; }
      catch(_){ return ''; }
    }
    const KIND_LABEL={ pump_meter:'Ảnh đồng hồ bơm', odometer:'Ảnh công-tơ-mét' };
    async function renderPhotoSection(ledgerId, vehicleId){
      const box=document.getElementById('photoBox'); if(!box) return;
      let photos=[];
      try{ photos=(await call('rpc_pump_photo_list',{p_ledger_id:ledgerId})).rows||[]; }
      catch(err){ box.innerHTML=`<span class="msg">${esc(err.message)}</span>`; return; }
      const slots=[['pump_meter',true]];
      if(vehHasOdo(vehicleId)) slots.push(['odometer',true]);
      const parts=[];
      for(const [kind] of slots){
        const p=photos.find(x=>x.kind===kind);
        if(p){
          const url=await signedUrl(p.path);
          parts.push(`<div style="flex:1;min-width:160px"><label>${KIND_LABEL[kind]}</label>
            ${url?`<a href="${esc(url)}" target="_blank"><img class="thumb" src="${esc(url)}"></a>`:'<div class="muted">Đã có ảnh.</div>'}
            <div style="margin-top:6px"><button class="ghost sm" data-delphoto="${p.id}">Xóa ảnh</button></div></div>`);
        }else{
          parts.push(`<div style="flex:1;min-width:160px"><label>${KIND_LABEL[kind]} <span style="color:var(--danger)">*</span></label>
            <input type="file" accept="image/*" capture="environment" data-kind="${kind}"></div>`);
        }
      }
      box.innerHTML=`<div class="row">${parts.join('')}</div><div id="photoMsg" class="msg"></div>`;
      box.querySelectorAll('input[type=file]').forEach(inp=> inp.onchange=()=>uploadPhoto(ledgerId, vehicleId, inp.dataset.kind, inp.files[0]));
      box.querySelectorAll('[data-delphoto]').forEach(b=> b.onclick=()=>deletePhoto(ledgerId, vehicleId, b.dataset.delphoto));
    }
    async function uploadPhoto(ledgerId, vehicleId, kind, file){
      if(!file) return;
      const msg=document.getElementById('photoMsg'); if(msg){ msg.style.color='var(--muted)'; msg.textContent='Đang tải ảnh…'; }
      try{
        const ext=((file.name||'').split('.').pop()||'jpg').toLowerCase().replace(/[^a-z0-9]/g,'')||'jpg';
        const path=`${ledgerId}/${kind}-${Date.now()}.${ext}`;
        const {error}=await sb.storage.from('chung-tu').upload(path, file, {contentType:file.type||'image/jpeg', upsert:false});
        if(error) throw error;
        await call('rpc_pump_photo_add',{p_ledger_id:ledgerId, p_kind:kind, p_path:path});
        toast('Đã thêm ảnh.'); renderPhotoSection(ledgerId, vehicleId);
      }catch(err){ if(msg){ msg.style.color='var(--danger)'; msg.textContent=err.message||'Tải ảnh thất bại.'; } }
    }
    async function deletePhoto(ledgerId, vehicleId, photoId){
      if(!confirm('Xóa ảnh này?')) return;
      try{
        const r=await call('rpc_pump_photo_delete',{p_id:photoId});
        if(r&&r.path){ try{ await sb.storage.from('chung-tu').remove([r.path]); }catch(_){} }
        toast('Đã xóa ảnh.'); renderPhotoSection(ledgerId, vehicleId);
      }catch(err){ toast(err.message); }
    }

    function pumpParams(e){
      const kOpt=document.getElementById('pTxn').selectedOptions[0];
      const kind=kOpt?kOpt.dataset.kind:'';
      const p={ p_vehicle_id:val('pVeh')||null, p_txn_type_id:val('pTxn')||null, p_oil_type_id:val('pOil')||null,
        p_liters:num(val('pLit')), p_tank_id: kind==='bom_ngoai'?null:(val('pTank')||null),
        p_km_new:val('pKmNew')?num(val('pKmNew')):null, p_km_old:val('pKmOld')?num(val('pKmOld')):null,
        p_supplier_id: kind==='bom_ngoai'?(val('pSup')||null):null, p_note:val('pNote') };
      if(e) p.p_id=e.id;
      return p;
    }
    async function savePump(e, el){
      const msg=document.getElementById('pMsg'); msg.textContent='';
      try{
        const res=await call(e?'rpc_pump_update':'rpc_pump_create', pumpParams(e));
        toast(e?'Đã lưu phiếu.':'Đã thêm phiếu. Bổ sung ảnh chứng từ.');
        state.pumpEdit=(e&&e.id)||(res&&res.id)||null;  // ở lại chế độ sửa để đính ảnh
        await loadPumpMine(); renderPumpUI(el);
        if(state.pumpEdit) window.scrollTo(0,0);
      }catch(err){ msg.textContent=err.message; }
    }
    async function submitPumpDay(el){
      if(!confirm('Submit toàn bộ phiếu Nháp để chuyển sang Chờ đối chiếu?')) return;
      try{ const r=await call('rpc_pump_submit_day'); toast(`Đã submit ${r.count} phiếu.`);
        await loadPumpMine(); renderPumpUI(el); }
      catch(err){ toast(err.message); }
    }
    function renderPumpList(){
      const box=document.getElementById('pList'); const rows=state.pumpMine||[];
      if(!rows.length){ box.innerHTML='<span class="muted">Chưa có phiếu.</span>'; return; }
      box.innerHTML=`<table><thead><tr><th>Số phiếu</th><th>Xe</th><th>Loại GD</th><th>Téc</th>
        <th>Lít</th><th>KM đi</th><th>Trạng thái</th><th></th></tr></thead><tbody>
        ${rows.map(r=>`<tr>
          <td>${r.code?esc(r.code):'<span class="muted">(nháp)</span>'}${r.rejectReason?`<div class="msg" style="min-height:0">Trả về: ${esc(r.rejectReason)}</div>`:''}</td>
          <td>${esc(r.plate||'')}</td><td>${esc(r.txnName||'')}</td><td>${esc(r.tankName||'')}</td>
          <td>${fmtNum(r.liters)}</td><td>${r.kmRun!=null?fmtNum(r.kmRun):''}</td>
          <td><span class="badge">${STATUS_LABEL[r.status]||esc(r.status)}</span></td>
          <td style="white-space:nowrap">${r.status==='Nhap'
            ? `<button class="ghost sm" data-edit="${r.id}">Sửa</button><button class="ghost sm" data-del="${r.id}">Xóa</button>`
            : `<button class="ghost sm" data-withdraw="${r.id}">Rút lại</button>`}</td>
        </tr>`).join('')}</tbody></table>`;
      const el=document.getElementById('screen');
      box.querySelectorAll('[data-edit]').forEach(b=> b.onclick=()=>{ state.pumpEdit=b.dataset.edit; renderPumpUI(el); window.scrollTo(0,0); });
      box.querySelectorAll('[data-del]').forEach(b=> b.onclick=()=>delPump(b.dataset.del, el));
      box.querySelectorAll('[data-withdraw]').forEach(b=> b.onclick=()=>withdrawPump(b.dataset.withdraw, el));
    }
    async function delPump(id, el){
      if(!confirm('Xóa phiếu nháp này?')) return;
      try{ await call('rpc_pump_delete',{p_id:id}); toast('Đã xóa.'); await loadPumpMine(); renderPumpUI(el); }
      catch(err){ toast(err.message); }
    }
    async function withdrawPump(id, el){
      try{ await call('rpc_pump_withdraw',{p_id:id}); toast('Đã rút lại về nháp.'); await loadPumpMine(); renderPumpUI(el); }
      catch(err){ toast(err.message); }
    }

    // ---- Màn Đối chiếu chéo (ThuKho khác người tạo) ----
    async function renderReview(el){
      el.innerHTML='<div class="panel muted">Đang tải…</div>';
      try{ const rows=(await call('rpc_pump_review_queue')).rows||[];
        el.innerHTML=`<div class="panel"><h2>Hàng đợi đối chiếu</h2>
          ${rows.length?`<table><thead><tr><th>Số phiếu</th><th>Người tạo</th><th>Xe</th><th>Loại GD</th>
            <th>Téc</th><th>Lít</th><th>KM đi</th><th></th></tr></thead><tbody>
            ${rows.map(r=>`<tr><td>${esc(r.code||'')}</td><td>${esc(r.createdBy||'')}</td>
              <td>${esc(r.plate||'')}</td><td>${esc(r.txnName||'')}</td><td>${esc(r.tankName||'')}</td>
              <td>${fmtNum(r.liters)}</td><td>${r.kmRun!=null?fmtNum(r.kmRun):''}</td>
              <td style="white-space:nowrap">
                <button class="ghost sm" data-photos="${r.id}">Ảnh</button>
                <button class="sm" data-ok="${r.id}" style="background:var(--ok)">Khớp</button>
                <button class="ghost sm" data-no="${r.id}">Lệch</button></td></tr>`).join('')}
            </tbody></table>`:'<span class="muted">Không có phiếu chờ đối chiếu.</span>'}</div>`;
        el.querySelectorAll('[data-photos]').forEach(b=> b.onclick=()=>viewPhotos(b.dataset.photos));
        el.querySelectorAll('[data-ok]').forEach(b=> b.onclick=()=>reviewPump('rpc_pump_approve',{p_id:b.dataset.ok},el));
        el.querySelectorAll('[data-no]').forEach(b=> b.onclick=()=>{
          const reason=(prompt('Lý do trả về (Lệch):','')||'').trim(); if(!reason) return;
          reviewPump('rpc_pump_reject',{p_id:b.dataset.no,p_reason:reason},el);
        });
      }catch(err){ el.innerHTML=`<div class="panel"><span class="msg">${esc(err.message)}</span></div>`; }
    }
    async function reviewPump(rpc, params, el){
      try{ await call(rpc, params); toast('Đã xử lý phiếu.'); renderReview(el); }
      catch(err){ toast(err.message); }
    }
    async function viewPhotos(ledgerId){
      let rows=[];
      try{ rows=(await call('rpc_pump_photo_list',{p_ledger_id:ledgerId})).rows||[]; }
      catch(err){ toast(err.message); return; }
      if(!rows.length){ toast('Phiếu chưa có ảnh.'); return; }
      showModal('Ảnh chứng từ', '<div class="muted">Đang tải ảnh…</div>');
      const parts=[];
      for(const p of rows){
        const url=await signedUrl(p.path);
        parts.push(`<div style="flex:1;min-width:200px"><label>${KIND_LABEL[p.kind]||esc(p.kind)}</label>
          ${url?`<a href="${esc(url)}" target="_blank"><img class="thumb" style="max-height:none" src="${esc(url)}"></a>`:'<span class="muted">Không tải được ảnh.</span>'}</div>`);
      }
      showModal('Ảnh chứng từ', `<div class="row">${parts.join('')}</div>`);
    }
    function showModal(title, html){
      const m=document.getElementById('modal');
      m.innerHTML=`<div class="modalCard"><div class="row" style="align-items:center;margin-bottom:8px">
        <h2 style="flex:1;margin:0">${esc(title)}</h2>
        <button class="ghost sm" id="modalClose" style="flex:0">Đóng</button></div>
        <div>${html}</div></div>`;
      m.style.display='flex';
      m.onclick=(ev)=>{ if(ev.target===m) closeModal(); };
      document.getElementById('modalClose').onclick=closeModal;
    }
    function closeModal(){ const m=document.getElementById('modal'); m.style.display='none'; m.innerHTML=''; }

    // ---- Màn Phiếu nhập (ThuKho) — nhập dầu về téc ----
    async function renderNhap(el){
      el.innerHTML='<div class="panel muted">Đang tải…</div>';
      try{ await ensureActive(); await loadNhapMine(); renderNhapUI(el); }
      catch(err){ el.innerHTML=`<div class="panel"><span class="msg">${esc(err.message)}</span></div>`; }
    }
    async function loadNhapMine(){ state.nhapMine=(await call('rpc_nhap_list_mine')).rows||[]; }

    function renderNhapUI(el){
      const a=state.active, e=(state.nhapEdit&&state.nhapMine.find(r=>r.id===state.nhapEdit&&r.status==='Nhap'))||null;
      const tanks=a.tanks||[], oils=a.oilTypes||[], sups=a.suppliers||[];
      const sel=(id,v)=>v&&v===id?'selected':'';
      const opt=(arr,idKey,labelKey,cur)=>arr.map(x=>`<option value="${x[idKey]}" ${sel(x[idKey],cur)}>${esc(x[labelKey])}</option>`).join('');
      el.innerHTML=`<div class="panel"><h2>${e?`Sửa phiếu ${e.code?esc(e.code):'nháp'}`:'Phiếu nhập mới'}</h2>
        <div class="row">
          <div><label>Nhà cung cấp</label><select id="nSup"><option value="">— chọn NCC —</option>${opt(sups,'id','name',e&&e.supplierId)}</select></div>
          <div><label>Téc nhận</label><select id="nTank"><option value="">— chọn téc —</option>${opt(tanks,'id','name',e&&e.tankId)}</select></div>
        </div>
        <div class="row">
          <div><label>Loại dầu</label><select id="nOil"><option value="">— chọn loại dầu —</option>${opt(oils,'id','name',e&&e.oilTypeId)}</select></div>
          <div><label>Số HĐ NCC</label><input id="nInv" value="${e&&e.supplierInvoiceNo?esc(e.supplierInvoiceNo):''}" placeholder="Số hóa đơn nhà cung cấp"></div>
        </div>
        <div class="row">
          <div><label>Số lít</label><input id="nLit" inputmode="decimal" value="${e?esc(e.liters):''}"></div>
          <div><label>Đơn giá</label><input id="nPrice" inputmode="decimal" value="${e&&e.unitPrice!=null?esc(e.unitPrice):''}"></div>
          <div><label>Thành tiền (tự tính)</label><input id="nAmount" readonly
            style="background:var(--bg);color:var(--muted)" value="${e&&e.amount!=null?fmtNum(e.amount):''}"></div>
        </div>
        <label>Ghi chú</label><input id="nNote" value="${e&&e.note?esc(e.note):''}">
        <div class="row" style="margin-top:12px;flex:0">
          <button id="nSave" style="flex:0">${e?'Lưu':'Thêm phiếu'}</button>
          ${e?'<button class="ghost" id="nCancel" style="flex:0">Hủy</button>':''}
        </div><div id="nMsg" class="msg"></div>
      </div>
      ${e?`<div class="panel"><h2>Ảnh chứng từ</h2>
        <p class="muted" style="margin-top:-6px">Bắt buộc ≥1 ảnh phiếu nhập. Chụp trước khi Submit ngày.</p>
        <div id="nPhotoBox" class="muted">Đang tải ảnh…</div></div>`:''}
      <div class="panel"><div class="row" style="align-items:center"><h2 style="flex:1;margin:0">Phiếu của tôi</h2>
        <button id="nSubmit" class="sm" style="flex:0">Submit ngày</button></div>
        <div id="nList" style="margin-top:12px"></div></div>`;

      const recalc=()=>{ const amt=num(val('nLit'))*num(val('nPrice')); document.getElementById('nAmount').value = amt>0?fmtNum(Math.round(amt*100)/100):''; };
      // Chọn téc → gợi ý loại dầu của téc nếu chưa chọn.
      document.getElementById('nTank').onchange=(ev)=>{
        const t=(a.tanks||[]).find(x=>x.id===ev.target.value);
        const oilSel=document.getElementById('nOil');
        if(t&&t.oilTypeId&&!oilSel.value) oilSel.value=t.oilTypeId;
      };
      document.getElementById('nLit').oninput=recalc;
      document.getElementById('nPrice').oninput=recalc;
      recalc();
      document.getElementById('nSave').onclick=()=>saveNhap(e, el);
      document.getElementById('nSubmit').onclick=()=>submitNhapDay(el);
      const c=document.getElementById('nCancel'); if(c) c.onclick=()=>{ state.nhapEdit=null; renderNhapUI(el); };
      renderNhapList();
      if(e) renderReceiptSection(e.id);
    }

    async function renderReceiptSection(ledgerId){
      const box=document.getElementById('nPhotoBox'); if(!box) return;
      let photos=[];
      try{ photos=(await call('rpc_nhap_photo_list',{p_ledger_id:ledgerId})).rows||[]; }
      catch(err){ box.innerHTML=`<span class="msg">${esc(err.message)}</span>`; return; }
      const parts=photos.map(p=>`<div style="flex:1;min-width:160px" data-slot="${p.id}"><label>Ảnh phiếu nhập</label>
        <span class="muted">Đang tải…</span></div>`);
      parts.push(`<div style="flex:1;min-width:160px"><label>Thêm ảnh phiếu nhập ${photos.length?'':'<span style="color:var(--danger)">*</span>'}</label>
        <input type="file" accept="image/*" capture="environment" id="nPhotoInput"></div>`);
      box.innerHTML=`<div class="row">${parts.join('')}</div><div id="nPhotoMsg" class="msg"></div>`;
      for(const p of photos){
        const slot=box.querySelector(`[data-slot="${p.id}"]`); if(!slot) continue;
        const url=await signedUrl(p.path);
        slot.innerHTML=`<label>Ảnh phiếu nhập</label>
          ${url?`<a href="${esc(url)}" target="_blank"><img class="thumb" src="${esc(url)}"></a>`:'<div class="muted">Đã có ảnh.</div>'}
          <div style="margin-top:6px"><button class="ghost sm" data-delreceipt="${p.id}">Xóa ảnh</button></div>`;
      }
      const inp=document.getElementById('nPhotoInput'); if(inp) inp.onchange=()=>uploadReceipt(ledgerId, inp.files[0]);
      box.querySelectorAll('[data-delreceipt]').forEach(b=> b.onclick=()=>deleteReceipt(ledgerId, b.dataset.delreceipt));
    }
    async function uploadReceipt(ledgerId, file){
      if(!file) return;
      const msg=document.getElementById('nPhotoMsg'); if(msg){ msg.style.color='var(--muted)'; msg.textContent='Đang tải ảnh…'; }
      try{
        const ext=((file.name||'').split('.').pop()||'jpg').toLowerCase().replace(/[^a-z0-9]/g,'')||'jpg';
        const path=`${ledgerId}/receipt-${Date.now()}.${ext}`;
        const {error}=await sb.storage.from('chung-tu').upload(path, file, {contentType:file.type||'image/jpeg', upsert:false});
        if(error) throw error;
        await call('rpc_nhap_photo_add',{p_ledger_id:ledgerId, p_path:path});
        toast('Đã thêm ảnh.'); renderReceiptSection(ledgerId);
      }catch(err){ if(msg){ msg.style.color='var(--danger)'; msg.textContent=err.message||'Tải ảnh thất bại.'; } }
    }
    async function deleteReceipt(ledgerId, photoId){
      if(!confirm('Xóa ảnh này?')) return;
      try{
        const r=await call('rpc_nhap_photo_delete',{p_id:photoId});
        if(r&&r.path){ try{ await sb.storage.from('chung-tu').remove([r.path]); }catch(_){} }
        toast('Đã xóa ảnh.'); renderReceiptSection(ledgerId);
      }catch(err){ toast(err.message); }
    }

    function nhapParams(e){
      const p={ p_supplier_id:val('nSup')||null, p_tank_id:val('nTank')||null, p_oil_type_id:val('nOil')||null,
        p_liters:num(val('nLit')), p_unit_price:num(val('nPrice')),
        p_supplier_invoice_no:val('nInv'), p_note:val('nNote') };
      if(e) p.p_id=e.id;
      return p;
    }
    async function saveNhap(e, el){
      const msg=document.getElementById('nMsg'); msg.textContent='';
      try{
        const res=await call(e?'rpc_nhap_update':'rpc_nhap_create', nhapParams(e));
        toast(e?'Đã lưu phiếu.':'Đã thêm phiếu. Bổ sung ảnh phiếu nhập.');
        state.nhapEdit=(e&&e.id)||(res&&res.id)||null;  // ở lại chế độ sửa để đính ảnh
        await loadNhapMine(); renderNhapUI(el);
        if(state.nhapEdit) window.scrollTo(0,0);
      }catch(err){ msg.textContent=err.message; }
    }
    async function submitNhapDay(el){
      if(!confirm('Submit toàn bộ phiếu nhập Nháp để chuyển sang Chờ đối chiếu?')) return;
      try{ const r=await call('rpc_nhap_submit_day'); toast(`Đã submit ${r.count} phiếu.`);
        await loadNhapMine(); renderNhapUI(el); }
      catch(err){ toast(err.message); }
    }
    function renderNhapList(){
      const box=document.getElementById('nList'); const rows=state.nhapMine||[];
      if(!rows.length){ box.innerHTML='<span class="muted">Chưa có phiếu.</span>'; return; }
      box.innerHTML=`<table><thead><tr><th>Số phiếu</th><th>NCC</th><th>Téc</th><th>Loại dầu</th>
        <th>Lít</th><th>Đơn giá</th><th>Thành tiền</th><th>Trạng thái</th><th></th></tr></thead><tbody>
        ${rows.map(r=>`<tr>
          <td>${r.code?esc(r.code):'<span class="muted">(nháp)</span>'}${r.rejectReason?`<div class="msg" style="min-height:0">Trả về: ${esc(r.rejectReason)}</div>`:''}${r.supplierInvoiceNo?`<div class="muted" style="font-size:12px">HĐ: ${esc(r.supplierInvoiceNo)}</div>`:''}</td>
          <td>${esc(r.supplierName||'')}</td><td>${esc(r.tankName||'')}</td><td>${esc(r.oilTypeName||'')}</td>
          <td>${fmtNum(r.liters)}</td><td>${fmtNum(r.unitPrice)}</td><td>${fmtNum(r.amount)}</td>
          <td><span class="badge">${STATUS_LABEL[r.status]||esc(r.status)}</span></td>
          <td style="white-space:nowrap">${r.status==='Nhap'
            ? `<button class="ghost sm" data-nedit="${r.id}">Sửa</button><button class="ghost sm" data-ndel="${r.id}">Xóa</button>`
            : `<button class="ghost sm" data-nwithdraw="${r.id}">Rút lại</button>`}</td>
        </tr>`).join('')}</tbody></table>`;
      const el=document.getElementById('screen');
      box.querySelectorAll('[data-nedit]').forEach(b=> b.onclick=()=>{ state.nhapEdit=b.dataset.nedit; renderNhapUI(el); window.scrollTo(0,0); });
      box.querySelectorAll('[data-ndel]').forEach(b=> b.onclick=()=>delNhap(b.dataset.ndel, el));
      box.querySelectorAll('[data-nwithdraw]').forEach(b=> b.onclick=()=>withdrawNhap(b.dataset.nwithdraw, el));
    }
    async function delNhap(id, el){
      if(!confirm('Xóa phiếu nháp này?')) return;
      try{ await call('rpc_nhap_delete',{p_id:id}); toast('Đã xóa.'); await loadNhapMine(); renderNhapUI(el); }
      catch(err){ toast(err.message); }
    }
    async function withdrawNhap(id, el){
      try{ await call('rpc_nhap_withdraw',{p_id:id}); toast('Đã rút lại về nháp.'); await loadNhapMine(); renderNhapUI(el); }
      catch(err){ toast(err.message); }
    }

    // ---- Màn Đối chiếu nhập (ThuKho khác người tạo) ----
    async function renderNhapReview(el){
      el.innerHTML='<div class="panel muted">Đang tải…</div>';
      try{ const rows=(await call('rpc_nhap_review_queue')).rows||[];
        el.innerHTML=`<div class="panel"><h2>Hàng đợi đối chiếu nhập</h2>
          ${rows.length?`<table><thead><tr><th>Số phiếu</th><th>Người tạo</th><th>NCC</th><th>Téc</th>
            <th>Loại dầu</th><th>Lít</th><th>Đơn giá</th><th>Thành tiền</th><th></th></tr></thead><tbody>
            ${rows.map(r=>`<tr><td>${esc(r.code||'')}${r.supplierInvoiceNo?`<div class="muted" style="font-size:12px">HĐ: ${esc(r.supplierInvoiceNo)}</div>`:''}</td>
              <td>${esc(r.createdBy||'')}</td><td>${esc(r.supplierName||'')}</td><td>${esc(r.tankName||'')}</td>
              <td>${esc(r.oilTypeName||'')}</td><td>${fmtNum(r.liters)}</td><td>${fmtNum(r.unitPrice)}</td><td>${fmtNum(r.amount)}</td>
              <td style="white-space:nowrap">
                <button class="ghost sm" data-nphotos="${r.id}">Ảnh</button>
                <button class="sm" data-nok="${r.id}" style="background:var(--ok)">Khớp</button>
                <button class="ghost sm" data-nno="${r.id}">Lệch</button></td></tr>`).join('')}
            </tbody></table>`:'<span class="muted">Không có phiếu chờ đối chiếu.</span>'}</div>`;
        el.querySelectorAll('[data-nphotos]').forEach(b=> b.onclick=()=>viewReceiptPhotos(b.dataset.nphotos));
        el.querySelectorAll('[data-nok]').forEach(b=> b.onclick=()=>reviewNhap('rpc_nhap_approve',{p_id:b.dataset.nok},el));
        el.querySelectorAll('[data-nno]').forEach(b=> b.onclick=()=>{
          const reason=(prompt('Lý do trả về (Lệch):','')||'').trim(); if(!reason) return;
          reviewNhap('rpc_nhap_reject',{p_id:b.dataset.nno,p_reason:reason},el);
        });
      }catch(err){ el.innerHTML=`<div class="panel"><span class="msg">${esc(err.message)}</span></div>`; }
    }
    async function reviewNhap(rpc, params, el){
      try{ await call(rpc, params); toast('Đã xử lý phiếu.'); renderNhapReview(el); }
      catch(err){ toast(err.message); }
    }
    async function viewReceiptPhotos(ledgerId){
      let rows=[];
      try{ rows=(await call('rpc_nhap_photo_list',{p_ledger_id:ledgerId})).rows||[]; }
      catch(err){ toast(err.message); return; }
      if(!rows.length){ toast('Phiếu chưa có ảnh.'); return; }
      showModal('Ảnh phiếu nhập', '<div class="muted">Đang tải ảnh…</div>');
      const parts=[];
      for(const p of rows){
        const url=await signedUrl(p.path);
        parts.push(`<div style="flex:1;min-width:200px"><label>Ảnh phiếu nhập</label>
          ${url?`<a href="${esc(url)}" target="_blank"><img class="thumb" style="max-height:none" src="${esc(url)}"></a>`:'<span class="muted">Không tải được ảnh.</span>'}</div>`);
      }
      showModal('Ảnh phiếu nhập', `<div class="row">${parts.join('')}</div>`);
    }

    // ---- Màn Tồn kho thời gian thực (ThuKho + KeToan) ----
    async function renderInventory(el){
      el.innerHTML='<div class="panel muted">Đang tải…</div>';
      try{ state.stock=(await call('rpc_inventory_stock')).rows||[]; renderInventoryUI(el); }
      catch(err){ el.innerHTML=`<div class="panel"><span class="msg">${esc(err.message)}</span></div>`; }
    }
    function invFlag(r){
      if(Number(r.closing)<0) return '<span class="badge" style="background:var(--danger);color:#fff">Tồn âm</span>';
      if(r.capacity>0 && Number(r.closing)>Number(r.capacity)) return '<span class="badge" style="background:#B26B00;color:#fff">Vượt sức chứa</span>';
      if(r.reorderPoint>0 && Number(r.closing)<=Number(r.reorderPoint)) return '<span class="badge" style="background:#B26B00;color:#fff">Dưới điểm đặt hàng</span>';
      return '';
    }
    function pctBar(r){
      if(r.pctFull==null) return '<span class="muted">—</span>';
      const p=Math.max(0,Math.min(100,Number(r.pctFull)));
      const col = Number(r.closing)<0?'var(--danger)':(Number(r.pctFull)>100?'#B26B00':'var(--ok)');
      return `<div style="display:flex;align-items:center;gap:8px">
        <div style="flex:1;height:8px;background:var(--line);border-radius:999px;overflow:hidden">
          <div style="width:${p}%;height:100%;background:${col}"></div></div>
        <span style="min-width:48px;text-align:right">${fmtNum(r.pctFull)}%</span></div>`;
    }
    function renderInventoryUI(el){
      const rows=state.stock||[], canSet=can('adjust:manage');
      const table = rows.length
        ? `<table><thead><tr><th>Téc</th><th>Loại dầu</th><th>Tồn đầu</th><th>Nhập</th><th>Xuất</th>
            <th>Tồn cuối</th><th>Sức chứa</th><th style="min-width:140px">% đầy</th><th></th></tr></thead><tbody>
            ${rows.map(r=>`<tr>
              <td>${esc(r.tankName||'')}</td><td>${esc(r.oilTypeName||'')}</td>
              <td>${fmtNum(r.opening)}</td><td>${fmtNum(r.nhap)}</td><td>${fmtNum(r.xuat)}</td>
              <td style="font-weight:700${Number(r.closing)<0?';color:var(--danger)':''}">${fmtNum(r.closing)}</td>
              <td>${fmtNum(r.capacity)}</td><td>${pctBar(r)}</td><td>${invFlag(r)}</td>
            </tr>`).join('')}</tbody></table>`
        : '<span class="muted">Chưa có téc nào (thêm ở Danh mục & Xe).</span>';
      el.innerHTML=`<div class="panel"><div class="row" style="align-items:center">
          <h2 style="flex:1;margin:0">Tồn kho thời gian thực</h2>
          <button class="ghost sm" id="invReload" style="flex:0">Tải lại</button></div>
        <p class="muted" style="margin-top:4px">Tồn cuối = Tồn đầu + Nhập − Xuất (chỉ phiếu đã duyệt). Bơm ngoài không trừ tồn téc.</p>
        <div style="margin-top:8px">${table}</div></div>
        ${canSet?`<div class="panel"><h2>Đặt tồn đầu gốc</h2>
          <p class="muted" style="margin-top:-6px">Chỉ Kế toán. Đặt một lần theo giá trị đo tay tại mốc khởi tạo.</p>
          <div class="row">
            <div><label>Téc</label><select id="opTank"><option value="">— chọn téc —</option>
              ${rows.map(r=>`<option value="${r.tankId}">${esc(r.tankName)}</option>`).join('')}</select></div>
            <div><label>Tồn đầu (lít)</label><input id="opLit" inputmode="decimal"></div>
            <div><label>Mốc (ngày)</label><input id="opDate" type="date"></div>
          </div>
          <div style="margin-top:12px"><button id="opSave" style="flex:0">Lưu tồn đầu</button></div>
          <div id="opMsg" class="msg"></div></div>`:''}`;
      document.getElementById('invReload').onclick=()=>renderInventory(el);
      if(canSet){
        const tsel=document.getElementById('opTank');
        tsel.onchange=()=>{ const r=rows.find(x=>x.tankId===tsel.value);
          document.getElementById('opLit').value = r&&r.opening!=null?r.opening:'';
          document.getElementById('opDate').value = r&&r.openingAsOf?r.openingAsOf:''; };
        document.getElementById('opSave').onclick=()=>saveOpening(el);
      }
    }
    async function saveOpening(el){
      const msg=document.getElementById('opMsg'); msg.textContent='';
      const tank=val('opTank'); if(!tank){ msg.textContent='Chọn téc.'; return; }
      try{
        await call('rpc_tank_opening_set',{ p_tank_id:tank, p_liters:num(val('opLit')),
          p_as_of_date:val('opDate')||null, p_note:null });
        toast('Đã lưu tồn đầu.'); renderInventory(el);
      }catch(err){ msg.textContent=err.message; }
    }

    document.getElementById('loginBtn').onclick=login;
    document.getElementById('logoutBtn').onclick=logout;
    document.getElementById('loginPin').addEventListener('keydown',e=>{ if(e.key==='Enter') login(); });

    (async function init(){
      const { data } = await sb.auth.getSession();
      if(data && data.session){ state.session=data.session; bootstrap(); }
    })();
    sb.auth.onAuthStateChange((event)=>{ if(event==='SIGNED_OUT') location.reload(); });
  </script>
</body>
</html>
